      Sources: HPO, MedDRA, Open Targets. Node file: nodes/phenotype.parquet'
    class_uri: biolink:PhenotypicFeature
    slots:
    - id
    - name
    - original_optimus_label
    - direct_sources
    - indirect_sources
    - has_synonym
    - has_cross_reference
    annotations:
      neo4j_label:
        tag: neo4j_label
        value: PHE
      optimus_abbreviation:
        tag: optimus_abbreviation
        value: PHE
      property_schema_source:
        tag: property_schema_source
        value: PhenotypeNode
    slot_usage:
      name:
        description: Phenotype name (HPO preferred label, e.g. "Seizure", "Intellectual
          disability")
        range: string
    attributes:
      description:
        range: string
        description: Formal ontology definition of the phenotype
      code:
        range: string
        description: Primary ontology code for the phenotype term
      type:
        range: string
        description: Phenotype type or ontology classification (e.g. "HPO", "MedDRA
          LLT", "MedDRA PT").
      parents:
