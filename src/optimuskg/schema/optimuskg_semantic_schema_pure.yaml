  SemanticEntity:
    abstract: true
    description: Abstract parent for semantic objects introduced by the semantic view
      to normalize compact OptimusKG property payloads.
    class_uri: biolink:NamedThing
    slots:
    - id
    - name
  Protein:
    is_a: SemanticEntity
    description: A protein or protein-level biological entity associated with or encoded
      by a Gene. This semantic-view class normalizes values that may appear in OptimusKG
      gene properties such as associated_proteins.
    class_uri: biolink:Protein
    slots:
    - id
    - name
    - has_database_accession
    - has_isoform
  ProteinIsoform:
    is_a: Protein
    description: A specific protein isoform or translated product, for example an
      Ensembl protein accession that may represent a transcript-specific protein product.
    class_uri: okgview:ProteinIsoform
    slots:
    - id
    - name
    - has_database_accession
  DatabaseAccession:
    is_a: SemanticEntity
    description: A database-specific identifier or accession for a biological entity.
      This class allows accessions to be modeled as nodes rather than JSON strings.
    class_uri: okgview:DatabaseAccession
    slots:
    - id
    - accession
    - from_data_source
    - version
    - status
  DataSource:
    is_a: SemanticEntity
    description: A database, data resource, or source vocabulary contributing identifiers,
      evidence, or assertions to OptimusKG.
    class_uri: prov:Entity
    slots:
    - id
    - name
    - source_type
    - url
  Publication:
    is_a: SemanticEntity
    description: A publication or bibliographic reference that supports an OptimusKG
      assertion or evidence item.
    class_uri: biolink:Publication
    slots:
    - id
    - name
    - pmid
    - doi
    - url
  EvidenceRecord:
    is_a: SemanticEntity
    description: A structured evidence item supporting a node, relationship, or knowledge
      statement in the semantic view.
    class_uri: biolink:EvidenceType
    slots:
    - id
    - evidence_type
    - confidence_score
    - has_publication
    - from_data_source
    - description
  Synonym:
    is_a: SemanticEntity
    description: A lexical synonym, alias, obsolete label, or alternate name with
      optional source attribution.
    class_uri: skos:altLabel
    slots:
    - id
    - name
    - synonym_scope
    - from_data_source
  CrossReference:
    is_a: DatabaseAccession
    description: A cross-reference from an OptimusKG entity to an external database
      or ontology identifier.
    class_uri: biolink:Attribute
