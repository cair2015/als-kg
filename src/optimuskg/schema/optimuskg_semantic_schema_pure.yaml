id: https://example.org/optimuskg/semantic-view-schema
name: optimuskg_semantic_schema_pure
title: OptimusKG Pure Semantic Schema
description: 'Pure semantic LinkML view of the current OptimusKG Neo4j graph.


  This schema removes OptimusKG implementation-specific edge-record classes and focuses
  on

  full semantic class names, explicit relationship families, and current Neo4j relationship

  patterns. It preserves Neo4j labels and relationship types as annotations for traceability,

  but avoids implementation-specific export edge-record classes and avoids JSON-string properties
  as first-class schema features.


  Relationship names are written from the current Neo4j start node to end node direction.

  For example, (:Disease)-[:PHENOTYPE_PRESENT]->(:Phenotype) is modeled as

  DiseaseHasPhenotypeRelationship, meaning "the disease has/presents the phenotype".

  The inverse reading is "the phenotype is present in the disease", but the modeled
  edge

  direction remains Disease -> Phenotype.'
version: 0.2.0
license: MIT
see_also:
- https://arxiv.org/abs/2604.27269
- https://doi.org/10.7910/DVN/IYNGEV
- https://github.com/mims-harvard/optimuskg
- https://optimuskg.ai
- https://optimuskg.ai/docs/graph-schema/edges
- https://optimuskg.ai/docs/graph-schema/nodes
prefixes:
  linkml: https://w3id.org/linkml/
  okg: https://w3id.org/optimuskg/schema/
  biolink: https://w3id.org/biolink/vocab/
  RO: http://purl.obolibrary.org/obo/RO_
  BFO: http://purl.obolibrary.org/obo/BFO_
  IAO: http://purl.obolibrary.org/obo/IAO_
  OBI: http://purl.obolibrary.org/obo/OBI_
  SIO: http://semanticscience.org/resource/
  prov:
    prefix_prefix: prov
    prefix_reference: http://www.w3.org/ns/prov#
  rdf: http://www.w3.org/1999/02/22-rdf-syntax-ns#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  xsd: http://www.w3.org/2001/XMLSchema#
  schema: https://schema.org/
  optimuskg: https://optimuskg.ai/schema/
  ENSG: https://ensembl.org/id/
  GO: http://purl.obolibrary.org/obo/GO_
  HP: http://purl.obolibrary.org/obo/HP_
  MONDO: http://purl.obolibrary.org/obo/MONDO_
  DOID: http://purl.obolibrary.org/obo/DOID_
  UBERON: http://purl.obolibrary.org/obo/UBERON_
  CHEMBL: https://www.ebi.ac.uk/chembl/compound_report_card/
  DRUGBANK: https://go.drugbank.com/drugs/
  RXNORM: https://www.nlm.nih.gov/research/umls/rxnorm/
  REACT: https://reactome.org/content/detail/
  MESH: http://id.nlm.nih.gov/mesh/
  NCIT: http://purl.obolibrary.org/obo/NCIT_
  EFO: http://www.ebi.ac.uk/efo/EFO_
  ORPHANET: http://www.orpha.net/ORDO/Orphanet_
  okgview:
    prefix_prefix: okgview
    prefix_reference: https://example.org/optimuskg/semantic-view/
  skos:
    prefix_prefix: skos
    prefix_reference: http://www.w3.org/2004/02/skos/core#
  obo:
    prefix_prefix: obo
    prefix_reference: http://purl.obolibrary.org/obo/
  uniprot:
    prefix_prefix: uniprot
    prefix_reference: https://purl.uniprot.org/uniprot/
  ensembl:
    prefix_prefix: ensembl
    prefix_reference: https://identifiers.org/ensembl/
  dcterms:
    prefix_prefix: dcterms
    prefix_reference: http://purl.org/dc/terms/
default_prefix: okgview
default_range: string
imports:
- linkml:types
annotations:
  source_note:
    tag: source_note
    value: Relationship inventory derived from user-exported Neo4j file optimus_node_rel.csv
      containing 58 start-label / relationship-type / end-label patterns.
  modeling_note:
    tag: modeling_note
    value: This file is a current Neo4j schema view, not a proposed normalized semantic
      redesign. It records abbreviated Neo4j labels via annotations but uses full
      class names for readability.
  relationship_hierarchy:
    tag: relationship_hierarchy
    value: Concrete Neo4j relationship classes are grouped under abstract relationship-family
      classes using LinkML is_a inheritance. Neo4j relationship types are preserved
      as annotations on concrete classes.
  relationship_hierarchy_version:
    tag: relationship_hierarchy_version
    value: '1.0'
  schema_role:
    tag: schema_role
    value: semantic_view
  source_topology_schema:
    tag: source_topology_schema
    value: optimuskg_current_neo4j_linkml_schema_hierarchical.yaml
  source_property_schema:
    tag: source_property_schema
    value: optimuskg_schema.yaml
  modeling_policy:
    tag: modeling_policy
    value: Use full semantic class names. Preserve current Neo4j abbreviations and
      relationship types as annotations. Prefer explicit nodes/relationships for compact
      JSON-like properties when building a semantic graph view.
  standalone_schema: 'true'
  modeling_scope:
    tag: modeling_scope
    value: pure semantic schema; no export edge-record classes; current Neo4j labels
      and relationship types preserved as annotations
  relationship_direction_policy:
    tag: relationship_direction_policy
    value: relationship names follow current Neo4j start-node to end-node direction;
      inverse readings are documented in descriptions where useful
types:
  CURIEType:
    uri: xsd:string
    base: str
    description: 'A Compact URI (CURIE) identifier in the form {namespace}[:_]{local_id}.
      Examples: ENSG00000139618, GO:0000001, HP:0001250, MONDO:0005148. All namespace
      prefixes are validated against the Biolink Model namespace registry.'
  Base64StringType:
    uri: xsd:string
    base: str
    description: A base64-encoded binary payload stored as a string. Used for mol_file_base64
      and mol_image_base64 on Drug nodes.
enums:
  OptimusNodeLabelEnum:
    description: Current three-letter OptimusKG Neo4j node labels.
    permissible_values:
      ANA:
        description: Anatomy node label.
      BPO:
        description: BiologicalProcess node label.
      CCO:
        description: CellularComponent node label.
      DIS:
        description: Disease node label.
      DRG:
        description: Drug node label.
      EXP:
        description: Exposure node label.
      GEN:
        description: Gene node label.
      MFN:
        description: MolecularFunction node label.
      PHE:
        description: Phenotype node label.
      PWY:
        description: Pathway node label.
  OptimusRelationshipTypeEnum:
    description: Current Neo4j relationship type strings observed in the installed
      OptimusKG graph.
    permissible_values:
      ACTIVATOR:
        description: Drug activates the gene product or target associated with the
          gene.
      ADVERSE_DRUG_REACTION:
        description: Drug-to-phenotype relationship indicating an adverse drug reaction.
      AGONIST:
        description: Drug acts as an agonist of the gene product or target associated
          with the gene.
      ALLOSTERIC_ANTAGONIST:
        description: Drug acts as an allosteric antagonist of the gene product or
          target associated with the gene.
      ANTAGONIST:
        description: Drug acts as an antagonist of the gene product or target associated
          with the gene.
      ASSOCIATED_WITH:
        description: Association relationship; generally evidence-bearing but not
          necessarily causal.
      BINDING_AGENT:
        description: Drug binds the gene product or target associated with the gene.
      BLOCKER:
        description: Drug blocks the gene product or target associated with the gene.
      CARRIER:
        description: Drug-gene relationship where the gene product is a carrier in
          pharmacologic context.
      CONTRAINDICATION:
        description: Drug is contraindicated for a disease or phenotype context.
      DEGRADER:
        description: Drug degrades or induces degradation of the gene product or target.
      ENZYME:
        description: Drug-gene relationship where the gene product is an enzyme in
          drug metabolism or action context.
      EXPRESSION_ABSENT:
        description: Gene expression is reported absent in an anatomical context.
      EXPRESSION_PRESENT:
        description: Gene expression is reported present in an anatomical context.
      INDICATION:
        description: Drug has an indicated therapeutic use for a disease, phenotype,
          or biological process context.
      INHIBITOR:
        description: Drug inhibits the gene product or target associated with the
          gene.
      INTERACTS_WITH:
        description: Generic interaction or annotation-style relationship. Interpret
          according to the source and node pair; it may indicate interaction, membership,
          annotation, or functional context.
      INVERSE_AGONIST:
        description: Drug acts as an inverse agonist of the gene product or target.
      IS_A:
        description: Ontology subclass relationship indicating the source concept
          is a kind of the target concept.
      LINKED_TO:
        description: Generic linkage relation; interpret as associative rather than
          causal unless source evidence says otherwise.
      MODULATOR:
        description: Drug modulates the gene product or target associated with the
          gene.
      NEGATIVE_ALLOSTERIC_MODULATOR:
        description: Drug acts as a negative allosteric modulator of the gene product
          or target.
      NEGATIVE_MODULATOR:
        description: Drug negatively modulates the gene product or target.
      OFF_LABEL_USE:
        description: Drug has off-label use for a disease or phenotype context.
      OPENER:
        description: Drug opens the gene product or target, often a channel target.
      PARENT:
        description: Parent-child hierarchy relationship from the source concept to
          a broader or parent concept in the same or related ontology.
      PARTIAL_AGONIST:
        description: Drug acts as a partial agonist of the gene product or target.
      PHENOTYPE_PRESENT:
        description: Disease-to-phenotype relationship indicating the phenotype is
          present in the disease context.
      POSITIVE_ALLOSTERIC_MODULATOR:
        description: Drug acts as a positive allosteric modulator of the gene product
          or target.
      POSITIVE_MODULATOR:
        description: Drug positively modulates the gene product or target.
      RELEASING_AGENT:
        description: Drug acts as a releasing agent affecting the gene product or
          related target system.
      STABILISER:
        description: Drug stabilizes the gene product or target.
      SUBSTRATE:
        description: Drug is a substrate of the gene product, often an enzyme or transporter.
      SYNERGISTIC_INTERACTION:
        description: Drug-drug relationship indicating synergistic interaction.
      TARGET:
        description: Drug targets the gene product associated with the gene.
      TRANSPORTER:
        description: Drug-gene relationship where the gene product is a transporter
          in pharmacologic context.
  GeneBiotypeEnum:
    description: Gene biotype classifications from HGNC/Ensembl, stored on Gene nodes.
    permissible_values:
      protein_coding:
        description: Protein-coding gene
      lncRNA:
        description: Long non-coding RNA
      miRNA:
        description: MicroRNA
      snRNA:
        description: Small nuclear RNA
      snoRNA:
        description: Small nucleolar RNA
      rRNA:
        description: Ribosomal RNA
      tRNA:
        description: Transfer RNA
      pseudogene:
        description: Pseudogene
      misc_RNA:
        description: Miscellaneous RNA
      other:
        description: Other or unclassified biotype
  ExpressionCallQualityEnum:
    description: Bgee expression call quality levels for ANA-GEN edges. Reflects confidence
      in gene expression calls derived from curated RNA-seq data.
    permissible_values:
      gold:
        description: High-confidence expression call (multiple concordant evidence
          types)
      silver:
        description: Moderate-confidence expression call
  DrugTractabilityModalityEnum:
    description: Drug discovery modality categories for tractability assessments on
      Gene nodes. Sourced from Open Targets tractability pipeline.
    permissible_values:
      sm:
        description: Small molecule modality
      ab:
        description: Antibody modality
      pr:
        description: PROTAC (protein degrader) modality
      oc:
        description: Other clinical modality
  HomologyTypeEnum:
    description: Types of homology relationships in gene homologue annotations on
      Gene nodes.
    permissible_values:
      ortholog_one2one:
        description: One-to-one ortholog (single copy in both species)
      ortholog_one2many:
        description: One-to-many ortholog
      ortholog_many2many:
        description: Many-to-many ortholog
      within_species_paralog:
        description: Paralog within the same species
      other_paralog:
        description: Other paralogous relationship
      gene_split:
        description: Split gene (fragment)
slots:
  id:
    identifier: true
    range: uriorcurie
    slot_uri: schema:identifier
    description: Primary OptimusKG node identifier, usually a CURIE or source-specific
      accession.
  original_optimus_label:
    range: OptimusNodeLabelEnum
    description: Original three-letter OptimusKG node label as stored in Neo4j, such
      as GEN, DIS, or DRG.
  original_optimus_relationship_type:
    range: OptimusRelationshipTypeEnum
    description: Original Neo4j relationship type string used in the installed OptimusKG
      database.
  name:
    range: string
    slot_uri: rdfs:label
    description: Human-readable preferred name or label, when available.
  symbol:
    range: string
    description: Gene symbol or other short symbol, when available.
  source:
    range: string
    description: Source string or compact source identifier, when available.
  direct_sources:
    range: string
    multivalued: true
    description: Direct provenance sources contributing the node or edge, when available.
  indirect_sources:
    range: string
    multivalued: true
    description: Indirect upstream sources referenced by contributing resources, when
      available.
  subject:
    range: OptimusNode
    description: Source node of a Neo4j relationship instance.
  object:
    range: OptimusNode
    description: Target node of a Neo4j relationship instance.
  undirected:
    range: boolean
    description: Whether the relationship has no intrinsic directionality in the OptimusKG
      export, when available.
  anatomy_has_parent_anatomy:
    description: Current OptimusKG Neo4j relationship `PARENT` from `ANA`/Anatomy
      to `ANA`/Anatomy. Parent-child hierarchy relationship from the source concept
      to a broader or parent concept in the same or related ontology.
    domain: Anatomy
    range: Anatomy
    slot_uri: rdfs:subClassOf
    annotations:
      neo4j_relationship_type:
        tag: neo4j_relationship_type
        value: PARENT
      neo4j_start_label:
        tag: neo4j_start_label
        value: ANA
      neo4j_end_label:
        tag: neo4j_end_label
        value: ANA
  anatomy_has_gene_expression_absent:
    description: Current OptimusKG Neo4j relationship `EXPRESSION_ABSENT` from Anatomy
      to Gene. Means expression of the gene is reported absent in the anatomical entity.
    domain: Anatomy
    range: Gene
    slot_uri: okg:expression_absent
    annotations:
      neo4j_relationship_type:
        tag: neo4j_relationship_type
        value: EXPRESSION_ABSENT
      neo4j_start_label:
        tag: neo4j_start_label
        value: ANA
      neo4j_end_label:
        tag: neo4j_end_label
        value: GEN
  anatomy_has_gene_expression_present:
    description: Current OptimusKG Neo4j relationship `EXPRESSION_PRESENT` from Anatomy
      to Gene. Means expression of the gene is reported present in the anatomical
      entity.
    domain: Anatomy
    range: Gene
    slot_uri: RO:0002206
    annotations:
      neo4j_relationship_type:
        tag: neo4j_relationship_type
        value: EXPRESSION_PRESENT
      neo4j_start_label:
        tag: neo4j_start_label
        value: ANA
      neo4j_end_label:
        tag: neo4j_end_label
        value: GEN
  biological_process_is_subclass_of:
    description: Current OptimusKG Neo4j relationship `IS_A` from `BPO`/BiologicalProcess
      to `BPO`/BiologicalProcess. Ontology subclass relationship indicating the source
      concept is a kind of the target concept.
    domain: BiologicalProcess
    range: BiologicalProcess
    slot_uri: rdfs:subClassOf
    annotations:
      neo4j_relationship_type:
        tag: neo4j_relationship_type
        value: IS_A
      neo4j_start_label:
        tag: neo4j_start_label
        value: BPO
      neo4j_end_label:
        tag: neo4j_end_label
        value: BPO
  biological_process_has_participating_gene:
    description: 'Current OptimusKG Neo4j relationship `INTERACTS_WITH` from BiologicalProcess
      to Gene. Semantic view: the gene is annotated to or participates in the biological
      process; use provenance/evidence to avoid overinterpreting as a physical interaction.'
    domain: BiologicalProcess
    range: Gene
    slot_uri: biolink:interacts_with
    annotations:
      neo4j_relationship_type:
        tag: neo4j_relationship_type
        value: INTERACTS_WITH
      neo4j_start_label:
        tag: neo4j_start_label
        value: BPO
      neo4j_end_label:
        tag: neo4j_end_label
        value: GEN
  cellular_component_is_subclass_of:
    description: Current OptimusKG Neo4j relationship `IS_A` from `CCO`/CellularComponent
      to `CCO`/CellularComponent. Ontology subclass relationship indicating the source
      concept is a kind of the target concept.
    domain: CellularComponent
    range: CellularComponent
    slot_uri: rdfs:subClassOf
    annotations:
      neo4j_relationship_type:
        tag: neo4j_relationship_type
        value: IS_A
      neo4j_start_label:
        tag: neo4j_start_label
        value: CCO
      neo4j_end_label:
        tag: neo4j_end_label
        value: CCO
  cellular_component_has_located_gene:
    description: 'Current OptimusKG Neo4j relationship `INTERACTS_WITH` from CellularComponent
      to Gene. Semantic view: the gene/gene product is annotated as located in or
      associated with the cellular component.'
    domain: CellularComponent
    range: Gene
    slot_uri: biolink:interacts_with
    annotations:
      neo4j_relationship_type:
        tag: neo4j_relationship_type
        value: INTERACTS_WITH
      neo4j_start_label:
        tag: neo4j_start_label
        value: CCO
      neo4j_end_label:
        tag: neo4j_end_label
        value: GEN
  disease_has_parent_disease:
    description: Current OptimusKG Neo4j relationship `PARENT` from `DIS`/Disease
      to `DIS`/Disease. Parent-child hierarchy relationship from the source concept
      to a broader or parent concept in the same or related ontology.
    domain: Disease
    range: Disease
    slot_uri: rdfs:subClassOf
    annotations:
      neo4j_relationship_type:
        tag: neo4j_relationship_type
        value: PARENT
      neo4j_start_label:
        tag: neo4j_start_label
        value: DIS
      neo4j_end_label:
        tag: neo4j_end_label
        value: DIS
  disease_associated_with_gene:
    description: Current OptimusKG Neo4j relationship `ASSOCIATED_WITH` from `DIS`/Disease
      to `GEN`/Gene. Association relationship; generally evidence-bearing but not
      necessarily causal.
    domain: Disease
    range: Gene
    slot_uri: biolink:associated_with
    annotations:
      neo4j_relationship_type:
        tag: neo4j_relationship_type
        value: ASSOCIATED_WITH
      neo4j_start_label:
        tag: neo4j_start_label
        value: DIS
      neo4j_end_label:
        tag: neo4j_end_label
        value: GEN
  disease_has_phenotype:
    description: 'Current OptimusKG Neo4j relationship `PHENOTYPE_PRESENT` from `DIS`/Disease
      to `PHE`/Phenotype. Means the disease has or presents the phenotype; inverse
      reading: the phenotype is present in the disease.'
    domain: Disease
    range: Phenotype
    slot_uri: biolink:has_phenotype
    annotations:
      neo4j_relationship_type:
        tag: neo4j_relationship_type
        value: PHENOTYPE_PRESENT
      neo4j_start_label:
        tag: neo4j_start_label
        value: DIS
      neo4j_end_label:
        tag: neo4j_end_label
        value: PHE
  drug_has_indication_for_biological_process:
    description: Current OptimusKG Neo4j relationship `INDICATION` from `DRG`/Drug
      to `BPO`/BiologicalProcess. Drug has an indicated therapeutic use for a disease,
      phenotype, or biological process context.
    domain: Drug
    range: BiologicalProcess
    slot_uri: biolink:treats
    annotations:
      neo4j_relationship_type:
        tag: neo4j_relationship_type
        value: INDICATION
      neo4j_start_label:
        tag: neo4j_start_label
        value: DRG
      neo4j_end_label:
        tag: neo4j_end_label
        value: BPO
  drug_contraindicated_for_disease:
    description: Current OptimusKG Neo4j relationship `CONTRAINDICATION` from `DRG`/Drug
      to `DIS`/Disease. Drug is contraindicated for a disease or phenotype context.
    domain: Drug
    range: Disease
    slot_uri: biolink:contraindicated_for
    annotations:
      neo4j_relationship_type:
        tag: neo4j_relationship_type
        value: CONTRAINDICATION
      neo4j_start_label:
        tag: neo4j_start_label
        value: DRG
      neo4j_end_label:
        tag: neo4j_end_label
        value: DIS
  drug_indicated_for_disease:
    description: Current OptimusKG Neo4j relationship `INDICATION` from `DRG`/Drug
      to `DIS`/Disease. Drug has an indicated therapeutic use for a disease, phenotype,
      or biological process context.
    domain: Drug
    range: Disease
    slot_uri: biolink:treats
    annotations:
      neo4j_relationship_type:
        tag: neo4j_relationship_type
        value: INDICATION
      neo4j_start_label:
        tag: neo4j_start_label
        value: DRG
      neo4j_end_label:
        tag: neo4j_end_label
        value: DIS
  drug_used_off_label_for_disease:
    description: Current OptimusKG Neo4j relationship `OFF_LABEL_USE` from `DRG`/Drug
      to `DIS`/Disease. Drug has off-label use for a disease or phenotype context.
    domain: Drug
    range: Disease
    slot_uri: okg:off_label_use
    annotations:
      neo4j_relationship_type:
        tag: neo4j_relationship_type
        value: OFF_LABEL_USE
      neo4j_start_label:
        tag: neo4j_start_label
        value: DRG
      neo4j_end_label:
        tag: neo4j_end_label
        value: DIS
  drug_has_parent_drug:
    description: Current OptimusKG Neo4j relationship `PARENT` from `DRG`/Drug to
      `DRG`/Drug. Parent-child hierarchy relationship from the source concept to a
      broader or parent concept in the same or related ontology.
    domain: Drug
    range: Drug
    slot_uri: rdfs:subClassOf
    annotations:
      neo4j_relationship_type:
        tag: neo4j_relationship_type
        value: PARENT
      neo4j_start_label:
        tag: neo4j_start_label
        value: DRG
      neo4j_end_label:
        tag: neo4j_end_label
        value: DRG
  drug_has_synergistic_interaction_with_drug:
    description: Current OptimusKG Neo4j relationship `SYNERGISTIC_INTERACTION` from
      `DRG`/Drug to `DRG`/Drug. Drug-drug relationship indicating synergistic interaction.
    domain: Drug
    range: Drug
    slot_uri: biolink:interacts_with
    annotations:
      neo4j_relationship_type:
        tag: neo4j_relationship_type
        value: SYNERGISTIC_INTERACTION
      neo4j_start_label:
        tag: neo4j_start_label
        value: DRG
      neo4j_end_label:
        tag: neo4j_end_label
        value: DRG
  drug_activates_gene_product:
    description: Current OptimusKG Neo4j relationship `ACTIVATOR` from `DRG`/Drug
      to `GEN`/Gene. Drug activates the gene product or target associated with the
      gene.
    domain: Drug
    range: Gene
    slot_uri: biolink:increases_activity_of
    annotations:
      neo4j_relationship_type:
        tag: neo4j_relationship_type
        value: ACTIVATOR
      neo4j_start_label:
        tag: neo4j_start_label
        value: DRG
      neo4j_end_label:
        tag: neo4j_end_label
        value: GEN
  drug_agonist_of_gene_product:
    description: Current OptimusKG Neo4j relationship `AGONIST` from `DRG`/Drug to
      `GEN`/Gene. Drug acts as an agonist of the gene product or target associated
      with the gene.
    domain: Drug
    range: Gene
    slot_uri: biolink:affects_activity_of
    annotations:
      neo4j_relationship_type:
        tag: neo4j_relationship_type
        value: AGONIST
      neo4j_start_label:
        tag: neo4j_start_label
        value: DRG
      neo4j_end_label:
        tag: neo4j_end_label
        value: GEN
  drug_allosteric_antagonist_of_gene_product:
    description: Current OptimusKG Neo4j relationship `ALLOSTERIC_ANTAGONIST` from
      `DRG`/Drug to `GEN`/Gene. Drug acts as an allosteric antagonist of the gene
      product or target associated with the gene.
    domain: Drug
    range: Gene
    slot_uri: biolink:decreases_activity_of
    annotations:
      neo4j_relationship_type:
        tag: neo4j_relationship_type
        value: ALLOSTERIC_ANTAGONIST
      neo4j_start_label:
        tag: neo4j_start_label
        value: DRG
      neo4j_end_label:
        tag: neo4j_end_label
        value: GEN
  drug_antagonist_of_gene_product:
    description: Current OptimusKG Neo4j relationship `ANTAGONIST` from `DRG`/Drug
      to `GEN`/Gene. Drug acts as an antagonist of the gene product or target associated
      with the gene.
    domain: Drug
    range: Gene
    slot_uri: biolink:decreases_activity_of
    annotations:
      neo4j_relationship_type:
        tag: neo4j_relationship_type
        value: ANTAGONIST
      neo4j_start_label:
        tag: neo4j_start_label
        value: DRG
      neo4j_end_label:
        tag: neo4j_end_label
        value: GEN
  drug_binds_gene_product:
    description: Current OptimusKG Neo4j relationship `BINDING_AGENT` from `DRG`/Drug
      to `GEN`/Gene. Drug binds the gene product or target associated with the gene.
    domain: Drug
    range: Gene
    slot_uri: biolink:physically_interacts_with
