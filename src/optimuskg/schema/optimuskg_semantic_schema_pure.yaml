    multivalued: true
    slot_uri: skos:altLabel
  has_cross_reference:
    description: Connects an entity to a structured CrossReference or DatabaseAccession
      node.
    range: DatabaseAccession
    multivalued: true
    slot_uri: biolink:xref
  description:
    description: A free-text description or notes about an entity, evidence record,
      or other semantic object.
    range: string
    slot_uri: dcterms:description
  has_evidence_record:
    description: Connects a relationship or semantic statement to structured supporting
      evidence.
    range: EvidenceRecord
    multivalued: true
    slot_uri: biolink:has_evidence
classes:
  OptimusNode:
    abstract: true
    description: Abstract base class for all current OptimusKG Neo4j node labels.
    slots:
    - id
    - name
    - original_optimus_label
    - direct_sources
    - indirect_sources
    class_uri: biolink:NamedThing
  Anatomy:
    is_a: OptimusNode
    description: 'An anatomical entity or anatomical region represented in OptimusKG.
      Current Neo4j label: `ANA`.


      Property detail from OptimusKG source schema: An anatomical structure or tissue
      node. Represents 13,120 anatomical entities (6.9% of nodes) from the Uberon
      cross-species anatomy ontology. Covers organs, tissues, cell types, developmental
      structures, and systems. Source: Uberon. Node file: nodes/anatomy.parquet'
    class_uri: biolink:AnatomicalEntity
    slots:
    - id
    - name
    - original_optimus_label
    - direct_sources
    - indirect_sources
    - has_synonym
    - has_cross_reference
    annotations:
      neo4j_label:
        tag: neo4j_label
        value: ANA
      optimus_abbreviation:
        tag: optimus_abbreviation
        value: ANA
      property_schema_source:
        tag: property_schema_source
        value: AnatomyNode
    slot_usage:
      name:
        description: Anatomical structure name (Uberon preferred label, e.g. "heart",
          "liver")
        range: string
    attributes:
      definition:
        range: string
        description: Formal ontology definition of the anatomical structure
      synonyms:
        range: string
        multivalued: true
        description: Alternative anatomical names and labels (e.g. abbreviations,
          Latin names, synonymous tissue terms)
      xrefs:
        range: string
        multivalued: true
        description: Cross-references to external ontologies and databases (e.g. FMA,
          MA, EHDAA2, BTO, OpenGalen, Wikipedia)
      ontology:
        range: OntologyMetadata
        description: Source ontology metadata (Uberon title, version, license)
  BiologicalProcess:
    is_a: OptimusNode
    description: 'A Gene Ontology biological process term represented in OptimusKG.
      Current Neo4j label: `BPO`.


      Property detail from OptimusKG source schema: A Gene Ontology (GO) biological
      process node. Represents 25,754 biological processes (13.5% of nodes) describing
      coordinated programs of molecular activities with a defined beginning and end
      (e.g. "apoptotic process", "DNA repair", "cell division"). Source: Gene Ontology
      (GO). Node file: nodes/biological_process.parquet'
    class_uri: biolink:BiologicalProcess
    slots:
    - id
    - name
    - original_optimus_label
    - direct_sources
    - indirect_sources
    - has_synonym
    - has_cross_reference
    annotations:
      neo4j_label:
        tag: neo4j_label
        value: BPO
      optimus_abbreviation:
        tag: optimus_abbreviation
        value: BPO
      property_schema_source:
        tag: property_schema_source
        value: BiologicalProcessNode
    slot_usage:
      name:
        description: GO biological process name (e.g. "apoptotic process")
        range: string
    attributes:
      definition:
        range: string
        description: Formal GO ontology definition of the biological process
      synonyms:
        range: string
        multivalued: true
        description: Alternative GO term names and synonyms
      xrefs:
        range: string
        multivalued: true
        description: Cross-references to external databases (e.g. KEGG, Reactome,
          Wikipedia)
      ontology:
        range: OntologyMetadata
        description: Source ontology metadata (GO title, version, license)
  CellularComponent:
    is_a: OptimusNode
    description: 'A Gene Ontology cellular component term represented in OptimusKG.
      Current Neo4j label: `CCO`.


      Property detail from OptimusKG source schema: A Gene Ontology (GO) cellular
      component node. Represents 4,052 subcellular structures and compartments (2.1%
      of nodes) where gene products are active or located (e.g. "nucleus", "mitochondria",
      "plasma membrane", "ribosome"). Source: Gene Ontology (GO). Node file: nodes/cellular_component.parquet'
    class_uri: biolink:CellularComponent
    slots:
    - id
    - name
    - original_optimus_label
    - direct_sources
    - indirect_sources
    - has_synonym
    - has_cross_reference
    annotations:
      neo4j_label:
        tag: neo4j_label
        value: CCO
      optimus_abbreviation:
        tag: optimus_abbreviation
        value: CCO
      property_schema_source:
        tag: property_schema_source
        value: CellularComponentNode
    slot_usage:
      name:
        description: GO cellular component name (e.g. "cytoplasm", "nucleus")
        range: string
    attributes:
      definition:
        range: string
        description: Formal GO ontology definition
      synonyms:
        range: string
        multivalued: true
        description: Alternative GO term names and synonyms
      xrefs:
        range: string
        multivalued: true
        description: Cross-references to external databases
      ontology:
        range: OntologyMetadata
        description: Source ontology metadata (GO title, version, license)
  Disease:
    is_a: OptimusNode
    description: 'A disease, disorder, or clinical condition represented in OptimusKG.
      Current Neo4j label: `DIS`.


      Property detail from OptimusKG source schema: A human disease node. Represents
      36,345 diseases (19.1% of nodes) spanning genetic, infectious, cancer, environmental,
      complex, rare, and common human diseases. Harmonized across MONDO, DOID, EFO,
      Orphanet, NCIT, and other ontologies with full hierarchical structure. Sources:
      DrugCentral, Mondo, Open Targets. Node file: nodes/disease.parquet'
    class_uri: biolink:Disease
    slots:
    - id
    - name
    - original_optimus_label
    - direct_sources
    - indirect_sources
    - has_synonym
    - has_cross_reference
    annotations:
      neo4j_label:
        tag: neo4j_label
        value: DIS
      optimus_abbreviation:
        tag: optimus_abbreviation
        value: DIS
      property_schema_source:
        tag: property_schema_source
        value: DiseaseNode
    slot_usage:
      name:
        description: Primary disease name (preferred label in the source ontology)
        range: string
    attributes:
      description:
        range: string
        description: Free-text disease description from the ontology definition
      code:
        range: string
        description: Primary ontology code / identifier for the disease term
      parents:
        range: string
        multivalued: true
        description: Direct parent disease term identifiers in the ontology hierarchy.
          Enables traversal of the disease DAG (directed acyclic graph).
      children:
        range: string
        multivalued: true
        description: Direct child disease term identifiers
      ancestors:
        range: string
        multivalued: true
        description: All transitive ancestor (parent-of-parent-of-...) disease term
          IDs
      descendants:
        range: string
        multivalued: true
        description: All transitive descendant (child-of-child-of-...) disease term
          IDs
      is_leaf:
        range: boolean
        description: True if this disease term has no children (leaf node in ontology
          tree)
      exact_synonyms:
        range: string
        multivalued: true
        description: Exact lexical synonyms (same meaning, different spelling/abbreviation)
      related_synonyms:
        range: string
        multivalued: true
        description: Semantically related synonyms (close but not exact meaning)
      narrow_synonyms:
        range: string
        multivalued: true
        description: Narrower term synonyms (more specific concepts)
      broad_synonyms:
        range: string
        multivalued: true
        description: Broader term synonyms (more general concepts)
      obsolete_terms:
        range: string
        multivalued: true
        description: Deprecated or retired disease term labels
      obsolete_xrefs:
        range: string
        multivalued: true
        description: Deprecated cross-references to external databases
      xrefs:
        range: string
        multivalued: true
        description: Cross-references to external databases (e.g. ICD-10, OMIM, MeSH,
          MedDRA). Formatted as CURIE strings.
      therapeutic_areas:
        range: string
        multivalued: true
        description: Associated therapeutic area classification codes (Open Targets
          EFO)
      concept_ids:
        range: string
        multivalued: true
        description: UMLS concept IDs (CUIs) linked to this disease
      concept_names:
        range: string
        multivalued: true
        description: UMLS concept names corresponding to concept_ids
      umls_cui:
        range: string
        description: Primary UMLS Concept Unique Identifier (CUI) for this disease.
          Key cross-reference for integration with clinical NLP systems.
      snomed_full_names:
        range: string
        multivalued: true
        description: SNOMED CT preferred full concept names
      snomed_concept_ids:
        range: string
        multivalued: true
        description: SNOMED CT concept identifiers
      cui_semantic_type:
        range: string
        description: UMLS semantic type for the primary CUI (e.g. "Disease or Syndrome",
          "Neoplastic Process").
  Drug:
    is_a: OptimusNode
    description: 'A drug, compound, or therapeutic agent represented in OptimusKG.
      Current Neo4j label: `DRG`.


      Property detail from OptimusKG source schema: A pharmacological compound node.
      Represents 16,766 drugs (8.8% of nodes) including approved drugs, investigational
      compounds, and biologics. Integrates chemical, regulatory, and clinical metadata
      from DrugBank, DrugCentral, OnSIDES, and Open Targets. Primary ontologies: ChEMBL,
      DrugBank, RxNorm. Node file: nodes/drug.parquet'
    class_uri: biolink:Drug
    slots:
    - id
    - name
    - original_optimus_label
    - direct_sources
    - indirect_sources
    - has_synonym
    - has_cross_reference
    annotations:
      neo4j_label:
        tag: neo4j_label
        value: DRG
      optimus_abbreviation:
        tag: optimus_abbreviation
        value: DRG
      property_schema_source:
        tag: property_schema_source
        value: DrugNode
    slot_usage:
      name:
        description: Primary drug name (INN or generic name, e.g. "metformin")
        range: string
    attributes:
      type:
        range: string
        description: Drug type classification (e.g. "Small molecule", "Biologic",
          "Antibody", "Enzyme", "Oligonucleotide").
      description:
        range: string
        description: Free-text description of the drug's pharmacology, indications,
          and mechanism of action.
      synonyms:
        range: string
        multivalued: true
        description: Alternative drug names (INNs, abbreviations, research codes)
      trade_names:
        range: string
        multivalued: true
        description: Commercial brand/trade names (e.g. "Glucophage" for metformin)
      accession_numbers:
        range: string
        multivalued: true
        description: Database accession numbers from various sources
      source_ids:
        range: string
        multivalued: true
        description: Source-specific compound identifiers
      inchi_key:
        range: string
        description: Hashed InChIKey identifier (27-character string). Standard chemical
          structure fingerprint for deduplication and lookup.
      inchi:
        range: string
        description: IUPAC International Chemical Identifier (InChI) string. Full
          structural representation in layered notation.
      canonical_smiles:
        range: string
        description: Canonical SMILES (Simplified Molecular Input Line Entry System)
          string. Machine-readable chemical structure representation.
      mol_file_base64:
        range: Base64StringType
        description: Base64-encoded MDL MOL file containing 2D/3D structure coordinates
      mol_image_base64:
        range: Base64StringType
        description: Base64-encoded 2D structure image (PNG format) for visualization
      cd_formula:
        range: string
        description: Molecular formula (e.g. "C10H17N3O6S")
      cd_mol_weight:
        range: float
        description: Molecular weight in Daltons (g/mol)
      calculated_log_p:
        range: float
        description: Calculated partition coefficient (LogP) — lipophilicity estimate.
          Higher values indicate greater lipophilicity.
      alogs:
        range: float
        description: ALogS — predicted aqueous solubility descriptor. Used in ADMET
          profiling.
      tpsa:
        range: float
        description: Topological Polar Surface Area (TPSA) in Å². Correlates with
          drug absorption and membrane permeability.
      lipinski:
        range: float
        description: Lipinski Rule of Five violation score (0–5). Drugs with >1 violation
          may have poor oral bioavailability.
      aromatic_carbons:
        range: integer
        description: Count of aromatic carbon atoms in the molecule
      sp3_count:
        range: integer
        description: Count of sp³-hybridized (tetrahedral) carbon atoms
      sp2_count:
        range: integer
        description: Count of sp²-hybridized carbon atoms
      sp_count:
        range: integer
        description: Count of sp-hybridized (linear) carbon atoms
      halogen_count:
        range: integer
        description: Count of halogen atoms (F, Cl, Br, I)
      hetero_sp2_count:
        range: integer
        description: Count of sp²-hybridized heteroatoms (N, O, S in aromatic rings)
      rotatable_bonds:
        range: integer
        description: Count of freely rotatable single bonds. Relates to molecular
          flexibility and oral bioavailability.
      o_n:
        range: integer
        description: Total count of oxygen and nitrogen atoms. Approximates hydrogen
          bond acceptor capacity.
      oh_nh:
        range: integer
        description: Count of OH and NH groups. Approximates hydrogen bond donor capacity.
      rgb:
        range: float
        description: Numeric RGB color encoding for structure rendering in visualization
          tools
      enhanced_stereo:
        range: boolean
        description: True if the molecule has enhanced stereochemistry annotation
          (V3000 MOL format)
      is_approved:
        range: boolean
        description: True if the drug is currently approved for clinical use in any
          jurisdiction
      has_been_withdrawn:
        range: boolean
        description: True if the drug has been withdrawn from the market
      black_box_warning:
        range: boolean
        description: True if the drug carries an FDA black box (boxed) warning
      year_of_first_approval:
        range: integer
        description: Calendar year of first regulatory approval (any jurisdiction)
      maximum_clinical_trial_phase:
        range: float
        description: Highest clinical trial phase the drug has reached (0–4). 4 =
          marketed/approved, 0 = preclinical/experimental.
      status:
        range: string
        description: Regulatory development status string (e.g. "Approved", "Investigational",
          "Withdrawn", "Experimental").
      fda_labels:
        range: integer
        description: Count of FDA Structured Product Labels (SPLs) associated with
          this drug
      number_of_formulations:
        range: integer
        description: Number of distinct drug formulations approved/registered
      chemical_abstracts_service_number:
        range: string
        description: CAS Registry Number — the gold-standard chemical compound identifier
          from the American Chemical Society (e.g. "57-27-2" for morphine).
      unique_ingredient_identifier:
        range: string
        description: FDA Unique Ingredient Identifier (UNII) — a non-proprietary,
          free, unique, unambiguous, non-semantic, alphanumeric identifier.
      struct_id:
        range: string
        description: DrugCentral internal structure identifier
      cd_id:
        range: string
        description: Calculated descriptor identifier from DrugCentral
      mrdef:
        range: string
        description: MeSH pharmacological action definition string — describes the
          drug's therapeutic category in MeSH vocabulary.
  Exposure:
    is_a: OptimusNode
    description: 'An environmental, chemical, lifestyle, or other exposure concept
      represented in OptimusKG. Current Neo4j label: `EXP`.


      Property detail from OptimusKG source schema: A chemical, physical, or environmental
      exposure node. Represents 881 exposures (0.5% of nodes) linked to biological
      outcomes via CTD (Comparative Toxicogenomics Database). Covers chemical exposures,
      physical agents, dietary factors, and lifestyle exposures. Source: Comparative
      Toxicogenomics Database (CTD). Node file: nodes/exposure.parquet'
    class_uri: biolink:EnvironmentalExposure
    slots:
    - id
    - name
    - original_optimus_label
    - direct_sources
    - indirect_sources
    - has_synonym
    - has_cross_reference
    annotations:
      neo4j_label:
        tag: neo4j_label
        value: EXP
      optimus_abbreviation:
        tag: optimus_abbreviation
        value: EXP
      property_schema_source:
        tag: property_schema_source
        value: ExposureNode
    slot_usage:
      name:
        description: Exposure name (MeSH preferred term, e.g. "Benzo(a)pyrene", "Arsenic")
        range: string
    attributes:
      source_categories:
        range: string
        multivalued: true
        description: Categories describing the origin or context of the exposure (e.g.
          "chemical", "biological", "physical", "dietary", "lifestyle")
      source_details:
        range: string
        description: Free-text description providing additional source-specific context
          for the exposure (e.g. specific exposure routes, measurement context)
  Gene:
    is_a: OptimusNode
    description: 'A gene or gene-level biological entity represented in OptimusKG.
      Current Neo4j label: `GEN`.


      Property detail from OptimusKG source schema: A protein-coding or non-coding
      gene node. Represents 61,306 human genes (32.2% of nodes) from Ensembl, harmonized
      with HGNC approved symbols. Contains rich molecular, functional, pharmacological,
      and clinical metadata sourced from Open Targets, DisGeNET, Bgee, and HGNC. Primary
      ontologies: ENSG (Ensembl Gene IDs), NCBIGene. Node file: nodes/gene.parquet'
    class_uri: biolink:Gene
    slots:
    - id
    - name
    - symbol
    - original_optimus_label
    - direct_sources
    - indirect_sources
    - encodes
    - has_synonym
    - has_cross_reference
    annotations:
      neo4j_label:
        tag: neo4j_label
        value: GEN
      optimus_abbreviation:
        tag: optimus_abbreviation
        value: GEN
      property_schema_source:
        tag: property_schema_source
        value: GeneNode
    slot_usage:
      symbol:
        description: Official HGNC-approved gene symbol (e.g. "TP53", "BRCA1"). Primary
          human-readable identifier for the gene.
        range: string
      name:
        description: Full official gene name from HGNC (e.g. "tumor protein p53").
        range: string
    attributes:
      biotype:
        range: GeneBiotypeEnum
        description: Ensembl gene biotype classification (e.g. protein_coding, lncRNA,
          miRNA). Determines the functional class of the gene product.
      genomic_location:
        range: GenomicLocation
        description: Chromosomal coordinates of the gene locus. Chromosome, start,
          end positions (0-based Ensembl convention), and strand. From Ensembl.
      transcription_start_site:
        range: integer
        description: Genomic coordinate of the transcription start site (TSS) for
          this gene. Used in regulatory and promoter analyses.
      canonical_transcript:
        range: CanonicalTranscript
        description: The primary/canonical Ensembl transcript selected as MANE Select
          or Ensembl canonical. Includes coordinates and transcript ID.
      canonical_exons:
        range: string
        multivalued: true
        description: 'List of Ensembl exon coordinates for the canonical transcript.
          Format: chromosomal coordinate strings.'
      transcript_ids:
        range: string
        multivalued: true
        description: All Ensembl transcript IDs associated with this gene locus (e.g.
          ENST00000295754).
      synonyms:
        range: LabelSourcePair
        multivalued: true
        description: General gene synonyms with source database attribution. Includes
          both symbol and name synonyms from multiple databases.
      symbol_synonyms:
        range: LabelSourcePair
        multivalued: true
        description: Alternative gene symbols with source attribution (e.g. "TGFR-2"
          for TGFBR2, from HGNC or UniProt).
      name_synonyms:
        range: LabelSourcePair
        multivalued: true
        description: Alternative full gene names with source attribution.
      obsolete_symbols:
        range: LabelSourcePair
        multivalued: true
        description: Deprecated or retired gene symbols with source attribution. Useful
          for resolving legacy identifiers in older datasets.
      obsolete_names:
        range: LabelSourcePair
        multivalued: true
        description: Deprecated or retired gene names with source attribution.
      xrefs:
        range: LabelSourcePair
        multivalued: true
        description: Cross-references to external databases (e.g. HGNC, PDB, ChEMBL,
          DrugBank, Reactome, InterPro, SignalP). Each xref has an ID and source.
      alternative_genes:
        range: string
        multivalued: true
        description: Alternative Ensembl or other gene identifiers at the same locus
          (e.g. readthrough transcripts, alternate assemblies).
      associated_proteins:
        range: LabelSourcePair
        multivalued: true
        description: Associated UniProt protein accession numbers with source attribution.
          Links gene-level records to protein-level databases.
      function_descriptions:
        range: string
        multivalued: true
        description: Free-text functional descriptions of the gene product. Sourced
          from UniProt, HGNC, and Open Targets.
      subcellular_locations:
        range: SubcellularLocation
        multivalued: true
        description: Subcellular compartment annotations from UniProt and Human Protein
          Atlas. Each entry has a location name, ontology term (SL-XXXXX), and source.
      target_class:
        range: TargetClass
        multivalued: true
        description: Drug target class classification from ChEMBL/Open Targets target
          family hierarchy (e.g. Kinase, GPCR, Ion channel, Enzyme).
      target_enabling_package:
        range: TargetEnablingPackage
        description: Structural Genomics Consortium (SGC) Target Enabling Package
          (TEP) annotation, if available. Indicates availability of validated tool
          compounds and structural data for the target.
      tractability:
        range: TractabilityAssessment
        multivalued: true
        description: Drug tractability assessment buckets from the Open Targets tractability
          pipeline. Covers small molecule, antibody, PROTAC, and other clinical modalities.
          Each bucket has a boolean flag indicating tractability evidence.
      chemical_probes:
        range: ChemicalProbe
        multivalued: true
        description: Chemical probe annotations from the Probes & Drugs portal. Provides
          quality scores and tool compound information for target validation.
      constraint_scores:
        range: ConstraintScore
        multivalued: true
        description: Evolutionary constraint scores from gnomAD (via Open Targets).
          Includes pLI, LOEUF, missense o/e ratios, and confidence intervals. Indicates
          tolerance or intolerance of loss-of-function variants.
      safety_liabilities:
        range: SafetyLiability
        multivalued: true
        description: Safety liability annotations from Open Targets Safety. Documents
          adverse events, biosample context, and supporting studies for each safety
          concern associated with the gene product.
      hallmarks_attributes:
        range: HallmarkAttribute
        multivalued: true
        description: Cancer hallmark attribute annotations from COSMIC Cancer Gene
          Census. Describes functional attributes of the gene's role in cancer (e.g.
          "impact of mutation on function").
      cancer_hallmarks:
        range: CancerHallmark
        multivalued: true
        description: Cancer hallmark classifications based on the Hanahan & Weinberg
          hallmarks framework. Each entry specifies impact (promotes/suppresses) and
          the hallmark category (e.g. "suppression of growth").
      homologues:
        range: Homologue
        multivalued: true
        description: Ortholog and paralog annotations from Ensembl Compara (via Open
          Targets). Covers multiple species with sequence identity metrics and confidence
          flags.
  MolecularFunction:
    is_a: OptimusNode
    description: 'A Gene Ontology molecular function term represented in OptimusKG.
