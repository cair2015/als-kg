    class_uri: okg:PhenotypeParentPhenotypeRelationship
    slot_usage:
      subject:
        range: Phenotype
        description: Source Phenotype node with Neo4j label `PHE`.
      object:
        range: Phenotype
        description: Target Phenotype node with Neo4j label `PHE`.
      original_optimus_relationship_type:
        equals_string: PARENT
    annotations:
      neo4j_relationship_type:
        tag: neo4j_relationship_type
        value: PARENT
      neo4j_start_label:
        tag: neo4j_start_label
        value: PHE
      neo4j_end_label:
        tag: neo4j_end_label
        value: PHE
      direct_slot:
        tag: direct_slot
        value: phenotype_parent_phenotype
      relationship_family:
        tag: relationship_family
        value: PhenotypeHierarchyRelationship
      semantic_view_note:
        tag: semantic_view_note
        value: Concrete current Neo4j relationship type; use its parent is_a hierarchy
          for semantic grouping.
  PathwayHasMemberGeneRelationship:
    is_a: GenePathwayAnnotationRelationship
    description: A pathway-to-gene relationship corresponding to Neo4j `(:Pathway)-[:INTERACTS_WITH]->(:Gene)`.
      In the semantic view, interpret as pathway membership/participation rather than
      a generic interaction.
    class_uri: okg:PathwayInteractsWithGeneRelationship
    slot_usage:
      subject:
        range: Pathway
        description: Source Pathway node with Neo4j label `PWY`.
      object:
        range: Gene
        description: Target Gene node with Neo4j label `GEN`.
      original_optimus_relationship_type:
        equals_string: INTERACTS_WITH
    annotations:
      neo4j_relationship_type:
        tag: neo4j_relationship_type
        value: INTERACTS_WITH
      neo4j_start_label:
        tag: neo4j_start_label
        value: PWY
      neo4j_end_label:
        tag: neo4j_end_label
        value: GEN
      direct_slot:
        tag: direct_slot
        value: pathway_interacts_with_gene
      relationship_family:
        tag: relationship_family
        value: GenePathwayAnnotationRelationship
      semantic_view_note:
        tag: semantic_view_note
        value: Concrete current Neo4j relationship type; use its parent is_a hierarchy
          for semantic grouping.
  PathwayHasParentPathwayRelationship:
    is_a: PathwayHierarchyRelationship
    description: Reified schema class for the current Neo4j pattern `(:PWY)-[:PARENT]->(:PWY)`,
      represented with full class names as Pathway -> Pathway. Parent-child hierarchy
      relationship from the source concept to a broader or parent concept in the same
      or related ontology.
    class_uri: okg:PathwayParentPathwayRelationship
    slot_usage:
      subject:
        range: Pathway
        description: Source Pathway node with Neo4j label `PWY`.
      object:
        range: Pathway
        description: Target Pathway node with Neo4j label `PWY`.
      original_optimus_relationship_type:
        equals_string: PARENT
    annotations:
      neo4j_relationship_type:
        tag: neo4j_relationship_type
        value: PARENT
      neo4j_start_label:
        tag: neo4j_start_label
        value: PWY
      neo4j_end_label:
        tag: neo4j_end_label
        value: PWY
      direct_slot:
        tag: direct_slot
        value: pathway_parent_pathway
      relationship_family:
        tag: relationship_family
        value: PathwayHierarchyRelationship
      semantic_view_note:
        tag: semantic_view_note
        value: Concrete current Neo4j relationship type; use its parent is_a hierarchy
          for semantic grouping.
  Sources:
    description: 'Provenance tracking struct present on every node and edge in OptimusKG.
      Distinguishes between datasets that directly contributed the entity (primary
      ingestors) and those referenced indirectly through aggregators. Example direct
      sources: Open Targets, DisGeNET, Bgee. Example indirect sources: ClinGen, PsyGeNET,
      UniProt (via Open Targets).'
    attributes:
      direct:
        range: string
        multivalued: true
        description: List of primary data source names that directly contributed this
          entity or relationship to OptimusKG (e.g. "Open Targets", "DisGeNET", "Bgee").
      indirect:
        range: string
        multivalued: true
        description: List of upstream data sources referenced via provenance of primary
          sources (e.g. "ClinGen", "PsyGeNET", "UniProt").
    annotations:
      source_schema:
        tag: source_schema
        value: optimuskg_schema.yaml
  OntologyMetadata:
    description: Metadata about the source ontology for a node. Captured verbatim
      from the OWL or JSON ontology file header at ingestion time.
    attributes:
      title:
        range: string
        description: Human-readable title of the ontology (e.g. "Human Phenotype Ontology")
      description:
        range: string
        description: Brief textual description of the ontology's scope and purpose
      license:
        range: string
        description: License under which the ontology is distributed (e.g. "CC BY
          4.0")
      version:
        range: string
        description: Version string or release date of the ontology (e.g. "v2025-05-06"
          for HPO, "v656" for DOID, "current" for dynamic releases)
    annotations:
      source_schema:
        tag: source_schema
        value: optimuskg_schema.yaml
  LabelSourcePair:
    description: A label paired with its originating source database. Used for gene
      synonyms, symbol synonyms, name synonyms, obsolete symbols, obsolete names,
      and associated proteins on Gene nodes.
    attributes:
      label:
        range: string
        required: true
        description: The text label or identifier string
      source:
        range: string
        description: Name of the source database providing this label
    annotations:
      source_schema:
        tag: source_schema
        value: optimuskg_schema.yaml
  GenomicLocation:
    description: Chromosomal coordinates for a gene's genomic locus from Ensembl.
      Coordinates are 0-based (Ensembl convention).
    attributes:
      chromosome:
        range: string
        description: Chromosome name (e.g. "1", "X", "MT")
      start:
        range: integer
        description: Start position (0-based, inclusive)
      end:
        range: integer
        description: End position (exclusive)
      strand:
        range: integer
        description: 'Strand orientation: +1 for forward (sense) strand, -1 for reverse
          (antisense) strand'
    annotations:
      source_schema:
        tag: source_schema
        value: optimuskg_schema.yaml
  CanonicalTranscript:
    description: The primary/canonical Ensembl transcript for a gene, as designated
      by MANE Select or Ensembl canonical annotation.
    attributes:
      id:
        range: string
        description: Ensembl transcript ID (e.g. ENST00000295754)
      chromosome:
        range: string
        description: Chromosome name
      start:
        range: integer
        description: Transcript start position (0-based)
      end:
        range: integer
        description: Transcript end position (exclusive)
      strand:
        range: string
        description: Strand ("+" or "-")
    annotations:
      source_schema:
        tag: source_schema
        value: optimuskg_schema.yaml
  SubcellularLocation:
    description: A subcellular localization annotation for a gene product. Sourced
      from UniProt and Human Protein Atlas (HPA) via Open Targets.
    attributes:
      location:
        range: string
        description: Human-readable subcellular compartment name (e.g. "Cell membrane")
      source:
        range: string
        description: Data source for this annotation (e.g. "UniProt", "HPA")
      term_sl:
        range: string
        description: Subcellular location ontology term ID (SL-XXXXX format)
      label_sl:
        range: string
        description: Human-readable label for the ontology term
    annotations:
      source_schema:
        tag: source_schema
        value: optimuskg_schema.yaml
  TargetClass:
    description: Drug target classification for a gene product within a hierarchical
      druggability taxonomy (e.g. ChEMBL target families). From Open Targets.
    attributes:
      id:
        range: integer
        description: Numeric target class identifier
      label:
        range: string
        description: Target class label (e.g. "Kinase", "GPCR", "Ion channel")
      level:
        range: string
        description: Hierarchy level within the target class taxonomy (e.g. "1", "2")
    annotations:
      source_schema:
        tag: source_schema
        value: optimuskg_schema.yaml
  TargetEnablingPackage:
    description: Annotation from the Structural Genomics Consortium (SGC) Target Enabling
      Package (TEP) program, indicating research tool availability for a target. Sourced
      via Open Targets.
    attributes:
      target_from_source_id:
        range: string
        description: Source target identifier for cross-referencing
      description:
        range: string
        description: Free-text description of the TEP
      therapeutic_area:
        range: string
        description: Associated therapeutic area for this TEP
      url:
        range: uri
        description: URL to the TEP resource page
    annotations:
      source_schema:
        tag: source_schema
        value: optimuskg_schema.yaml
  TractabilityAssessment:
    description: A single tractability assessment for a gene product under a specific
      drug modality (small molecule, antibody, PROTAC, other clinical). Each bucket
      has a boolean value indicating whether tractability evidence exists. Sourced
      from the Open Targets tractability pipeline.
    attributes:
      modality:
        range: DrugTractabilityModalityEnum
        description: Drug modality (sm=small molecule, ab=antibody, pr=PROTAC, oc=other
          clinical)
      id:
        range: string
        description: Tractability bucket identifier (e.g. "approved_drug", "structure_with_ligand",
          "high_quality_ligand", "uniprot_loc_high_conf")
      value:
        range: boolean
        description: True if the gene meets this tractability criterion
    annotations:
      source_schema:
        tag: source_schema
        value: optimuskg_schema.yaml
  ConstraintScore:
    description: Evolutionary constraint and intolerance score for a gene, derived
      from gnomAD population genetics data via Open Targets. Metrics include pLI,
      LOEUF (loss-of-function observed/expected upper bound fraction), and missense
      constraint scores. Used to assess whether loss-of-function variants in a gene
      are depleted in the population.
    attributes:
      constraint_type:
        range: string
        description: Type of constraint score (e.g. "lof" for pLI/LOEUF, "mis" for
          missense)
      score:
        range: float
        description: Constraint score value (e.g. pLI probability)
      exp:
        range: float
        description: Expected number of variants of this type
      obs:
        range: integer
        description: Observed number of variants of this type
      oe:
        range: float
        description: Observed/expected (o/e) ratio
      oe_lower:
        range: float
        description: Lower bound of 90% confidence interval for o/e ratio
      oe_upper:
        range: float
        description: Upper bound of 90% confidence interval for o/e ratio
      upper_rank:
        range: integer
        description: Rank of this gene among all genes by this constraint metric (gnomAD)
      upper_bin:
        range: integer
        description: Decile bin (1–10) based on constraint rank
      upper_bin6:
        range: integer
        description: Sextile bin (1–6) based on constraint rank
    annotations:
      source_schema:
        tag: source_schema
        value: optimuskg_schema.yaml
  HallmarkAttribute:
    description: A cancer hallmark attribute annotation from the COSMIC Cancer Gene
      Census (CGC), linked to a PubMed reference. Describes functional attributes
      of the gene's role in cancer biology.
    attributes:
      pmid:
        range: integer
        description: PubMed ID of the supporting publication
      description:
        range: string
        description: Free-text description of the hallmark attribute
      attribute_name:
        range: string
        description: Canonical hallmark attribute name (CGC vocabulary)
    annotations:
      source_schema:
        tag: source_schema
        value: optimuskg_schema.yaml
  CancerHallmark:
    description: A cancer hallmark classification for a gene from the COSMIC Cancer
      Gene Census, including functional impact and hallmark category. Based on the
      Hanahan & Weinberg cancer hallmarks framework.
    attributes:
      pmid:
        range: integer
        description: PubMed ID of the supporting publication
      description:
        range: string
        description: Free-text description of the cancer hallmark
      impact:
        range: string
        description: Functional impact direction ("promotes" or "suppresses")
      label:
        range: string
        description: Cancer hallmark label (e.g. "suppression of growth", "invasion
          and metastasis")
    annotations:
      source_schema:
        tag: source_schema
        value: optimuskg_schema.yaml
  ChemicalProbe:
    description: A chemical probe annotation for a gene product from the Probes &
      Drugs portal, providing tool compound information for target validation studies.
    attributes:
      control:
        range: string
        description: Control compound identifier (negative control probe)
      drug_id:
        range: string
        description: Associated drug or compound identifier
      id:
        range: string
        description: Chemical probe identifier
      is_high_quality:
        range: boolean
        description: True if the probe meets high-quality criteria (Probes & Drugs
          score)
      mechanism_of_action:
        range: string
        multivalued: true
        description: Mechanisms of action of this probe
      origin:
        range: string
        multivalued: true
        description: Origin(s) of the probe (e.g. "academic", "commercial")
      probe_miner_score:
        range: integer
        description: ProbeMiner selectivity score
      probes_drugs_score:
        range: integer
        description: Probes & Drugs composite quality score
      score_in_cells:
        range: integer
        description: Probe activity score in cellular assays
      score_in_organisms:
        range: integer
        description: Probe activity score in organism-level assays
      target_from_source_id:
        range: string
        description: Source target identifier this probe is annotated against
      urls:
        range: ProbeURL
        multivalued: true
        description: Links to external resources for this probe
    annotations:
      source_schema:
        tag: source_schema
        value: optimuskg_schema.yaml
  ProbeURL:
    description: A named URL link for a chemical probe resource.
    attributes:
      nice_name:
        range: string
        description: Human-readable link name
      url:
        range: uri
        description: URL to the probe resource
    annotations:
      source_schema:
        tag: source_schema
        value: optimuskg_schema.yaml
  SafetyLiability:
    description: A safety liability annotation for a gene product from Open Targets
      Safety. Documents safety concerns from pharmacological studies, clinical evidence,
      and preclinical experiments.
    attributes:
      event:
        range: string
        description: Name of the safety event (e.g. "hepatotoxicity")
      event_id:
        range: string
        description: Ontology or controlled vocabulary identifier for the event
      effects:
        range: SafetyEffect
        multivalued: true
        description: Directional and dosing effects of the safety event
      biosamples:
        range: SafetyBiosample
        multivalued: true
        description: Biological samples or tissues where the event was observed
      datasource:
        range: string
        description: Name of the datasource providing this safety annotation
      literature:
        range: string
        description: Supporting literature reference(s)
      url:
        range: uri
        description: URL to the safety annotation resource
      studies:
        range: SafetyStudy
        multivalued: true
        description: Supporting study metadata
    annotations:
      source_schema:
        tag: source_schema
        value: optimuskg_schema.yaml
  SafetyEffect:
    description: Directional and dosing context for a safety event.
    attributes:
      direction:
        range: string
        description: Effect direction (e.g. "risk", "no risk")
      dosing:
        range: string
        description: Dosing context (e.g. "therapeutic", "toxic")
    annotations:
      source_schema:
        tag: source_schema
        value: optimuskg_schema.yaml
  SafetyBiosample:
    description: Biological sample/tissue context for a safety liability.
    attributes:
      cell_format:
        range: string
        description: Cell format (e.g. "cell line", "primary cells")
      cell_label:
        range: string
        description: Cell type label
      tissue_id:
        range: string
        description: Uberon or other ontology tissue identifier
      tissue_label:
        range: string
        description: Human-readable tissue name
    annotations:
      source_schema:
        tag: source_schema
        value: optimuskg_schema.yaml
  SafetyStudy:
    description: Study metadata supporting a safety liability annotation.
    attributes:
      description:
        range: string
        description: Free-text study description
      name:
        range: string
        description: Study name or title
      type:
        range: string
        description: Study type (e.g. "in vitro", "in vivo", "clinical")
    annotations:
      source_schema:
        tag: source_schema
        value: optimuskg_schema.yaml
  Homologue:
    description: An ortholog or paralog annotation for a gene across species. Sourced
      from Ensembl Compara via Open Targets.
    attributes:
      species_id:
        range: string
        description: NCBI taxonomy ID for the target species (e.g. "9606" for human)
      species_name:
        range: string
        description: Common or scientific name of the target species
      homology_type:
        range: HomologyTypeEnum
        description: Type of homology relationship (ortholog/paralog)
      target_gene_id:
        range: string
        description: Ensembl gene ID in the target species
      is_high_confidence:
        range: string
        description: High-confidence homology flag ("0" or "1")
      target_gene_symbol:
        range: string
        description: Gene symbol in the target species
      query_percentage_identity:
        range: float
        description: Percent sequence identity from query gene to target
      target_percentage_identity:
        range: float
        description: Percent sequence identity from target gene to query
      priority:
        range: integer
        description: Priority rank for this homologue (lower = higher priority)
    annotations:
      source_schema:
        tag: source_schema
        value: optimuskg_schema.yaml
  GeneAssociationEvidence:
    description: Shared evidence properties for gene association edges (DIS-GEN, PHE-GEN).
      Quantifies the strength and breadth of evidence linking a disease or phenotype
      to a gene using DisGeNET and Open Targets scoring systems.
    mixin: true
    attributes:
      evidence_score:
        range: float
        description: Aggregated evidence score from Open Targets — combines multiple
          data types (genetic, somatic, literature, pathway) into one metric.
      evidence_count:
        range: integer
        description: Total number of individual evidence items supporting this association
      evidence_index:
        range: float
        description: Normalized combined evidence index from Open Targets (0–1 scale)
      disease_specificity_index:
        range: float
        description: Disease Specificity Index (DSI) — quantifies how specific the
          gene's association is to this disease versus all diseases (0=pleiotropic,
          1=specific)
      disease_pleiotropy_index:
        range: float
        description: Disease Pleiotropy Index (DPI) — fraction of MeSH disease classes
          this gene is associated with. High DPI = highly pleiotropic gene.
      disgenet_score:
        range: float
        description: DisGeNET gene-disease association (GDA) score combining genetic,
          somatic, and literature evidence (0–1 scale).
      year_initial:
        range: string
        description: Year of the earliest supporting publication for this association
      year_final:
        range: string
        description: Year of the most recent supporting publication
      number_of_pmids:
        range: integer
        description: Number of distinct PubMed publications supporting this gene-disease/phenotype
          association.
      number_of_snps:
        range: integer
        description: Number of SNPs with evidence linking gene to disease/phenotype
          (from GWAS, ClinVar, or other sources).
    annotations:
      source_schema:
        tag: source_schema
        value: optimuskg_schema.yaml
  ExposureEpidemiologicalContext:
    description: Rich epidemiological context properties shared by all six EXP-* edge
      types (EXP-GEN, EXP-DIS, EXP-BPO, EXP-CCO, EXP-MFN, EXP-EXP). Sourced from CTD
      (Comparative Toxicogenomics Database). Encodes study design, demographics, measurement
      methods, and outcomes.
    mixin: true
    attributes:
      evidence_count:
        range: integer
        description: Number of evidence records supporting this exposure association
      number_of_receptors:
        range: integer
        description: Number of receptors or study participants in supporting studies
      receptors:
        range: string
        multivalued: true
        description: Receptor identifiers or names (e.g. cell line IDs, organism names)
      receptor_notes:
        range: string
        multivalued: true
        description: Free-text notes providing additional context about receptor types
      smoking_statuses:
        range: string
        multivalued: true
        description: Smoking status categories of study subjects
      sexes:
        range: string
        multivalued: true
        description: Sex categories of study subjects (e.g. "male", "female", "mixed")
      races:
        range: string
        multivalued: true
        description: Race/ethnicity categories reported in supporting studies
      methods:
        range: string
        multivalued: true
        description: Experimental or analytical methods used (e.g. "ICP-MS", "qPCR",
          "ELISA", "GC-MS")
      mediums:
        range: string
        multivalued: true
        description: Biological or environmental sample types measured (e.g. "blood",
          "urine", "serum", "tissue", "air")
      detection_limit:
        range: string
        multivalued: true
        description: Lower limit of detection values for exposure measurements
      detection_limit_uom:
        range: string
        multivalued: true
        description: Units of measurement for detection limit values (e.g. "μg/L",
          "ppb")
      detection_frequency:
        range: string
        multivalued: true
        description: Frequency of detection in study samples
      age_entries:
        range: string
        multivalued: true
        description: Age-stratified entry counts for study subjects
      age_range_values:
        range: string
        multivalued: true
        description: Age range values (e.g. "18-65 years")
      age_mean_values:
        range: string
        multivalued: true
        description: Mean age values of study subjects
      age_median_values:
        range: string
        multivalued: true
        description: Median age values of study subjects
      age_point_values:
        range: string
        multivalued: true
        description: Point age estimates (single age values)
      age_open_range_values:
        range: string
        multivalued: true
        description: Open-ended age ranges (e.g. "≥65 years", "<18 years")
      study_countries:
        range: string
        multivalued: true
        description: Countries where supporting studies were conducted
      states_or_provinces:
        range: string
        multivalued: true
        description: States or provinces of study sites
      city_town_region_areas:
        range: string
        multivalued: true
        description: City, town, or regional area of study sites
      outcome_relationships:
        range: string
        multivalued: true
        description: Types of observed exposure-outcome relationships (e.g. "positive",
          "negative")
      exposure_event_notes:
        range: string
        multivalued: true
        description: Free-text notes describing the exposure event
      exposure_outcome_notes:
        range: string
        multivalued: true
        description: Free-text notes on the observed exposure-outcome relationship
      references:
        range: string
        multivalued: true
        description: Supporting literature references (PMIDs or database citations)
      associated_study_titles:
        range: string
        multivalued: true
        description: Titles of studies supporting this exposure association
      enrollment_start_years:
        range: string
        multivalued: true
        description: Study enrollment start year(s)
      enrollment_end_years:
        range: string
        multivalued: true
        description: Study enrollment end year(s)
      study_factors:
        range: string
        multivalued: true
        description: Study design factors or covariates (e.g. "adjusted for age",
          "longitudinal")
      assay_notes:
        range: string
        multivalued: true
        description: Free-text notes about assay methods and conditions
    annotations:
      source_schema:
        tag: source_schema
        value: optimuskg_schema.yaml
  GOAnnotationProperties:
    description: Shared Gene Ontology annotation evidence properties for GO-Gene edges
      (BPO-GEN, MFN-GEN, CCO-GEN). Records GO evidence codes and gene product context
      from the Gene Ontology Annotation (GOA) database via Open Targets.
    mixin: true
    attributes:
      evidence:
        range: string
        multivalued: true
        description: GO evidence codes supporting this annotation (e.g. "IDA" = Inferred
          from Direct Assay, "IMP" = Inferred from Mutant Phenotype, "TAS" = Traceable
          Author Statement, "IEA" = Inferred from Electronic Annotation).
      gene_product:
        range: string
        multivalued: true
        description: Gene product identifiers annotated to this GO term (UniProt accessions
          or Ensembl protein IDs).
      eco_ids:
        range: string
        multivalued: true
        description: Evidence & Conclusion Ontology (ECO) identifiers corresponding
          to the GO evidence codes (e.g. ECO:0000269 for experimental evidence).
    annotations:
      source_schema:
        tag: source_schema
        value: optimuskg_schema.yaml
  OptimusKGDataset:
    tree_root: true
    description: "Top-level container class for an OptimusKG dataset instance. Corresponds\
      \ to the full graph or largest connected component (LCC) distribution released\
      \ on Harvard Dataverse.\nFull graph statistics:\n  - 190,531 nodes (10 types)\n\
      \  - 21,813,816 edges (27 types)\n  - 67,249,863 property instances\n  - 110,276,843\
      \ property values\n  - 150 distinct property keys\n\nLCC statistics (largest\
      \ connected component):\n  - 189,364 nodes (~99.4% of full graph)\n  - Remaining\
      \ 1,167 nodes in 430 smaller components\n\nData availability: https://doi.org/10.7910/DVN/IYNGEV\
      \ Format: Apache Parquet (flat nodes.parquet/edges.parquet +\n        stratified\
      \ nodes/<type>.parquet and edges/<label>.parquet)"
    attributes:
      genes:
        range: Gene
        multivalued: true
        inlined_as_list: true
        description: Gene nodes (61,306 in full graph)
      drugs:
        range: Drug
        multivalued: true
        inlined_as_list: true
        description: Drug nodes (16,766 in full graph)
      diseases:
        range: Disease
        multivalued: true
        inlined_as_list: true
        description: Disease nodes (36,345 in full graph)
      phenotypes:
        range: Phenotype
        multivalued: true
        inlined_as_list: true
        description: Phenotype nodes (19,341 in full graph)
      anatomies:
        range: Anatomy
        multivalued: true
        inlined_as_list: true
        description: Anatomy nodes (13,120 in full graph)
      pathways:
        range: Pathway
        multivalued: true
        inlined_as_list: true
        description: Pathway nodes (2,805 in full graph)
      biological_processes:
        range: BiologicalProcess
        multivalued: true
        inlined_as_list: true
        description: Biological Process nodes (25,754 in full graph)
