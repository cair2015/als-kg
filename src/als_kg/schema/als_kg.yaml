---
id: https://cair2015.github.io/als-kg
name: als_kg
title: ALS Knowledge Graph Ontology Model
description: >-
  Comprehensive ontology model for the ALS Knowledge Graph (ALS-KG). Uses a local default namespace for ALS-specific classes
  and slots, explicit Biolink/ontology URIs only for externally defined concepts and predicates, direct object properties
  for canonical KG edges, and optional evidence-bearing association classes for provenance-rich statements.
version: 2.1.2
license: MIT
prefixes:
  linkml: https://w3id.org/linkml/
  alskb: https://cair2015.github.io/als-kg/elements/
  biolink: https://w3id.org/biolink/vocab/
  owl: http://www.w3.org/2002/07/owl#
  rdf: http://www.w3.org/1999/02/22-rdf-syntax-ns#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  obo: http://purl.obolibrary.org/obo/
  MONDO: http://purl.obolibrary.org/obo/MONDO_
  HP: http://purl.obolibrary.org/obo/HP_
  UBERON: http://purl.obolibrary.org/obo/UBERON_
  NCBIGene: https://www.ncbi.nlm.nih.gov/gene/
  UniProtKB: https://www.uniprot.org/uniprot/
  ClinVar: https://www.ncbi.nlm.nih.gov/clinvar/variation/
  DrugBank: https://www.drugbank.ca/drugs/
  GO: http://purl.obolibrary.org/obo/GO_
  Reactome: https://identifiers.org/reactome/
  CTD: http://ctdbase.org/detail.go?type=chem&acc=
  xsd: http://www.w3.org/2001/XMLSchema#
  schema: http://schema.org/
  dcterms: http://purl.org/dc/terms/
  IAO: http://purl.obolibrary.org/obo/IAO_
  RO: http://purl.obolibrary.org/obo/RO_
  BFO: http://purl.obolibrary.org/obo/BFO_
  ECO: http://purl.obolibrary.org/obo/ECO_
  SIO: http://semanticscience.org/resource/
  oboInOwl: http://www.geneontology.org/formats/oboInOwl#
  HGNC: https://www.genenames.org/data/gene-symbol-report/#!/hgnc_id/
  ENSEMBL: https://identifiers.org/ensembl/
  dbSNP: https://www.ncbi.nlm.nih.gov/snp/
  ChEMBL: https://www.ebi.ac.uk/chembl/compound_report_card/
  MeSH: https://id.nlm.nih.gov/mesh/
  OMIM: https://omim.org/entry/
  ORPHANET: http://www.orpha.net/ORDO/Orphanet_
  UMLS: https://uts.nlm.nih.gov/uts/umls/concept/
  ICD10CM: https://icd.codes/icd10cm/
  CAS: https://commonchemistry.cas.org/detail?cas_rn=
  DOI: https://doi.org/
  PMID: https://pubmed.ncbi.nlm.nih.gov/
default_prefix: alskb
default_range: string
imports:
- linkml:types
slots:
  id:
    description: Unique identifier (IRI or URI)
    range: uriorcurie
    identifier: true
    required: true
    slot_uri: schema:identifier
  label:
    description: Human-readable label for the entity
    range: string
    required: true
    slot_uri: rdfs:label
  definition:
    description: Textual definition following OBO definition format
    range: string
    slot_uri: IAO:0000115
  synonym:
    description: Alternative names or labels
    range: string
    multivalued: true
    slot_uri: oboInOwl:hasRelatedSynonym
  xref:
    description: >-
      Cross-reference to equivalent entity in another ontology. Format: ONTOLOGY_PREFIX:identifier (e.g. OMIM:104300, Reactome:R-HSA-5673001,
      GO:0006810)
    range: string
    multivalued: true
    slot_uri: oboInOwl:hasDbXref
  comment:
    description: Informal comment or note on entity
    range: string
    slot_uri: rdfs:comment
  is_obsolete:
    description: Whether this entity is deprecated/obsolete
    range: boolean
    ifabsent: 'false'
    slot_uri: owl:deprecated
  subject:
    description: Subject of the relationship (resource IRI)
    range: string
    required: true
    slot_uri: rdf:subject
  predicate:
    description: Predicate / property type IRI
    range: uriorcurie
    required: true
    slot_uri: rdf:predicate
  object:
    description: Object of the relationship (resource IRI)
    range: string
    required: true
    slot_uri: rdf:object
  has_anatomy:
    description: Referenced anatomy entity in an association record.
    range: Anatomy
  has_disease:
    description: Referenced disease entity in an association record.
    range: Disease
  has_drug:
    description: Referenced drug entity in an association record.
    range: Drug
  has_gene:
    description: Referenced gene entity in an association record.
    range: Gene
  has_phenotype:
    description: Referenced phenotype entity in an association record.
    range: Phenotype
  has_protein:
    description: Referenced protein entity in an association record.
    range: Protein
  has_pathway:
    description: Referenced Reactome pathway entity in an association record.
    range: Pathway
  has_variant:
    description: Referenced variant entity in an association record.
    range: Variant
  disease_manifests_as_phenotype:
    description: Disease has or presents with a phenotype or clinical feature.
    slot_uri: biolink:has_phenotype
    domain: Disease
    range: Phenotype
    multivalued: true
  disease_affects_anatomy:
    description: Disease affects, involves, or primarily manifests in an anatomical structure.
    domain: Disease
    range: Anatomy
    multivalued: true
    close_mappings:
    - biolink:affects
  gene_associated_with_disease:
    description: Gene has causal, risk, modifier, protective, or correlative association with disease.
    slot_uri: biolink:gene_associated_with_condition
    domain: Gene
    range: Disease
    multivalued: true
  variant_associated_with_disease:
    description: Sequence variant has causal, risk, modifier, protective, or correlative association with disease.
    slot_uri: biolink:variant_associated_with_condition
    domain: Variant
    range: Disease
    multivalued: true
  variant_affects_protein:
    description: Sequence variant changes or is predicted to affect a protein product.
    domain: Variant
    range: Protein
    multivalued: true
    close_mappings:
    - biolink:affects
  gene_encodes_protein:
    description: Gene encodes a protein product.
    domain: Gene
    range: Protein
    multivalued: true
    slot_uri: RO:0002205
  protein_interacts_with_protein:
    description: Protein physically or functionally interacts with another protein.
    slot_uri: biolink:interacts_with
    domain: Protein
    range: Protein
    multivalued: true
  protein_participates_in_pathway:
    description: Protein participates in or is annotated to a Reactome pathway.
    slot_uri: biolink:participates_in
    domain: Protein
    range: Pathway
    multivalued: true
  drug_targets_molecular_entity:
    description: Drug, biologic, ASO, or other therapeutic agent targets a gene or protein.
    slot_uri: biolink:targets
    domain: Drug
    range: MolecularEntity
    multivalued: true
  drug_treats_or_modulates_disease:
    description: Drug treats, modifies, palliates, or is being investigated for a disease.
    domain: Drug
    range: Disease
    multivalued: true
    close_mappings:
    - biolink:treats
  exposure_associated_with_disease:
    description: Environmental exposure or stressor is associated with disease risk or progression.
    domain: ExposureOrStressor
    range: Disease
    multivalued: true
    close_mappings:
    - biolink:associated_with
  transcription_factor_regulates_gene:
    description: Transcription factor regulates the expression of a target gene.
    slot_uri: biolink:regulates
    domain: TranscriptionFactor
    range: Gene
    multivalued: true
  gene_expressed_in_anatomy:
    description: Gene is expressed in an anatomical structure, tissue, or cell-type context.
    slot_uri: biolink:expressed_in
    domain: Gene
    range: Anatomy
    multivalued: true
  disease_related_to_disease:
    description: Disease is related to another disease by comorbidity, shared etiology, similar mechanism, or phenotypic similarity.
    slot_uri: biolink:related_to
    domain: Disease
    range: Disease
    multivalued: true
  gene_participates_in_process:
    description: Gene or gene product participates in a biological process.
    slot_uri: biolink:participates_in
    domain: Gene
    range: BiologicalProcess
    multivalued: true
  gene_has_molecular_function:
    description: Gene or gene product has a molecular activity or function.
    domain: Gene
    range: MolecularFunction
    multivalued: true
    slot_uri: RO:0000085
  protein_localized_to_cellular_component:
    description: Protein localizes to or is active in a cellular component.
    slot_uri: biolink:located_in
    domain: Protein
    range: CellularComponent
    multivalued: true
  source:
    description: Data source name
    range: string
    slot_uri: dcterms:source
  source_version:
    description: Source version or release date
    range: string
    slot_uri: dcterms:hasVersion
  source_url:
    description: URL to source resource
    range: uriorcurie
    slot_uri: schema:url
  confidence:
    description: Confidence or quality score (0.0-1.0)
    range: float
    minimum_value: 0.0
    maximum_value: 1.0
  evidence_type:
    description: Type of supporting evidence
    range: EvidenceTypeEnum
    slot_uri: ECO:0000000
  evidence_source:
    description: Specific study/publication supporting the statement
    range: string
  ingest_date:
    description: Date of ETL ingest
    range: date
  last_updated:
    description: Last modification date
    range: date
    slot_uri: dcterms:modified
types:
  MondoIdentifier:
    typeof: string
    uri: xsd:string
    description: MONDO disease ontology identifier (e.g. MONDO:0007743)
    pattern: "^MONDO:\\d{7}$"
  HpoIdentifier:
    typeof: string
    uri: xsd:string
    description: HPO phenotype term identifier (e.g. HP:0007354)
    pattern: "^HP:\\d{7}$"
  UberonIdentifier:
    typeof: string
    uri: xsd:string
    description: UBERON anatomy ontology identifier
    pattern: "^UBERON:\\d+$"
  NcbiGeneIdentifier:
    typeof: string
    uri: xsd:string
    description: NCBI Entrez Gene numeric ID
    pattern: "^\\d+$"
  UniprotIdentifier:
    typeof: string
    uri: xsd:string
    description: UniProt accession identifier
    pattern: "^[A-Z0-9]{6}$"
  ClinvarIdentifier:
    typeof: string
    uri: xsd:string
    description: ClinVar variation numeric ID
    pattern: "^\\d+$"
  DrugBankIdentifier:
    typeof: string
    uri: xsd:string
    description: DrugBank primary identifier (e.g. DB00533)
    pattern: "^DB\\d{5}$"
  GoIdentifier:
    typeof: string
    uri: xsd:string
    description: Gene Ontology term identifier (e.g. GO:0006810)
    pattern: '^GO:\d{7}$'
  ReactomeIdentifier:
    typeof: string
    uri: xsd:string
    description: Reactome stable pathway identifier as a CURIE (e.g. Reactome:R-HSA-5673001)
    pattern: '^Reactome:R-HSA-\d+(\.\d+)?$'
  CtdIdentifier:
    typeof: string
    uri: xsd:string
    description: CTD chemical/stressor identifier
enums:
  DiseaseTypeEnum:
    permissible_values:
      sporadic:
        description: Occurs without family history
      familial:
        description: Inherited pattern of occurrence
      syndromic:
        description: Part of larger syndrome
  OnsetTypeEnum:
    permissible_values:
      bulbar:
        description: Facial/tongue muscles affected first
      limb:
        description: Arm or leg muscles affected first
      respiratory:
        description: Breathing muscles affected first
      generalized:
        description: Multiple sites affected simultaneously
      unknown:
        description: Onset location unknown
  GeneTypeEnum:
    permissible_values:
      protein_coding: {}
      lncRNA: {}
      miRNA: {}
      pseudogene: {}
      other: {}
  VariantTypeEnum:
    permissible_values:
      SNV:
        description: Single nucleotide variant
      indel:
        description: Insertion or deletion
      repeat_expansion:
        description: Trinucleotide repeat expansion
      CNV:
        description: Copy number variation
      structural:
        description: Structural variant (inversion, translocation)
  RelationshipTypeEnum:
    description: Standard relationship types following RDF/OWL semantics
    permissible_values:
      is_a:
        description: Subclass relationship (taxonomic)
      part_of:
        description: Mereological (compositional) relationship
      proper_part_of:
        description: Strict part-of (excludes identity)
      participates_in:
        description: Agent participates in process
      has_participant:
        description: Process has participant
      regulates:
        description: Regulatory relationship (direction unspecified)
      positively_regulates:
        description: Upregulation/activation
      negatively_regulates:
        description: Downregulation/inhibition
      associated_with:
        description: Statistical/empirical association
      affects:
        description: Causal or functional modification
  EvidenceTypeEnum:
    permissible_values:
      curated:
        description: Manually curated from literature
      experimental:
        description: Derived from wet-lab experiments
      computational:
        description: Result of computational analysis
      inferred:
        description: Inferred from other statements
      predicted:
        description: Machine learning prediction
      text_mined:
        description: Extracted via natural language processing
classes:
  NamedEntity:
    description: >-
      Root class for all named entities in the ALS-KG ontology. Provides core ontology metadata (id, label, definition, synonyms,
      xrefs).
    abstract: true
    attributes:
      id:
        description: Persistent unique identifier (IRI)
        required: true
        slot_uri: schema:identifier
      label:
        description: Preferred human-readable label
        required: true
        slot_uri: rdfs:label
      definition:
        description: Formal textual definition
        slot_uri: IAO:0000115
      synonym:
        description: Alternative names
        slot_uri: oboInOwl:hasRelatedSynonym
      xref:
        description: Cross-references to external ontologies
        slot_uri: oboInOwl:hasDbXref
      comment:
        description: Informal notes or comments
        slot_uri: rdfs:comment
      is_obsolete:
        description: Deprecation flag
        ifabsent: 'false'
        slot_uri: owl:deprecated
      source:
        description: Original source/database
        slot_uri: dcterms:source
      last_updated:
        description: Last modification timestamp
        slot_uri: dcterms:modified
    class_uri: biolink:NamedThing
  OntologyClass:
    description: >-
      Abstract base for entity classes (nodes in knowledge graph). Inherits from NamedEntity with semantic web compatible
      metadata.
    abstract: true
    is_a: NamedEntity
    attributes:
      source_version:
        description: Source database/ontology version
        slot_uri: dcterms:hasVersion
      ingest_date:
        description: When entity was imported into ALS-KG
    class_uri: owl:Class
  Relationship:
    description: >-
      Abstract base for reified relationships (edges with explicit properties). Follows RDF triple pattern: subject, predicate,
      object. Can carry additional metadata (confidence, evidence, provenance).
    abstract: true
    attributes:
      subject:
        description: Subject resource IRI
        required: true
        slot_uri: rdf:subject
      predicate:
        description: Relationship type IRI
        required: true
        slot_uri: rdf:predicate
      object:
        description: Object resource IRI
        required: true
        slot_uri: rdf:object
      source:
        description: Data source for this relationship
        slot_uri: dcterms:source
      confidence:
        description: Confidence score (0-1)
      evidence_type:
        description: Type of evidence supporting relationship
        slot_uri: ECO:0000000
      evidence_source:
        description: Citation or study ID
      ingest_date:
        description: Ingest date
    class_uri: rdf:Statement
  DiseaseOrPhenotype:
    description: Abstract parent class for all disease/phenotype entities. Following MONDO and HPO ontology patterns.
    abstract: true
    is_a: OntologyClass
    attributes:
      mondo_id:
        description: MONDO cross-reference
        range: MondoIdentifier
      hpo_id:
        description: HPO cross-reference
        range: HpoIdentifier
    class_uri: biolink:DiseaseOrPhenotypicFeature
  Disease:
    description: >-
      Disease entity. Encompasses ALS (MONDO:0007743), related neurodegenerative disorders (FTD, PLS, PMA, SMA), and comorbidities.
      Follows MONDO disease hierarchy via is_a relationships.
    class_uri: biolink:Disease
    is_a: DiseaseOrPhenotype
    attributes:
      mondo_id:
        range: MondoIdentifier
        identifier: true
        required: true
      name:
        description: Disease name (preferred from MONDO)
        slot_uri: schema:name
      disease_type:
        range: DiseaseTypeEnum
      onset_type:
        range: OnsetTypeEnum
      umls_cui:
        description: UMLS Concept Unique Identifier
      omim_id:
        description: OMIM (Online Mendelian Inheritance in Man) ID
      orphanet_id:
        description: Orphanet rare disease identifier
      icd10_code:
        description: ICD-10-CM code for billing/clinical use
  Phenotype:
    description: >-
      Phenotypic feature (HPO term). Represents observable/measurable characteristics associated with diseases. Distinct from
      drug side effects which are modeled via DrugCausesPhenotype relationships.
    class_uri: biolink:PhenotypicFeature
    is_a: DiseaseOrPhenotype
    attributes:
      hpo_id:
        range: HpoIdentifier
        identifier: true
        required: true
      frequency:
        description: Frequency of phenotype in affected individuals (e.g. Frequent 75-99%)
        range: string
      severity:
        description: Severity scale
        range: string
  Anatomy:
    description: >-
      Anatomical structure (UBERON ontology). ALS-specific relevance: motor cortex, spinal cord, anterior horn cells, neuromuscular
      junction. Linked to gene expression and disease manifestation.
    class_uri: biolink:AnatomicalEntity
    is_a: OntologyClass
    attributes:
      uberon_id:
        range: UberonIdentifier
        identifier: true
        required: true
      bto_id:
        description: Brenda Tissue Ontology ID
      mesh_id:
        description: MeSH cross-reference
      anatomical_system:
        description: Anatomical system classification
  MolecularEntity:
    description: >-
      Abstract base for molecular-level entities (genes, proteins, variants). Directly related to disease mechanisms via molecular
      interactions.
    abstract: true
    is_a: OntologyClass
    class_uri: biolink:MolecularEntity
  Gene:
    description: >-
      Human gene entity (Entrez/NCBI model). Separate from protein product to properly distinguish genotype from phenotype.
      Key ALS genes: C9orf72, SOD1, TARDBP, FUS, TBK1, NEK1, SQSTM1, VCP, OPTN.
    class_uri: biolink:Gene
    is_a: MolecularEntity
    attributes:
      ncbi_gene_id:
        range: NcbiGeneIdentifier
        identifier: true
        required: true
      hgnc_symbol:
        description: Official HGNC gene symbol
      ensembl_id:
        description: Ensembl gene identifier
      chromosome:
        description: Cytogenetic location (e.g. 21q22.11 for SOD1)
      genomic_pos_start:
        range: integer
        description: GRCh38 start coordinate (1-based)
      genomic_pos_end:
        range: integer
        description: GRCh38 end coordinate
      als_risk_tier:
        description: Evidence tier for ALS association (ALSoD classification) - definitive, strong, moderate, or candidate
        range: string
  TranscriptionFactor:
    description: >-
      Gene encoding a transcription factor (TF). Subclass of Gene, carries both :Gene and :TranscriptionFactor labels. Source:
      DoRothEA + ENCODE TF annotations.
    is_a: Gene
    attributes:
      tf_family:
        description: Structural family (C2H2-ZF, bHLH, Homeodomain, etc.)
      dorothea_confidence:
        description: DoRothEA confidence level (A=high, D=low)
  Protein:
    description: >-
      Protein product (UniProt model). Distinct from Gene entity to capture protein-specific properties: aggregation propensity,
      prion-like domains, subcellular localization.
    class_uri: biolink:Protein
    is_a: MolecularEntity
    attributes:
      uniprot_id:
        range: UniprotIdentifier
        identifier: true
        required: true
        slot_uri: 'UniProtKB:'
      protein_name:
        description: Protein name (UniProt recommended name)
        slot_uri: schema:name
      hgnc_symbol:
        description: Gene name (cross-reference to Gene entity)
      molecular_weight_kda:
        range: float
        description: Molecular weight in kDa
      protein_family:
        description: Protein family classification (Pfam)
      subcellular_location:
        description: Cellular compartment(s) where protein is localized (e.g. mitochondrion, nucleus, axon)
        multivalued: true
      aggregation_prone:
        range: boolean
        description: Known to form aggregates (TDP-43, SOD1, FUS)
      has_prion_like_domain:
        range: boolean
        description: Contains intrinsically disordered prion-like region
  Variant:
    description: >-
      Genetic sequence variant (ClinVar model). Includes SNVs, indels, repeat expansions (C9orf72), and structural variants.
      Links to genes, proteins, and disease associations.
    class_uri: biolink:SequenceVariant
    is_a: MolecularEntity
    attributes:
      clinvar_id:
        range: ClinvarIdentifier
        identifier: true
        required: true
      rsid:
        description: dbSNP reference SNP ID
      hgvs_c:
        description: HGVS coding sequence notation (e.g. c.10A>G)
      hgvs_p:
        description: HGVS protein notation (e.g. p.Ala4Val)
      variant_type:
        range: VariantTypeEnum
      clinical_significance:
        description: ClinVar clinical interpretation
      als_class:
        description: ALS-specific classification (causal, risk, modifier, protective)
      maf:
        range: float
        description: Minor allele frequency in gnomAD non-neuro cohort
        minimum_value: 0.0
        maximum_value: 1.0
  ChemicalEntity:
    description: Abstract base for chemical and pharmacological entities (drugs, exposures, metabolites).
    abstract: true
    is_a: OntologyClass
    class_uri: biolink:ChemicalEntity
  Drug:
    description: >-
      Pharmaceutical compound (DrugBank model). ALS-approved drugs: Riluzole, Edaravone, Tofersen, AMX0035. Includes mechanism,
      targets, side effects.
    class_uri: biolink:Drug
    is_a: ChemicalEntity
    attributes:
      drugbank_id:
        range: DrugBankIdentifier
        identifier: true
        required: true
      drug_name:
        description: Preferred drug name
        slot_uri: schema:name
      chembl_id:
        description: ChEMBL compound ID
      inchi_key:
        description: Standard InChIKey hash
      smiles:
        description: Canonical SMILES string
      drug_type:
        description: Categorization (small molecule, biologic, ASO, cell therapy, gene therapy)
      als_approved:
        range: boolean
        description: FDA approval status for ALS treatment
      trial_status:
        description: Highest clinical trial phase reached
      mechanism:
        description: Known mechanism of action
      indication:
        description: Clinical indication
  ExposureOrStressor:
    description: >-
      Environmental exposure or chemical stressor from CTD ontology. ALS-relevant: BMAA, organophosphate pesticides, heavy
      metals, solvents.
    class_uri: biolink:ChemicalSubstance
    is_a: ChemicalEntity
    attributes:
      ctd_id:
        range: CtdIdentifier
        identifier: true
        required: true
      exposure_name:
        description: Standard name of exposure/stressor
        slot_uri: schema:name
      exposure_type:
        description: Category (chemical, metal, pesticide, radiation, biological, other)
      mesh_id:
        description: MeSH ID for exposure agent
      cas_number:
        description: CAS Registry number
      als_relevance:
        range: boolean
        description: Flagged as ALS-relevant in literature
  BiologicalConcept:
    description: >-
      Abstract base for functional/biological concepts from GO and related ontologies. Represents processes, functions, and
      compartments involved in ALS pathology.
    abstract: true
    is_a: OntologyClass
  BiologicalProcess:
    description: >-
      Gene Ontology Biological Process term. ALS-relevant: protein aggregation, oxidative stress, neuroinflammation, axonal
      transport, neurodegeneration, apoptosis.
    class_uri: biolink:BiologicalProcess
    is_a: BiologicalConcept
    attributes:
      go_id:
        range: GoIdentifier
        identifier: true
        required: true
      process_name:
        description: Standard process name from GO
        slot_uri: schema:name
      go_definition:
        description: GO textual definition
        slot_uri: IAO:0000115
  MolecularFunction:
    description: >-
      Gene Ontology Molecular Function term. Describes biochemical activities (catalytic, binding, etc.) performed by gene
      products.
    class_uri: biolink:MolecularActivity
    is_a: BiologicalConcept
    attributes:
      go_id:
        range: GoIdentifier
        identifier: true
        required: true
      function_name:
        description: Molecular function name from GO
        slot_uri: schema:name
      go_definition:
        description: GO textual definition
        slot_uri: IAO:0000115
  CellularComponent:
    description: >-
      Gene Ontology Cellular Component term. ALS-critical compartments: stress granule, P-body, cytoplasm, nucleus, axon,
      neuromuscular junction, mitochondrion.
    class_uri: biolink:CellularComponent
    is_a: BiologicalConcept
    attributes:
      go_id:
        range: GoIdentifier
        identifier: true
        required: true
      component_name:
        description: Cellular component name from GO
        slot_uri: schema:name
      go_definition:
        description: GO textual definition
        slot_uri: IAO:0000115
  Pathway:
    description: >-
      Reactome pathway entity representing a curated biological pathway or reaction-level pathway context relevant to ALS
      mechanisms, including neuroinflammation, RNA metabolism, protein homeostasis, mitochondrial dysfunction, and axonal transport.
    class_uri: biolink:Pathway
    is_a: BiologicalConcept
    attributes:
      reactome_id:
        range: ReactomeIdentifier
        identifier: true
        required: true
      pathway_name:
        description: Standard Reactome pathway name
        slot_uri: schema:name
      pathway_definition:
        description: Reactome pathway description or summary when available
        slot_uri: IAO:0000115
      species:
        description: Species for the Reactome pathway; expected to be Homo sapiens for human ALS KG assertions
      parent_pathway:
        description: Parent Reactome pathway CURIE when available
        range: ReactomeIdentifier
        multivalued: true
  DiseaseSubtype:
    description: >-
      Molecularly-defined disease subtype derived from clustering analysis (transcriptomics, proteomics, multi-omics). Represents
      cohort stratification. Links to Disease via is_a relationship; carries distinct clinical correlates.
    is_a: Disease
    attributes:
      subtype_id:
        description: Custom subtype identifier
      cluster_method:
        description: Clustering approach (NMF, WGCNA, scRNA-seq, consensus)
      cluster_id:
        range: integer
        description: Cluster number from analysis
      signature_genes:
        description: Top discriminative genes for subtype
        multivalued: true
      n_patients:
        range: integer
        description: Number of patients in subtype
      cohort:
        description: Source patient cohort (AnswerALS, NYGC, PRO-ACT)
      clinical_correlate:
        description: Associated clinical feature or phenotype
      median_survival_months:
        range: float
        description: Median survival from symptom onset
      source_publication:
        description: DOI or PMID reference
        slot_uri: dcterms:bibliographicCitation
  Association:
    description: >-
      Abstract base for optional evidence-bearing associations. Use when a relationship cannot be represented sufficiently
      by a direct object property because the edge needs provenance, evidence, confidence, or additional qualifiers. The subject/predicate/object
      fields allow the association to be materialized as an RDF triple or property-graph edge.
    abstract: true
    is_a: Relationship
    attributes:
      association_id:
        description: Stable identifier for the association record
        range: uriorcurie
        slot_uri: schema:identifier
      association_label:
        description: Human-readable summary of the association
        slot_uri: rdfs:label
      subject:
        description: Subject entity IRI or CURIE used to materialize a direct edge
        required: true
        slot_uri: rdf:subject
      predicate:
        description: Direct object property represented by this association
        required: true
        slot_uri: rdf:predicate
      object:
        description: Object entity IRI or CURIE used to materialize a direct edge
        required: true
        slot_uri: rdf:object
      source:
        description: Data source for this association
        slot_uri: dcterms:source
      source_version:
        description: Data source version or release date
        slot_uri: dcterms:hasVersion
      evidence_type:
        description: Type of supporting evidence
        slot_uri: ECO:0000000
      evidence_source:
        description: Publication, study, database record, or extraction artifact supporting the association
      confidence:
        description: Normalized confidence score from 0 to 1
      ingest_date:
        description: Date this association was ingested
      last_updated:
        description: Date this association was last modified
        slot_uri: dcterms:modified
    class_uri: biolink:Association
  DiseasePhenotypeAssociation:
    description: >-
      Optional association for Disease -> Phenotype when the clinical feature requires edge metadata such as frequency, onset,
      severity, source cohort, or evidence. Materializes to disease_manifests_as_phenotype.
    is_a: Association
    attributes:
      has_disease:
        range: Disease
        required: true
      has_phenotype:
        range: Phenotype
        required: true
      predicate:
        ifabsent: alskb:disease_manifests_as_phenotype
        slot_uri: rdf:predicate
      frequency:
        description: Frequency in affected population or cohort
      severity:
        description: Typical severity or severity distribution
      onset_type:
        range: OnsetTypeEnum
        description: Onset pattern when phenotype is onset-specific
      cohort:
        description: Cohort or study population supporting this phenotype annotation
  GeneDiseaseAssociation:
    description: >-
      Optional association for Gene -> Disease when causal/risk/protective or correlative gene-disease edges need evidence,
      scores, statistics, or source-specific qualifiers. Materializes to gene_associated_with_disease.
    is_a: Association
    attributes:
      has_gene:
        range: Gene
        required: true
      has_disease:
        range: Disease
        required: true
      predicate:
        ifabsent: alskb:gene_associated_with_disease
        slot_uri: rdf:predicate
      association_type:
        description: causal, risk_factor, protective, modifier, biomarker, or correlative
      association_score:
        range: float
        description: Source-specific gene-disease association score
      p_value:
        range: float
        description: Statistical significance when available
      odds_ratio:
        range: float
        description: Genetic association odds ratio when available
      effect_direction:
        description: increased_risk, decreased_risk, protective, upregulated, downregulated, or unknown
      evidence_count:
        range: integer
        description: Number of supporting studies or records
  VariantDiseaseAssociation:
    description: >-
      Optional association for Variant -> Disease when variant-level evidence, clinical significance, inheritance, penetrance,
      or source assertions are needed. Materializes to variant_associated_with_disease.
    is_a: Association
    attributes:
      has_variant:
        range: Variant
        required: true
      has_disease:
        range: Disease
        required: true
      predicate:
        ifabsent: alskb:variant_associated_with_disease
        slot_uri: rdf:predicate
      clinical_significance:
        description: ClinVar/ACMG or ALS-specific clinical interpretation
      inheritance_mode:
        description: autosomal_dominant, autosomal_recessive, X_linked, mitochondrial, complex, or unknown
      penetrance:
        description: Complete, reduced, age-dependent, or unknown penetrance
      association_type:
        description: causal, risk_factor, modifier, protective, or uncertain
  VariantProteinEffectAssociation:
    description: >-
      Optional association for Variant -> Protein when protein consequence, predicted effect, assay result, or functional
      evidence is needed. Materializes to variant_affects_protein.
    is_a: Association
    attributes:
      has_variant:
        range: Variant
        required: true
      has_protein:
        range: Protein
        required: true
      predicate:
        ifabsent: alskb:variant_affects_protein
        slot_uri: rdf:predicate
      functional_consequence:
        description: missense, frameshift, nonsense, splice_site, synonymous, repeat_expansion, or structural
      predicted_effect:
        description: loss_of_function, gain_of_function, dominant_negative, aggregation_prone, no_change, or unknown
      assay:
        description: Functional assay or computational method supporting the effect
  ProteinProteinInteractionAssociation:
    description: >-
      Optional association for Protein -> Protein when interaction score, interaction type, database evidence, or assay metadata
      are needed. Materializes to protein_interacts_with_protein.
    is_a: Association
    attributes:
      protein_1:
        range: Protein
        required: true
      protein_2:
        range: Protein
        required: true
      predicate:
        ifabsent: alskb:protein_interacts_with_protein
        slot_uri: rdf:predicate
      interaction_score:
        range: float
        description: Source-specific confidence score such as STRING combined score
      interaction_type:
        description: direct, indirect, physical, genetic, colocalization, pathway, or predicted
      assay:
        description: Assay or method supporting the interaction
  ProteinPathwayAssociation:
    description: >-
      Optional association for Protein -> Pathway when Reactome evidence code, source release, pathway hierarchy, species,
      or annotation provenance are needed. Materializes to protein_participates_in_pathway.
    is_a: Association
    attributes:
      has_protein:
        range: Protein
        required: true
      has_pathway:
        range: Pathway
        required: true
      predicate:
        ifabsent: alskb:protein_participates_in_pathway
        slot_uri: rdf:predicate
      reactome_evidence_code:
        description: Reactome evidence code or inferred/electronic/manual annotation category when available
      pathway_role:
        description: participant, catalyst, regulator, input, output, or member, when this detail is available
      species:
        description: Species context for the Reactome protein-pathway annotation
  DrugTargetAssociation:
    description: >-
      Optional association for Drug -> MolecularEntity when action type, binding affinity, target class, or mechanism evidence
      is needed. Materializes to drug_targets_molecular_entity.
    is_a: Association
    attributes:
      has_drug:
        range: Drug
        required: true
      target:
        description: Gene or protein target
        range: MolecularEntity
        required: true
      predicate:
        ifabsent: alskb:drug_targets_molecular_entity
        slot_uri: rdf:predicate
      action_type:
        description: inhibitor, activator, binder, antagonist, agonist, modulator, ASO_knockdown, or unknown
      binding_affinity_nm:
        range: float
        description: Binding affinity in nanomolar when available
      mechanism:
        description: Mechanistic description of target modulation
  DrugDiseaseTherapeuticAssociation:
    description: >-
      Optional association for Drug -> Disease when therapeutic indication, approval status, clinical-trial evidence, or outcome
      metadata are needed. Materializes to drug_treats_or_modulates_disease.
    is_a: Association
    attributes:
      has_drug:
        range: Drug
        required: true
      has_disease:
        range: Disease
        required: true
      predicate:
        ifabsent: alskb:drug_treats_or_modulates_disease
        slot_uri: rdf:predicate
      relation_type:
        description: treats, disease_modifying, symptomatic, palliative, contraindicated, off_label, or investigational
      approval_status:
        description: approved, investigational, withdrawn, off_label, failed_trial, or unknown
      clinical_phase:
        description: Highest clinical development phase for ALS or ALS subtype
      outcome_measure:
        description: ALSFRS-R, survival, respiratory function, biomarker, or other endpoint
  ExposureDiseaseAssociation:
    description: >-
      Optional association for ExposureOrStressor -> Disease when epidemiology, mechanism, dose, duration, population, or
      study design metadata are needed. Materializes to exposure_associated_with_disease.
    is_a: Association
    attributes:
      exposure:
        range: ExposureOrStressor
        required: true
      has_disease:
        range: Disease
        required: true
      predicate:
        ifabsent: alskb:exposure_associated_with_disease
        slot_uri: rdf:predicate
      association_type:
        description: risk_factor, protective, trigger, modifier, or correlative
      mechanism:
        description: Proposed biological mechanism
      epidemiological_support:
        range: boolean
      odds_ratio:
        range: float
        description: Epidemiological odds ratio or equivalent effect estimate
      population:
        description: Population, geography, occupation, or cohort context
  TranscriptionFactorRegulationAssociation:
    description: >-
      Optional association for TranscriptionFactor -> Gene when direction, confidence, tissue/cell context, or assay evidence
      are needed. Materializes to transcription_factor_regulates_gene.
    is_a: Association
    attributes:
      transcription_factor:
        range: TranscriptionFactor
        required: true
      target_gene:
        range: Gene
        required: true
      predicate:
        ifabsent: alskb:transcription_factor_regulates_gene
        slot_uri: rdf:predicate
      regulation_type:
        description: activation, repression, bidirectional, context_dependent, or unknown
      confidence_level:
        description: Source-specific confidence level such as DoRothEA A-D
      tissue_or_cell_type:
        description: Tissue or cell type context for the regulatory relationship
  GeneExpressionAssociation:
    description: >-
      Optional association for Gene -> Anatomy when expression level, specificity, tissue, cell type, disease stage, or differential-expression
      qualifiers are needed. Materializes to gene_expressed_in_anatomy.
    is_a: Association
    attributes:
      has_gene:
        range: Gene
        required: true
      has_anatomy:
        range: Anatomy
        required: true
      predicate:
        ifabsent: alskb:gene_expressed_in_anatomy
        slot_uri: rdf:predicate
      expression_level:
        description: high, medium, low, absent, upregulated, downregulated, or not_detected
      specificity_index:
        range: float
        description: Tissue-specificity score from 0 to 1
      log2_fold_change:
        range: float
        description: Differential expression log2 fold change when available
      adjusted_p_value:
        range: float
        description: Multiple-testing-adjusted p-value when available
      tissue_or_cell_type:
        description: Tissue or cell-type context
      disease_stage:
        description: Disease stage or clinical context
  DiseaseDiseaseAssociation:
    description: >-
      Optional association for Disease -> Disease when disease-disease edges need relation type, similarity score, shared
      mechanism, or comorbidity statistics. Materializes to disease_related_to_disease.
    is_a: Association
    attributes:
      disease_1:
        range: Disease
        required: true
      disease_2:
        range: Disease
        required: true
      predicate:
        ifabsent: alskb:disease_related_to_disease
        slot_uri: rdf:predicate
      relation_type:
        description: comorbidity, shared_pathway, shared_gene, phenotypic_similarity, differential_diagnosis, or disease_subtype
      similarity_score:
        range: float
        description: Semantic similarity or clinical overlap score from 0 to 1
      shared_mechanism:
        description: Shared biological mechanism, pathway, or clinical rationale
comments:
- Reactome pathways are modeled as Pathway entities using Reactome stable identifiers; KEGG pathway prefixes and KEGG-specific mappings are intentionally omitted.
- >-
  URI policy: ALS-KG-specific classes and slots use the schema default_prefix (alskb) and do not need explicit class_uri/slot_uri
  declarations. Use class_uri/slot_uri only when a term is intended to be equivalent to an external model term; use exact_mappings
  or close_mappings when alignment is useful but not identical.
