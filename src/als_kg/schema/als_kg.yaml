id: https://alskb.org/ontology/als_kg
name: als_kg
title: ALS Knowledge Graph Ontology Model
description: Comprehensive ontology model for the ALS Knowledge Graph (ALS-KG). Follows OWL 2 / RDF / OBO conventions with formal class hierarchies, direct object properties, optional evidence-bearing association classes, and semantic web alignment. Suitable for export to OWL, RDF/Turtle, or integration with biomedical ontology ecosystems.
version: 2.1.0
license: MIT
prefixes:
  linkml: https://w3id.org/linkml/
  alskb: https://alskb.org/ontology/
  biolink: https://w3id.org/biolink/vocab/
  owl: http://www.w3.org/2002/07/owl#
  rdf: http://www.w3.org/1999/02/22-rdf-syntax-ns#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  obo: http://purl.obolibrary.org/obo/
  MONDO: http://purl.obolibrary.org/obo/MONDO_
  HP: http://purl.obolibrary.org/obo/HP_
  UBERON: http://purl.obolibrary.org/obo/UBERON_
  NCBIGene: https://www.ncbi.nlm.nih.gov/gene/
  UniProtKB: https://www.uniprot.org/uniprot/
  ClinVar: https://www.ncbi.nlm.nih.gov/clinvar/variation/
  DrugBank: https://www.drugbank.ca/drugs/
  GO: http://purl.obolibrary.org/obo/GO_
  CTD: http://ctdbase.org/detail.go?type=chem&acc=
  xsd: http://www.w3.org/2001/XMLSchema#
  schema: http://schema.org/
  dcterms: http://purl.org/dc/terms/
  IAO: http://purl.obolibrary.org/obo/IAO_
  RO: http://purl.obolibrary.org/obo/RO_
  BFO: http://purl.obolibrary.org/obo/BFO_
  ECO: http://purl.obolibrary.org/obo/ECO_
  SIO: http://semanticscience.org/resource/
  oboInOwl: http://www.geneontology.org/formats/oboInOwl#
  HGNC: https://www.genenames.org/data/gene-symbol-report/#!/hgnc_id/
  ENSEMBL: https://identifiers.org/ensembl/
  dbSNP: https://www.ncbi.nlm.nih.gov/snp/
  ChEMBL: https://www.ebi.ac.uk/chembl/compound_report_card/
  MeSH: https://id.nlm.nih.gov/mesh/
  OMIM: https://omim.org/entry/
  ORPHANET: http://www.orpha.net/ORDO/Orphanet_
  UMLS: https://uts.nlm.nih.gov/uts/umls/concept/
  ICD10CM: https://icd.codes/icd10cm/
  CAS: https://commonchemistry.cas.org/detail?cas_rn=
  DOI: https://doi.org/
  PMID: https://pubmed.ncbi.nlm.nih.gov/
default_prefix: alskb
default_range: string
imports:
- linkml:types
slots:
  id:
    description: Unique identifier (IRI or URI)
    range: uriorcurie
    identifier: true
    required: true
    slot_uri: schema:identifier
  label:
    description: Human-readable label for the entity
    range: string
    required: true
    slot_uri: rdfs:label
  definition:
    description: Textual definition following OBO definition format
    range: string
    slot_uri: IAO:0000115
  synonym:
    description: Alternative names or labels
    range: string
    multivalued: true
    slot_uri: oboInOwl:hasRelatedSynonym
  xref:
    description: 'Cross-reference to equivalent entity in another ontology. Format: ONTOLOGY_PREFIX:identifier (e.g. OMIM:104300, KEGG:hsa123456, GO:0006810)'
    range: string
    multivalued: true
    slot_uri: oboInOwl:hasDbXref
  comment:
    description: Informal comment or note on entity
    range: string
    slot_uri: rdfs:comment
  is_obsolete:
    description: Whether this entity is deprecated/obsolete
    range: boolean
    ifabsent: 'false'
    slot_uri: owl:deprecated
  subject:
    description: Subject of the relationship (resource IRI)
    range: string
    required: true
    slot_uri: rdf:subject
  predicate:
    description: Predicate / property type IRI
    range: uriorcurie
    required: true
    slot_uri: rdf:predicate
  object:
    description: Object of the relationship (resource IRI)
    range: string
    required: true
    slot_uri: rdf:object
  has_anatomy:
    description: Referenced anatomy entity in an association record.
    range: Anatomy
    slot_uri: alskb:has_anatomy
  has_disease:
    description: Referenced disease entity in an association record.
    range: Disease
    slot_uri: alskb:has_disease
  has_drug:
    description: Referenced drug entity in an association record.
    range: Drug
    slot_uri: alskb:has_drug
  has_gene:
    description: Referenced gene entity in an association record.
    range: Gene
    slot_uri: alskb:has_gene
  has_phenotype:
    description: Referenced phenotype entity in an association record.
    range: Phenotype
    slot_uri: alskb:has_phenotype
  has_protein:
    description: Referenced protein entity in an association record.
    range: Protein
    slot_uri: alskb:has_protein
  has_variant:
    description: Referenced variant entity in an association record.
    range: Variant
    slot_uri: alskb:has_variant
  disease_manifests_as_phenotype:
    description: Disease has or presents with a phenotype or clinical feature.
    slot_uri: biolink:has_phenotype
    domain: Disease
    range: Phenotype
    multivalued: true
  disease_affects_anatomy:
    description: Disease affects, involves, or primarily manifests in an anatomical structure.
    domain: Disease
    range: Anatomy
    multivalued: true
    slot_uri: biolink:affects
  gene_associated_with_disease:
    description: Gene has causal, risk, modifier, protective, or correlative association with disease.
    slot_uri: biolink:gene_associated_with_condition
    domain: Gene
    range: Disease
    multivalued: true
  variant_associated_with_disease:
    description: Sequence variant has causal, risk, modifier, protective, or correlative association with disease.
    slot_uri: biolink:variant_associated_with_condition
    domain: Variant
    range: Disease
    multivalued: true
  variant_affects_protein:
    description: Sequence variant changes or is predicted to affect a protein product.
    slot_uri: biolink:affects
    domain: Variant
    range: Protein
    multivalued: true
  gene_encodes_protein:
    description: Gene encodes a protein product.
    domain: Gene
    range: Protein
    multivalued: true
    slot_uri: RO:0002205
  protein_interacts_with_protein:
    description: Protein physically or functionally interacts with another protein.
    slot_uri: biolink:interacts_with
    domain: Protein
    range: Protein
    multivalued: true
  drug_targets_molecular_entity:
    description: Drug, biologic, ASO, or other therapeutic agent targets a gene or protein.
    slot_uri: biolink:targets
    domain: Drug
    range: MolecularEntity
    multivalued: true
  drug_treats_or_modulates_disease:
    description: Drug treats, modifies, palliates, or is being investigated for a disease.
    slot_uri: biolink:treats
    domain: Drug
    range: Disease
    multivalued: true
  exposure_associated_with_disease:
    description: Environmental exposure or stressor is associated with disease risk or progression.
    slot_uri: biolink:associated_with
    domain: ExposureOrStressor
    range: Disease
    multivalued: true
  transcription_factor_regulates_gene:
    description: Transcription factor regulates the expression of a target gene.
    slot_uri: biolink:regulates
    domain: TranscriptionFactor
    range: Gene
    multivalued: true
  gene_expressed_in_anatomy:
    description: Gene is expressed in an anatomical structure, tissue, or cell-type context.
    slot_uri: biolink:expressed_in
    domain: Gene
    range: Anatomy
    multivalued: true
  disease_related_to_disease:
    description: Disease is related to another disease by comorbidity, shared etiology, similar mechanism, or phenotypic similarity.
    slot_uri: biolink:related_to
    domain: Disease
    range: Disease
    multivalued: true
  gene_participates_in_process:
    description: Gene or gene product participates in a biological process.
    slot_uri: biolink:participates_in
    domain: Gene
    range: BiologicalProcess
    multivalued: true
  gene_has_molecular_function:
    description: Gene or gene product has a molecular activity or function.
    domain: Gene
    range: MolecularFunction
    multivalued: true
    slot_uri: RO:0000085
  protein_localized_to_cellular_component:
    description: Protein localizes to or is active in a cellular component.
    slot_uri: biolink:located_in
    domain: Protein
    range: CellularComponent
    multivalued: true
  source:
    description: Data source name
    range: string
    slot_uri: dcterms:source
  source_version:
    description: Source version or release date
    range: string
    slot_uri: dcterms:hasVersion
  source_url:
    description: URL to source resource
    range: uriorcurie
    slot_uri: schema:url
  confidence:
    description: Confidence or quality score (0.0-1.0)
    range: float
    minimum_value: 0.0
    maximum_value: 1.0
    slot_uri: alskb:confidence
  evidence_type:
    description: Type of supporting evidence
    range: EvidenceTypeEnum
    slot_uri: ECO:0000000
  evidence_source:
    description: Specific study/publication supporting the statement
    range: string
    slot_uri: alskb:evidence_source
  ingest_date:
    description: Date of ETL ingest
    range: date
    slot_uri: alskb:ingest_date
  last_updated:
    description: Last modification date
    range: date
    slot_uri: dcterms:modified
types:
  MondoIdentifier:
    typeof: string
    uri: xsd:string
    description: MONDO disease ontology identifier (e.g. MONDO:0007743)
    pattern: ^MONDO:\d{7}$
  HpoIdentifier:
    typeof: string
    uri: xsd:string
    description: HPO phenotype term identifier (e.g. HP:0007354)
    pattern: ^HP:\d{7}$
  UberonIdentifier:
    typeof: string
    uri: xsd:string
    description: UBERON anatomy ontology identifier
    pattern: ^UBERON:\d+$
  NcbiGeneIdentifier:
    typeof: string
    uri: xsd:string
    description: NCBI Entrez Gene numeric ID
    pattern: ^\d+$
  UniprotIdentifier:
    typeof: string
    uri: xsd:string
    description: UniProt accession identifier
    pattern: ^[A-Z0-9]{6}$
  ClinvarIdentifier:
    typeof: string
    uri: xsd:string
    description: ClinVar variation numeric ID
    pattern: ^\d+$
  DrugBankIdentifier:
    typeof: string
    uri: xsd:string
    description: DrugBank primary identifier (e.g. DB00533)
    pattern: ^DB\d{5}$
  GoIdentifier:
    typeof: string
    uri: xsd:string
    description: Gene Ontology term identifier (e.g. GO:0006810)
    pattern: ^GO:\d{7}$
  CtdIdentifier:
    typeof: string
    uri: xsd:string
    description: CTD chemical/stressor identifier
enums:
  DiseaseTypeEnum:
    permissible_values:
      sporadic:
        description: Occurs without family history
      familial:
        description: Inherited pattern of occurrence
      syndromic:
        description: Part of larger syndrome
  OnsetTypeEnum:
    permissible_values:
      bulbar:
        description: Facial/tongue muscles affected first
      limb:
        description: Arm or leg muscles affected first
      respiratory:
        description: Breathing muscles affected first
      generalized:
        description: Multiple sites affected simultaneously
      unknown:
        description: Onset location unknown
  GeneTypeEnum:
    permissible_values:
      protein_coding: {}
      lncRNA: {}
      miRNA: {}
      pseudogene: {}
      other: {}
  VariantTypeEnum:
    permissible_values:
      SNV:
        description: Single nucleotide variant
      indel:
        description: Insertion or deletion
      repeat_expansion:
        description: Trinucleotide repeat expansion
      CNV:
        description: Copy number variation
      structural:
        description: Structural variant (inversion, translocation)
  RelationshipTypeEnum:
    description: Standard relationship types following RDF/OWL semantics
    permissible_values:
      is_a:
        description: Subclass relationship (taxonomic)
      part_of:
        description: Mereological (compositional) relationship
      proper_part_of:
        description: Strict part-of (excludes identity)
      participates_in:
        description: Agent participates in process
      has_participant:
        description: Process has participant
      regulates:
        description: Regulatory relationship (direction unspecified)
      positively_regulates:
        description: Upregulation/activation
      negatively_regulates:
        description: Downregulation/inhibition
      associated_with:
        description: Statistical/empirical association
      affects:
        description: Causal or functional modification
  EvidenceTypeEnum:
    permissible_values:
      curated:
        description: Manually curated from literature
      experimental:
        description: Derived from wet-lab experiments
      computational:
        description: Result of computational analysis
      inferred:
        description: Inferred from other statements
      predicted:
        description: Machine learning prediction
      text_mined:
        description: Extracted via natural language processing
classes:
  NamedEntity:
    description: Root class for all named entities in the ALS-KG ontology. Provides core ontology metadata (id, label, definition, synonyms, xrefs).
    abstract: true
    attributes:
      id:
        description: Persistent unique identifier (IRI)
        required: true
        slot_uri: schema:identifier
      label:
        description: Preferred human-readable label
        required: true
        slot_uri: rdfs:label
      definition:
        description: Formal textual definition
        slot_uri: IAO:0000115
      synonym:
        description: Alternative names
        slot_uri: oboInOwl:hasRelatedSynonym
      xref:
        description: Cross-references to external ontologies
        slot_uri: oboInOwl:hasDbXref
      comment:
        description: Informal notes or comments
        slot_uri: rdfs:comment
      is_obsolete:
        description: Deprecation flag
        ifabsent: 'false'
        slot_uri: owl:deprecated
      source:
        description: Original source/database
        slot_uri: dcterms:source
      last_updated:
        description: Last modification timestamp
        slot_uri: dcterms:modified
    class_uri: biolink:NamedThing
  OntologyClass:
    description: Abstract base for entity classes (nodes in knowledge graph). Inherits from NamedEntity with semantic web compatible metadata.
    abstract: true
    is_a: NamedEntity
    attributes:
      source_version:
        description: Source database/ontology version
        slot_uri: dcterms:hasVersion
      ingest_date:
        description: When entity was imported into ALS-KG
        slot_uri: alskb:ingest_date
    class_uri: owl:Class
  Relationship:
    description: 'Abstract base for reified relationships (edges with explicit properties). Follows RDF triple pattern: subject, predicate, object. Can carry additional metadata (confidence, evidence, provenance).'
    abstract: true
    attributes:
      subject:
        description: Subject resource IRI
        required: true
        slot_uri: rdf:subject
      predicate:
        description: Relationship type IRI
        required: true
        slot_uri: rdf:predicate
      object:
        description: Object resource IRI
        required: true
        slot_uri: rdf:object
      source:
        description: Data source for this relationship
        slot_uri: dcterms:source
      confidence:
        description: Confidence score (0-1)
        slot_uri: alskb:confidence
      evidence_type:
        description: Type of evidence supporting relationship
        slot_uri: ECO:0000000
      evidence_source:
        description: Citation or study ID
        slot_uri: alskb:evidence_source
      ingest_date:
        description: Ingest date
        slot_uri: alskb:ingest_date
    class_uri: rdf:Statement
  DiseaseOrPhenotype:
    description: Abstract parent class for all disease/phenotype entities. Following MONDO and HPO ontology patterns.
    abstract: true
    is_a: OntologyClass
    attributes:
      mondo_id:
        description: MONDO cross-reference
        range: MondoIdentifier
        slot_uri: 'MONDO:'
      hpo_id:
        description: HPO cross-reference
        range: HpoIdentifier
        slot_uri: 'HP:'
    class_uri: biolink:DiseaseOrPhenotypicFeature
  Disease:
    description: Disease entity. Encompasses ALS (MONDO:0007743), related neurodegenerative disorders (FTD, PLS, PMA, SMA), and comorbidities. Follows MONDO disease hierarchy via is_a relationships.
    class_uri: biolink:Disease
    is_a: DiseaseOrPhenotype
    attributes:
      mondo_id:
        range: MondoIdentifier
        identifier: true
        required: true
        slot_uri: 'MONDO:'
      name:
        description: Disease name (preferred from MONDO)
        slot_uri: schema:name
      disease_type:
        range: DiseaseTypeEnum
        slot_uri: alskb:disease_type
      onset_type:
        range: OnsetTypeEnum
        slot_uri: alskb:onset_type
      umls_cui:
        description: UMLS Concept Unique Identifier
        slot_uri: 'UMLS:'
      omim_id:
        description: OMIM (Online Mendelian Inheritance in Man) ID
        slot_uri: 'OMIM:'
      orphanet_id:
        description: Orphanet rare disease identifier
        slot_uri: 'ORPHANET:'
      icd10_code:
        description: ICD-10-CM code for billing/clinical use
        slot_uri: 'ICD10CM:'
  Phenotype:
    description: Phenotypic feature (HPO term). Represents observable/measurable characteristics associated with diseases. Distinct from drug side effects which are modeled via DrugCausesPhenotype relationships.
    class_uri: biolink:PhenotypicFeature
    is_a: DiseaseOrPhenotype
    attributes:
      hpo_id:
        range: HpoIdentifier
        identifier: true
        required: true
        slot_uri: 'HP:'
      frequency:
        description: Frequency of phenotype in affected individuals (e.g. Frequent 75-99%)
        range: string
        slot_uri: alskb:frequency
      severity:
        description: Severity scale
        range: string
        slot_uri: alskb:severity
  Anatomy:
    description: 'Anatomical structure (UBERON ontology). ALS-specific relevance: motor cortex, spinal cord, anterior horn cells, neuromuscular junction. Linked to gene expression and disease manifestation.'
    class_uri: biolink:AnatomicalEntity
    is_a: OntologyClass
    attributes:
      uberon_id:
        range: UberonIdentifier
        identifier: true
        required: true
        slot_uri: 'UBERON:'
      bto_id:
        description: Brenda Tissue Ontology ID
        slot_uri: alskb:bto_id
      mesh_id:
        description: MeSH cross-reference
        slot_uri: 'MeSH:'
      anatomical_system:
        description: Anatomical system classification
        slot_uri: alskb:anatomical_system
  MolecularEntity:
    description: Abstract base for molecular-level entities (genes, proteins, variants). Directly related to disease mechanisms via molecular interactions.
    abstract: true
    is_a: OntologyClass
    class_uri: biolink:MolecularEntity
  Gene:
    description: 'Human gene entity (Entrez/NCBI model). Separate from protein product to properly distinguish genotype from phenotype. Key ALS genes: C9orf72, SOD1, TARDBP, FUS, TBK1, NEK1, SQSTM1, VCP, OPTN.'
    class_uri: biolink:Gene
    is_a: MolecularEntity
    attributes:
      ncbi_gene_id:
        range: NcbiGeneIdentifier
        identifier: true
        required: true
        slot_uri: 'NCBIGene:'
      hgnc_symbol:
        description: Official HGNC gene symbol
        slot_uri: 'HGNC:'
      ensembl_id:
        description: Ensembl gene identifier
        slot_uri: 'ENSEMBL:'
      chromosome:
        description: Cytogenetic location (e.g. 21q22.11 for SOD1)
        slot_uri: alskb:chromosome
      genomic_pos_start:
        range: integer
        description: GRCh38 start coordinate (1-based)
        slot_uri: alskb:genomic_pos_start
      genomic_pos_end:
        range: integer
        description: GRCh38 end coordinate
        slot_uri: alskb:genomic_pos_end
      als_risk_tier:
        description: Evidence tier for ALS association (ALSoD classification) - definitive, strong, moderate, or candidate
        range: string
        slot_uri: alskb:als_risk_tier
  TranscriptionFactor:
    description: 'Gene encoding a transcription factor (TF). Subclass of Gene, carries both :Gene and :TranscriptionFactor labels. Source: DoRothEA + ENCODE TF annotations.'
    class_uri: alskb:TranscriptionFactor
    is_a: Gene
    attributes:
      tf_family:
        description: Structural family (C2H2-ZF, bHLH, Homeodomain, etc.)
        slot_uri: alskb:tf_family
      dorothea_confidence:
        description: DoRothEA confidence level (A=high, D=low)
        slot_uri: alskb:dorothea_confidence
  Protein:
    description: 'Protein product (UniProt model). Distinct from Gene entity to capture protein-specific properties: aggregation propensity, prion-like domains, subcellular localization.'
    class_uri: biolink:Protein
    is_a: MolecularEntity
    attributes:
      uniprot_id:
        range: UniprotIdentifier
        identifier: true
        required: true
        slot_uri: 'UniProtKB:'
      protein_name:
        description: Protein name (UniProt recommended name)
        slot_uri: schema:name
      hgnc_symbol:
        description: Gene name (cross-reference to Gene entity)
        slot_uri: 'HGNC:'
      molecular_weight_kda:
        range: float
        description: Molecular weight in kDa
        slot_uri: alskb:molecular_weight_kda
      protein_family:
        description: Protein family classification (Pfam)
        slot_uri: alskb:protein_family
      subcellular_location:
        description: Cellular compartment(s) where protein is localized (e.g. mitochondrion, nucleus, axon)
        multivalued: true
        slot_uri: alskb:subcellular_location
      aggregation_prone:
        range: boolean
        description: Known to form aggregates (TDP-43, SOD1, FUS)
        slot_uri: alskb:aggregation_prone
      has_prion_like_domain:
        range: boolean
        description: Contains intrinsically disordered prion-like region
        slot_uri: alskb:has_prion_like_domain
  Variant:
    description: Genetic sequence variant (ClinVar model). Includes SNVs, indels, repeat expansions (C9orf72), and structural variants. Links to genes, proteins, and disease associations.
    class_uri: biolink:SequenceVariant
    is_a: MolecularEntity
    attributes:
      clinvar_id:
        range: ClinvarIdentifier
        identifier: true
        required: true
        slot_uri: 'ClinVar:'
      rsid:
        description: dbSNP reference SNP ID
        slot_uri: 'dbSNP:'
      hgvs_c:
        description: HGVS coding sequence notation (e.g. c.10A>G)
        slot_uri: alskb:hgvs_c
      hgvs_p:
        description: HGVS protein notation (e.g. p.Ala4Val)
        slot_uri: alskb:hgvs_p
      variant_type:
        range: VariantTypeEnum
        slot_uri: alskb:variant_type
      clinical_significance:
        description: ClinVar clinical interpretation
        slot_uri: alskb:clinical_significance
      als_class:
        description: ALS-specific classification (causal, risk, modifier, protective)
        slot_uri: alskb:als_class
      maf:
        range: float
        description: Minor allele frequency in gnomAD non-neuro cohort
        minimum_value: 0.0
        maximum_value: 1.0
        slot_uri: alskb:minor_allele_frequency
  ChemicalEntity:
    description: Abstract base for chemical and pharmacological entities (drugs, exposures, metabolites).
    abstract: true
    is_a: OntologyClass
    class_uri: biolink:ChemicalEntity
  Drug:
    description: 'Pharmaceutical compound (DrugBank model). ALS-approved drugs: Riluzole, Edaravone, Tofersen, AMX0035. Includes mechanism, targets, side effects.'
    class_uri: biolink:Drug
    is_a: ChemicalEntity
    attributes:
      drugbank_id:
        range: DrugBankIdentifier
        identifier: true
        required: true
        slot_uri: 'DrugBank:'
      drug_name:
        description: Preferred drug name
        slot_uri: schema:name
      chembl_id:
        description: ChEMBL compound ID
        slot_uri: 'ChEMBL:'
      inchi_key:
        description: Standard InChIKey hash
        slot_uri: alskb:inchi_key
      smiles:
        description: Canonical SMILES string
        slot_uri: alskb:smiles
      drug_type:
        description: Categorization (small molecule, biologic, ASO, cell therapy, gene therapy)
        slot_uri: alskb:drug_type
      als_approved:
        range: boolean
        description: FDA approval status for ALS treatment
        slot_uri: alskb:als_approved
      trial_status:
        description: Highest clinical trial phase reached
        slot_uri: alskb:trial_status
      mechanism:
        description: Known mechanism of action
        slot_uri: alskb:mechanism
      indication:
        description: Clinical indication
        slot_uri: alskb:indication
  ExposureOrStressor:
    description: 'Environmental exposure or chemical stressor from CTD ontology. ALS-relevant: BMAA, organophosphate pesticides, heavy metals, solvents.'
    class_uri: biolink:ChemicalSubstance
    is_a: ChemicalEntity
    attributes:
      ctd_id:
        range: CtdIdentifier
        identifier: true
        required: true
        slot_uri: 'CTD:'
      exposure_name:
        description: Standard name of exposure/stressor
        slot_uri: schema:name
      exposure_type:
        description: Category (chemical, metal, pesticide, radiation, biological, other)
        slot_uri: alskb:exposure_type
      mesh_id:
        description: MeSH ID for exposure agent
        slot_uri: 'MeSH:'
      cas_number:
        description: CAS Registry number
        slot_uri: 'CAS:'
      als_relevance:
        range: boolean
        description: Flagged as ALS-relevant in literature
        slot_uri: alskb:als_relevance
  BiologicalConcept:
    description: Abstract base for functional/biological concepts from GO and related ontologies. Represents processes, functions, and compartments involved in ALS pathology.
    abstract: true
    is_a: OntologyClass
    class_uri: alskb:BiologicalConcept
  BiologicalProcess:
    description: 'Gene Ontology Biological Process term. ALS-relevant: protein aggregation, oxidative stress, neuroinflammation, axonal transport, neurodegeneration, apoptosis.'
    class_uri: biolink:BiologicalProcess
    is_a: BiologicalConcept
    attributes:
      go_id:
        range: GoIdentifier
        identifier: true
        required: true
        slot_uri: 'GO:'
      process_name:
