          (e.g. specific exposure routes, measurement context)
  Gene:
    is_a: PhysicalEntity
    description: 'A gene or gene-level biological entity represented in OptimusKG. Current Neo4j label:
      `GEN`.


      Property detail from OptimusKG source schema: A protein-coding or non-coding gene node. Represents
      61,306 human genes (32.2% of nodes) from Ensembl, harmonized with HGNC approved symbols. Contains
      rich molecular, functional, pharmacological, and clinical metadata sourced from Open Targets, DisGeNET,
