        tag: neo4j_relationship_type
        value: INTERACTS_WITH
      neo4j_start_label:
        tag: neo4j_start_label
        value: CCO
      neo4j_end_label:
        tag: neo4j_end_label
        value: GEN
  disease_has_parent_disease:
    description: Current OptimusKG Neo4j relationship `PARENT` from `DIS`/Disease to `DIS`/Disease. Parent-child
      hierarchy relationship from the source concept to a broader or parent concept in the same or related
      ontology.
    domain: Disease
    range: Disease
    slot_uri: rdfs:subClassOf
    annotations:
      neo4j_relationship_type:
        tag: neo4j_relationship_type
        value: PARENT
      neo4j_start_label:
        tag: neo4j_start_label
        value: DIS
      neo4j_end_label:
        tag: neo4j_end_label
        value: DIS
  disease_associated_with_gene:
    description: Current OptimusKG Neo4j relationship `ASSOCIATED_WITH` from `DIS`/Disease to `GEN`/Gene.
      Association relationship; generally evidence-bearing but not necessarily causal.
    domain: Disease
    range: Gene
    slot_uri: biolink:associated_with
    annotations:
      neo4j_relationship_type:
        tag: neo4j_relationship_type
        value: ASSOCIATED_WITH
      neo4j_start_label:
        tag: neo4j_start_label
        value: DIS
      neo4j_end_label:
        tag: neo4j_end_label
        value: GEN
  disease_has_phenotype:
    description: 'Current OptimusKG Neo4j relationship `PHENOTYPE_PRESENT` from `DIS`/Disease to `PHE`/Phenotype.
      Means the disease has or presents the phenotype; inverse reading: the phenotype is present in the
      disease.'
    domain: Disease
    range: Phenotype
    slot_uri: biolink:has_phenotype
    annotations:
      neo4j_relationship_type:
        tag: neo4j_relationship_type
        value: PHENOTYPE_PRESENT
      neo4j_start_label:
        tag: neo4j_start_label
        value: DIS
      neo4j_end_label:
        tag: neo4j_end_label
        value: PHE
  drug_has_indication_for_biological_process:
    description: Current OptimusKG Neo4j relationship `INDICATION` from `DRG`/Drug to `BPO`/BiologicalProcess.
      Drug has an indicated therapeutic use for a disease, phenotype, or biological process context.
    domain: Drug
    range: BiologicalProcess
    slot_uri: biolink:treats
    annotations:
      neo4j_relationship_type:
        tag: neo4j_relationship_type
        value: INDICATION
      neo4j_start_label:
        tag: neo4j_start_label
        value: DRG
      neo4j_end_label:
        tag: neo4j_end_label
        value: BPO
  drug_contraindicated_for_disease:
    description: Current OptimusKG Neo4j relationship `CONTRAINDICATION` from `DRG`/Drug to `DIS`/Disease.
      Drug is contraindicated for a disease or phenotype context.
    domain: Drug
    range: Disease
    slot_uri: biolink:contraindicated_for
    annotations:
