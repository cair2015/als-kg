      onset_age_mean:
        range: float
        description: Mean age of disease onset (years) for patients assigned to this molecular subtype,
          where available.
      prognosis_note:
        range: string
        description: Free-text summary of prognostic differences associated with this molecular subtype
          relative to others.
      cohort:
        range: string
        description: Patient cohort in which this subtype was defined (e.g. "NYGC_ALS_Consortium_postmortem_cortex").
      pubmed_id:
        range: string
        description: PubMed identifier of the primary publication defining this molecular subtype.
      label_color:
        range: string
        description: Display color used in the original publication's visualizations (e.g. "blue" for
          ALS-Ox, "gold" for ALS-Glia, "red" for ALS-TE). Informational only.
  RelationshipAssertion:
    abstract: true
    description: 'Abstract root class for all typed, asserted relationships between named entities in
      OptimusKG. All family-level abstract classes and concrete relationship classes inherit subject,
      object, undirected, sources, and evidence slots from here. Four canonical direct children: HierarchyRelationship,
      AssociationRelationship, PharmacologicalRelationship, FunctionalAnnotationRelationship. Additional
      families: ExposureEntityRelationship (under AssociationRelationship), ExpressionRelationship (under
      AssociationRelationship), MolecularSubtypeRelationship (direct child, covers AnalyticalEntity edges).'
    slots:
    - has_evidence_record
    class_uri: rdf:Statement
  HierarchyRelationship:
    is_a: RelationshipAssertion
    abstract: true
    description: A parent, subclass, or ontology hierarchy relationship in the current OptimusKG Neo4j
      graph. This groups PARENT and IS_A edges while preserving the exact Neo4j relationship type in each
      concrete subclass.
    class_uri: okg:HierarchyRelationship
  AssociationRelationship:
    is_a: RelationshipAssertion
    abstract: true
    description: Abstract family for evidence-bearing association edges between biomedical entities. Covers
      gene-disease, disease-phenotype, phenotype-gene, drug-drug, drug-gene, exposure-entity, and gene-gene
      interaction relationships. Renamed from EntityAssociationRelationship (v0.3.0) for clarity.
    class_uri: okg:AssociationRelationship
  FunctionalAnnotationRelationship:
    is_a: RelationshipAssertion
    abstract: true
    description: Abstract family for GO annotation and pathway membership relationships. Connects genes
      to biological processes (BPO-GEN), cellular components (CCO-GEN), molecular functions (MFN-GEN),
      and pathways (PWY-GEN). One of the four canonical relationship families in OptimusKG v0.4.0.
    class_uri: okg:FunctionalAnnotationRelationship
  PharmacologicalRelationship:
    is_a: RelationshipAssertion
    abstract: true
    description: Abstract family for drug therapeutic-use relationships, including indication, contraindication,
      off-label use, and adverse drug reactions. Subject is always a Drug node. Renamed from TherapeuticUseRelationship
      (v0.3.0) to reflect that this family covers all drug action semantics, not only clinical therapeutic
      use.
    class_uri: okg:PharmacologicalRelationship
    slot_usage:
      subject:
        range: Drug
        description: The source Drug node for this relationship family.
  ExposureEntityRelationship:
    is_a: AssociationRelationship
    abstract: true
    description: Abstract family for exposure-to-entity association relationships. Now a subclass of AssociationRelationship
      rather than a direct child of RelationshipAssertion (v0.4.0 consolidation). Subject is always an
      Exposure node.
    class_uri: okg:ExposureEntityRelationship
    slot_usage:
      subject:
        range: Exposure
        description: The source Exposure node for this relationship family.
  PhenotypeHierarchyRelationship:
    is_a: HierarchyRelationship
    abstract: true
    description: 'Hierarchy relationship between Phenotype nodes, or from a phenotype to a disease when
      the installed graph uses a PARENT pattern across those labels.


      Property detail: Hierarchical relationships between HPO phenotype terms. Relation: PARENT (is_a,
      has_part within HPO ontology). Undirected: False. Count: 24,862. Source: HPO.'
    class_uri: okg:PhenotypeHierarchyRelationship
    slot_usage:
      subject:
        range: Phenotype
        description: The source Phenotype node for this relationship family.
  MolecularSubtypeRelationship:
    is_a: RelationshipAssertion
    abstract: true
    description: Abstract family for all relationships involving a MolecularSubtype (AnalyticalEntity)
      node. Groups disease-to-subtype (HAS_MOLECULAR_SUBTYPE), gene-to-subtype (DYSREGULATED_IN), and
      subtype-to-anatomy (MEASURED_IN) relationships. Kept as a distinct family because MolecularSubtype
      is an AnalyticalEntity, not a standard ClinicalEntity, and its relationship semantics differ from
      standard biomedical association edges.
    class_uri: okg:MolecularSubtypeRelationship
  AnatomyGeneExpressionRelationship:
    is_a: AssociationRelationship
    abstract: true
    description: 'Parent class for anatomy-to-gene expression relationships, including expression present
      and expression absent edges.


      Property detail: Gene expression associations between anatomical structures and genes. Relations:
      EXPRESSION_PRESENT or EXPRESSION_ABSENT. Undirected: True. Count: 8,787,955 (40.3% of all edges).
      Source: Bgee (curated RNA-seq expression data, v2024-05-17). NOTE: ANA-GEN is the second-largest
      edge type and the most common category of edges lacking literature support (661/1413 unsupported
      edges in the PaperQA3 validation), reflecting the lag between data deposition and narrative synthesis
      in publications.'
    class_uri: okg:AnatomyGeneExpressionRelationship
    slot_usage:
      subject:
        range: Anatomy
        description: The source Anatomy node for this relationship family.
      object:
        range: Gene
        description: The target Gene node for this relationship family.
    attributes:
      expression_rank:
        range: integer
        description: Bgee expression rank score for this gene in this tissue. Lower rank = higher relative
          expression. Computed across all tissues.
      call_quality:
        range: ExpressionCallQualityEnum
        description: Quality level of the Bgee expression call (gold = high confidence, silver = moderate
          confidence). Based on concordance across evidence types.
  DiseasePhenotypeRelationship:
    is_a: AssociationRelationship
    description: 'Concrete relationship class for disease-to-phenotype relationships, including phenotype
      presence annotations.


      Property detail: Clinical associations between diseases and their characteristic phenotypic features.
      Relation: PHENOTYPE_PRESENT. Undirected: True. Count: 157,144. Source: Open Targets (via HPO annotations).'
    class_uri: okg:DiseasePhenotypeRelationship
    slot_usage:
      subject:
        range: Disease
        description: The source Disease node for this relationship family.
      object:
        range: Phenotype
        description: The target Phenotype node for this relationship family.
    attributes:
      aspect:
        range: string
        multivalued: true
        description: 'HPO annotation aspect categories: "P" = Phenotypic abnormality, "I" = Mode of inheritance,
          "C" = Onset and clinical course, "M" = Clinical modifier.'
      evidence_type:
        range: string
        multivalued: true
        description: Evidence type codes (e.g. "IEA" = Inferred from Electronic Annotation, "PCS" = Published
          Clinical Study, "TAS" = Traceable Author Statement)
      frequency:
        range: string
        multivalued: true
        description: Phenotype frequency annotations. May be ontology terms (HP:0040283 = Occasional)
          or percentage ranges (e.g. "5-29%").
      onset:
        range: string
        multivalued: true
        description: Age of onset categories (HPO terms, e.g. "HP:0003577" = Congenital onset)
      modifiers:
        range: string
        multivalued: true
        description: Clinical modifier HPO terms (e.g. severity, progression)
      sexes:
        range: string
        multivalued: true
        description: Sex-specific occurrence annotations (e.g. "PATO:0000384" = male)
      qualifier_not:
        range: boolean
        description: True if this is an exclusion annotation — the phenotype is explicitly absent/excluded
          in this disease context.
      bio_curation:
        range: string
        multivalued: true
        description: Biocuration provenance strings recording the curator ID and date (e.g. "ORPHA:orphadata[2023-07-01]").
      references:
        range: string
        multivalued: true
        description: Supporting publication PMIDs or database references (e.g. "PMID:1234567")
  DrugBiologicalProcessTherapeuticRelationship:
    is_a: PharmacologicalRelationship
    description: 'Concrete relationship class for drug-to-biological-process therapeutic-use relationships.


      Property detail: Drug indications linked to biological processes. Relation: INDICATION. Undirected:
