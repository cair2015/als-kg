    domain: Drug
    range: Gene
    slot_uri: biolink:decreases_activity_of
    annotations:
      neo4j_relationship_type:
        tag: neo4j_relationship_type
        value: ALLOSTERIC_ANTAGONIST
      neo4j_start_label:
        tag: neo4j_start_label
        value: DRG
      neo4j_end_label:
        tag: neo4j_end_label
        value: GEN
  drug_antagonist_of_gene_product:
    description: Current OptimusKG Neo4j relationship `ANTAGONIST` from `DRG`/Drug to `GEN`/Gene. Drug
      acts as an antagonist of the gene product or target associated with the gene.
    domain: Drug
    range: Gene
    slot_uri: biolink:decreases_activity_of
    annotations:
      neo4j_relationship_type:
        tag: neo4j_relationship_type
        value: ANTAGONIST
      neo4j_start_label:
        tag: neo4j_start_label
        value: DRG
      neo4j_end_label:
        tag: neo4j_end_label
        value: GEN
