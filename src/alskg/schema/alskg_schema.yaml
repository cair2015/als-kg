  GeneExpressionContext:
    is_a: DifferentialExpressionStatement
    description: Neo4j-compatible concrete expression-context node for ALS-KG. Prefer the parent class
      DifferentialExpressionStatement for ontology semantics; use GeneExpressionContext when materializing
      expression findings as Neo4j nodes such as ECX.
    class_uri: alskg:GeneExpressionContext
    slots:
    - id
    - source
    - direct_sources
    - indirect_sources
    - measures_gene_expression_of
    - has_expression_direction
    - occurs_in_subtype_context
    - occurs_in_cell_type
    - occurs_in_anatomy
    - measured_in_sample
    - measured_by_assay
    - derives_from_dataset
    - is_supported_by
    attributes:
      gene:
        range: Gene
        required: true
        description: The gene or genomic feature whose expression is described by this context.
        slot_uri: RO:0002206
      molecular_subtype:
        range: MolecularSubtype
        required: true
        description: The molecular disease subtype in which the gene is differentially expressed (e.g.
          ALS-Ox, ALS-Glia, ALS-TE).
        slot_uri: okg:in_molecular_subtype
      anatomy:
        range: Anatomy
        required: false
        description: The tissue or anatomical region in which the expression was measured (e.g. motor
          cortex, spinal cord). Null when the context is an iPSC cell model without a corresponding anatomy
          node.
        slot_uri: okg:in_anatomy
      direction:
        range: ExpressionDirectionEnum
        required: true
        description: Direction of differential expression relative to non-ALS controls. UP = upregulated;
          DOWN = downregulated in this molecular subtype and biological context.
      biological_context_type:
        range: BiologicalContextTypeEnum
        description: Type of biological context in which the expression was measured (e.g. postmortem_cortex,
          postmortem_cord, C9orf72_motor_neuron).
      cell_model:
        range: string
        description: Specific iPSC cell model identifier when the context is a cell model rather than
          postmortem tissue (e.g. "C9orf72_motor_neuron", "FUS_motor_neuron", "TDP43_motor_neuron"). Null
          for postmortem tissue.
      year:
        range: integer
        description: Year of the study providing this expression evidence.
      validated_in:
        range: string
        multivalued: true
        description: Independent studies in which this expression finding has been replicated or cross-validated
          (e.g. "Catanese_2023", "Ho_2021", "Humphrey_2022", "Ziff_2023").
      biological_note:
        range: string
        description: Optional free-text note contextualizing the biological significance of this expression
          finding.
    annotations:
      source_note:
        tag: source_note
        value: Primary data from NIHMS2069122-supplement-5.xlsx TableS3A (NYGC ALS Consortium postmortem
          cortex and cord) and TableS3E (Ziff et al. 2023 iPSC motor neuron models). Replaces the binary
          DYSREGULATED_IN edge (GEN->MST).
      recommended_neo4j_label:
        tag: recommended_neo4j_label
        value: ECX
  GeneHasExpressionContextRelationship:
    is_a: RelationshipAssertion
    description: Reified schema class for the Neo4j pattern `(:GEN)-[:HAS_EXPRESSION_CONTEXT]->(:GeneExpressionContext)`.
      Links a gene to a context node recording direction, molecular subtype, tissue, and provenance of
      a differential expression finding.
    class_uri: okg:GeneHasExpressionContextRelationship
    slot_usage:
      subject:
        range: Gene
        description: Source Gene node with Neo4j label `GEN`.
      object:
        range: GeneExpressionContext
        description: Target GeneExpressionContext node with Neo4j label `ECX`.
      original_optimus_relationship_type:
        equals_string: HAS_EXPRESSION_CONTEXT
    annotations:
      neo4j_relationship_type:
        tag: neo4j_relationship_type
        value: HAS_EXPRESSION_CONTEXT
      neo4j_start_label:
        tag: neo4j_start_label
        value: GEN
      neo4j_end_label:
        tag: neo4j_end_label
        value: ECX
      direct_slot:
        tag: direct_slot
        value: gene_has_expression_context
  ExpressionContextInAnatomyRelationship:
    is_a: RelationshipAssertion
    description: Reified schema class for the Neo4j pattern `(:ECX)-[:IN_ANATOMY]->(:ANA)`. Links a GeneExpressionContext
      node to the tissue in which the differential expression was measured. Not present for iPSC cell
      model contexts without a corresponding anatomy node.
    class_uri: okg:ExpressionContextInAnatomyRelationship
    slot_usage:
      subject:
        range: GeneExpressionContext
        description: Source GeneExpressionContext node with Neo4j label `ECX`.
      object:
        range: Anatomy
        description: Target Anatomy node with Neo4j label `ANA`.
      original_optimus_relationship_type:
        equals_string: IN_ANATOMY
    annotations:
      neo4j_relationship_type:
        tag: neo4j_relationship_type
        value: IN_ANATOMY
      neo4j_start_label:
        tag: neo4j_start_label
        value: ECX
      neo4j_end_label:
        tag: neo4j_end_label
        value: ANA
      direct_slot:
        tag: direct_slot
        value: expression_context_in_anatomy
  ExpressionContextInMolecularSubtypeRelationship:
    is_a: RelationshipAssertion
    description: Reified schema class for the Neo4j pattern `(:ECX)-[:HAS_MOLECULAR_SUBTYPE]->(:MST)`.
      Links a GeneExpressionContext node to the molecular subtype whose transcriptomic signature the gene
      contributes to.
    class_uri: okg:ExpressionContextInMolecularSubtypeRelationship
    slot_usage:
      subject:
        range: GeneExpressionContext
        description: Source GeneExpressionContext node with Neo4j label `ECX`.
      object:
        range: MolecularSubtype
        description: Target MolecularSubtype node with Neo4j label `MST`.
      original_optimus_relationship_type:
        equals_string: HAS_MOLECULAR_SUBTYPE
    annotations:
      neo4j_relationship_type:
        tag: neo4j_relationship_type
        value: HAS_MOLECULAR_SUBTYPE
      neo4j_start_label:
        tag: neo4j_start_label
        value: ECX
      neo4j_end_label:
        tag: neo4j_end_label
        value: MST
      direct_slot:
        tag: direct_slot
        value: expression_context_in_molecular_subtype
