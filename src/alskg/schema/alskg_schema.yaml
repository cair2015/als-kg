classes:
  NamedEntity:
    abstract: true
    description: 'Root abstract class for all named entities in OptimusKG. Replaces the former BiomedicalEntity
      root (v0.3.0). Provides core identity slots shared across all four mid-tier branches: OntologyClass,
      ClinicalEntity, PhysicalEntity, and AnalyticalEntity.'
    slots:
    - id
    - name
    - original_optimus_label
    - direct_sources
    - indirect_sources
    class_uri: biolink:NamedThing
  OntologyClass:
    is_a: NamedEntity
    abstract: true
    description: 'Abstract mid-tier for entity types grounded in an OBO/OWL ontology or curated pathway
      database. All subclasses carry ontology header metadata (title, version, license, definition) and
      cross-references. Covers: Anatomy (Uberon), BiologicalProcess (GO), CellularComponent (GO), MolecularFunction
      (GO), Pathway (Reactome).'
    class_uri: owl:Class
    slots:
    - id
    - name
    - original_optimus_label
    - direct_sources
    - indirect_sources
    - has_synonym
    - has_cross_reference
    - definition
    - synonyms
    - xrefs
    - ontology
  ClinicalEntity:
    is_a: NamedEntity
    abstract: true
    description: 'Abstract mid-tier for clinical observation categories grounded in disease and phenotype
      ontologies. Both subclasses carry UMLS CUIs, SNOMED CT mappings, and full ontological hierarchy
      (parents, ancestors, is_leaf). Covers: Disease (MONDO, DOID, EFO, Orphanet, NCIT), Phenotype (HPO,
      MedDRA).'
    class_uri: biolink:DiseaseOrPhenotypicFeature
    slots:
    - id
    - name
    - original_optimus_label
    - direct_sources
    - indirect_sources
    - has_synonym
    - has_cross_reference
  PhysicalEntity:
    is_a: NamedEntity
    abstract: true
    description: 'Abstract mid-tier for physically real, structurally defined entities whose identity
      is established by a structure or sequence database (not by an ontology concept hierarchy). Merges
      the former MolecularEntity (Gene, Protein) and ChemicalEntity (Drug, Exposure) branches into one
      family. Biolink alignment: biolink:ChemicalEntityOrGeneOrGeneProduct covers this combined family.
      Covers: Gene (ENSG), Protein (UniProt), Drug (ChEMBL/DrugBank/RxNorm), Exposure (MeSH/CTD).'
    class_uri: biolink:ChemicalEntityOrGeneOrGeneProduct
    slots:
    - id
    - name
    - original_optimus_label
    - direct_sources
    - indirect_sources
    - has_synonym
    - has_cross_reference
  AnalyticalEntity:
    is_a: NamedEntity
    abstract: true
    description: 'Abstract mid-tier for entities whose identity is established by a computational analysis
      rather than an ontology or physical database. These are reified analytical findings promoted to
      named nodes because they accumulate enough properties and relationships to warrant first-class graph
      identity. Covers: MolecularSubtype (transcriptomic patient strata, MST label), GeneExpressionContext
      (reified differential expression findings, ECX label).'
    class_uri: biolink:StudyResult
  Anatomy:
    is_a: AnalyticalEntity
    description: 'An anatomical entity or anatomical region represented in OptimusKG. Current Neo4j label:
      `ANA`.


      Property detail from OptimusKG source schema: An anatomical structure or tissue node. Represents
      13,120 anatomical entities (6.9% of nodes) from the Uberon cross-species anatomy ontology. Covers
      organs, tissues, cell types, developmental structures, and systems. Source: Uberon. Node file: nodes/anatomy.parquet'
    class_uri: biolink:AnatomicalEntity
    slots:
    - id
    - name
    - original_optimus_label
    - direct_sources
    - indirect_sources
    - has_synonym
    - has_cross_reference
    - definition
    - synonyms
    - xrefs
    - ontology
    annotations:
      neo4j_label:
        tag: neo4j_label
        value: ANA
      optimus_abbreviation:
        tag: optimus_abbreviation
        value: ANA
      property_schema_source:
        tag: property_schema_source
        value: AnatomyNode
    slot_usage:
      name:
        description: Anatomical structure name (Uberon preferred label, e.g. "heart", "liver")
        range: string
      definition:
        description: Formal ontology definition of the anatomical structure
      synonyms:
        description: Alternative anatomical names and labels (e.g. abbreviations, Latin names, synonymous
          tissue terms)
      xrefs:
        description: Cross-references to external ontologies and databases (e.g. FMA, MA, EHDAA2, BTO,
          OpenGalen, Wikipedia)
      ontology:
        description: Source ontology metadata (Uberon title, version, license)
  BiologicalProcess:
    is_a: OntologyClass
    description: 'A Gene Ontology biological process term represented in OptimusKG. Current Neo4j label:
      `BPO`.


      Property detail from OptimusKG source schema: A Gene Ontology (GO) biological process node. Represents
      25,754 biological processes (13.5% of nodes) describing coordinated programs of molecular activities
      with a defined beginning and end (e.g. "apoptotic process", "DNA repair", "cell division"). Source:
      Gene Ontology (GO). Node file: nodes/biological_process.parquet'
    class_uri: biolink:BiologicalProcess
    slots:
    - id
    - name
    - original_optimus_label
    - direct_sources
    - indirect_sources
    - has_synonym
    - has_cross_reference
    - definition
    - synonyms
    - xrefs
    - ontology
    annotations:
      neo4j_label:
        tag: neo4j_label
        value: BPO
      optimus_abbreviation:
        tag: optimus_abbreviation
        value: BPO
      property_schema_source:
        tag: property_schema_source
        value: BiologicalProcessNode
    slot_usage:
      name:
        description: GO biological process name (e.g. "apoptotic process")
        range: string
      definition:
        description: Formal GO ontology definition of the biological process
      synonyms:
        description: Alternative GO term names and synonyms
      xrefs:
        description: Cross-references to external databases (e.g. KEGG, Reactome, Wikipedia)
      ontology:
        description: Source ontology metadata (GO title, version, license)
  CellularComponent:
    is_a: OntologyClass
    description: 'A Gene Ontology cellular component term represented in OptimusKG. Current Neo4j label:
      `CCO`.


      Property detail from OptimusKG source schema: A Gene Ontology (GO) cellular component node. Represents
      4,052 subcellular structures and compartments (2.1% of nodes) where gene products are active or
      located (e.g. "nucleus", "mitochondria", "plasma membrane", "ribosome"). Source: Gene Ontology (GO).
      Node file: nodes/cellular_component.parquet'
    class_uri: biolink:CellularComponent
    slots:
    - id
    - name
    - original_optimus_label
    - direct_sources
    - indirect_sources
    - has_synonym
    - has_cross_reference
    - definition
    - synonyms
    - xrefs
    - ontology
    annotations:
      neo4j_label:
        tag: neo4j_label
        value: CCO
      optimus_abbreviation:
        tag: optimus_abbreviation
        value: CCO
      property_schema_source:
        tag: property_schema_source
        value: CellularComponentNode
    slot_usage:
      name:
