      neo4j_start_label:
        tag: neo4j_start_label
        value: DRG
      neo4j_end_label:
        tag: neo4j_end_label
        value: DRG
  drug_activates_gene_product:
    description: Current OptimusKG Neo4j relationship `ACTIVATOR` from `DRG`/Drug to `GEN`/Gene. Drug
