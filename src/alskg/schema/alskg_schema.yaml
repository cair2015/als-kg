    class_uri: okg:DrugDiseaseTherapeuticRelationship
    slot_usage:
      subject:
        range: Drug
        description: The source Drug node for this relationship family.
      object:
        range: Disease
        description: The target Disease node for this relationship family.
      highest_clinical_trial_phase:
        description: Maximum clinical trial phase achieved for this drug-disease pair (0-4). 4 = approved/marketed
          indication.
      structure_id:
        description: DrugCentral internal structure identifier for the drug
      drug_disease_id:
        description: DrugCentral drug-disease association identifier
      reference_ids:
        description: External reference identifiers supporting the association (e.g. ClinicalTrials.gov
          IDs, FDA application numbers)
    slots:
    - highest_clinical_trial_phase
    - structure_id
    - drug_disease_id
    - reference_ids
  DrugPhenotypeTherapeuticRelationship:
    is_a: PharmacologicalRelationship
    abstract: true
    description: 'Parent class for drug-to-phenotype therapeutic and adverse-event relationships.


      Property detail: Drug effects on clinical phenotypic outcomes, including adverse reactions, indications,
      contraindications, and off-label uses. Relations: ADVERSE_DRUG_REACTION, ASSOCIATED_WITH, CONTRAINDICATION,
      INDICATION, OFF_LABEL_USE. Undirected: True. Count: 13,758. Sources: DrugCentral, OnSIDES, Open
      Targets. OnSIDES data: adverse drug events extracted from FDA labels using PubMedBERT.'
    class_uri: okg:DrugPhenotypeTherapeuticRelationship
    slot_usage:
      subject:
        range: Drug
        description: The source Drug node for this relationship family.
      object:
        range: Phenotype
        description: The target Phenotype node for this relationship family.
      highest_clinical_trial_phase:
        description: Highest clinical trial phase for this drug-phenotype association (0-4)
      structure_id:
        description: DrugCentral structure identifier
      drug_disease_id:
        description: DrugCentral drug-disease/phenotype association identifier
      reference_ids:
        description: Supporting reference identifiers
    slots:
    - highest_clinical_trial_phase
    - structure_id
    - drug_disease_id
    - reference_ids
  DrugDrugRelationship:
    is_a: AssociationRelationship
    description: 'Concrete relationship class for drug-to-drug relationships such as synergistic interaction.


      Property detail: Drug-drug interactions and hierarchical drug relationships. Relations: SYNERGISTIC_INTERACTION,
