  DrugDiseaseTherapeuticRelationship:
    is_a: PharmacologicalRelationship
    abstract: true
    description: 'Parent class for drug-to-disease therapeutic-use relationships, including indication,
      contraindication, and off-label use.


      Property detail: Drug-disease therapeutic associations including indications, contraindications,
      and off-label uses. Relations: INDICATION, CONTRAINDICATION, OFF_LABEL_USE. Undirected: True. Count:
      70,380. Sources: DrugCentral, Open Targets. Indirect: ATC, Clinical Trials, DailyMed, EMA, FDA,
