id: https://w3id.org/alskg/schema/alskg-schema
name: alskg_schema
title: ALSKG Schema Extending OptimusKG
description: A LinkML schema for ALSKG that extends the OptimusKG semantic model while preserving
  Neo4j-compatible node classes, relationship classes, and graph semantics. It adds ALS-focused classes
  and relationships for subtypes, variants, pathogenesis, gene expression, cohorts, samples, assays,
  evidence, biomarkers, model systems, therapy, and drug repurposing.
version: 0.2.0-alskg-neo4j-extension
license: MIT
see_also:
- https://arxiv.org/abs/2604.27269
- https://doi.org/10.7910/DVN/IYNGEV
- https://github.com/mims-harvard/optimuskg
- https://optimuskg.ai
- https://optimuskg.ai/docs/graph-schema/edges
- https://optimuskg.ai/docs/graph-schema/nodes
prefixes:
  linkml: https://w3id.org/linkml/
  okg: https://w3id.org/optimuskg/schema/
  biolink: https://w3id.org/biolink/vocab/
  RO: http://purl.obolibrary.org/obo/RO_
  BFO: http://purl.obolibrary.org/obo/BFO_
  IAO: http://purl.obolibrary.org/obo/IAO_
  OBI: http://purl.obolibrary.org/obo/OBI_
  SIO: http://semanticscience.org/resource/
  prov:
    prefix_prefix: prov
    prefix_reference: http://www.w3.org/ns/prov#
  owl: http://www.w3.org/2002/07/owl#
  rdf: http://www.w3.org/1999/02/22-rdf-syntax-ns#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  xsd: http://www.w3.org/2001/XMLSchema#
  pav: http://purl.org/pav/
  schema: http://schema.org/
  optimuskg: https://optimuskg.ai/schema/
  ENSG: https://ensembl.org/id/
  GO: http://purl.obolibrary.org/obo/GO_
  HP: http://purl.obolibrary.org/obo/HP_
  MONDO: http://purl.obolibrary.org/obo/MONDO_
  DOID: http://purl.obolibrary.org/obo/DOID_
  UBERON: http://purl.obolibrary.org/obo/UBERON_
  CHEMBL: https://www.ebi.ac.uk/chembl/compound_report_card/
  DRUGBANK: https://go.drugbank.com/drugs/
  RXNORM: https://www.nlm.nih.gov/research/umls/rxnorm/
  REACT: https://reactome.org/content/detail/
  MESH: http://id.nlm.nih.gov/mesh/
  NCIT: http://purl.obolibrary.org/obo/NCIT_
  EFO: http://www.ebi.ac.uk/efo/EFO_
  ORPHANET: http://www.orpha.net/ORDO/Orphanet_
  skos:
    prefix_prefix: skos
    prefix_reference: http://www.w3.org/2004/02/skos/core#
  obo:
    prefix_prefix: obo
    prefix_reference: http://purl.obolibrary.org/obo/
  uniprot:
    prefix_prefix: uniprot
    prefix_reference: https://purl.uniprot.org/uniprot/
  ensembl:
    prefix_prefix: ensembl
    prefix_reference: https://identifiers.org/ensembl/
  dcterms:
    prefix_prefix: dcterms
    prefix_reference: http://purl.org/dc/terms/
  alskg: https://w3id.org/alskg/schema/
  CL: http://purl.obolibrary.org/obo/CL_
  SO: http://purl.obolibrary.org/obo/SO_
  PR: http://purl.obolibrary.org/obo/PR_
  ECO: http://purl.obolibrary.org/obo/ECO_
  HGNC: https://identifiers.org/hgnc/
  NCBIGene: https://identifiers.org/ncbigene/
  UniProtKB: https://identifiers.org/uniprot/
  DOI: https://doi.org/
  PMID: https://pubmed.ncbi.nlm.nih.gov/
default_prefix: alskg
default_range: string
imports:
- linkml:types
- alskg_enums
annotations:
  schema_role:
    tag: schema_role
    value: semantic_view
  standalone_schema: 'true'
types:
  CURIEType:
    uri: xsd:string
    base: str
    description: 'A Compact URI (CURIE) identifier in the form {namespace}[:_]{local_id}. Examples: ENSG00000139618,
      GO:0000001, HP:0001250, MONDO:0005148. All namespace prefixes are validated against the Biolink
      Model namespace registry.'
  URIType:
    uri: xsd:anyURI
    base: str
    description: A URI or URL stored as a string.
  Base64StringType:
    uri: xsd:string
    base: str
    description: A base64-encoded binary payload stored as a string. Used for mol_file_base64 and mol_image_base64
      on Drug nodes.
  Probability:
    typeof: float
    description: A probability-like score between 0 and 1.
slots:
  id:
    identifier: true
    range: CURIEType
    slot_uri: schema:identifier
    description: Primary OptimusKG node identifier, usually a CURIE or source-specific accession.
  original_optimus_label:
    range: string
    description: Original three-letter OptimusKG node label as stored in Neo4j, such as GEN, DIS, or DRG.
  original_optimus_relationship_type:
    range: string
    description: Original Neo4j relationship type string used in the installed OptimusKG database.
  name:
    range: string
    slot_uri: rdfs:label
    description: Human-readable preferred name or label, when available.
  symbol:
    range: string
    description: Gene symbol or other short symbol, when available.
  source:
    range: string
    description: Source string or compact source identifier, when available.
  direct_sources:
    range: string
    multivalued: true
    description: Direct provenance sources contributing the node or edge, when available.
  indirect_sources:
    range: string
    multivalued: true
    description: Indirect upstream sources referenced by contributing resources, when available.
  subject:
    range: NamedEntity
    description: Source node of a Neo4j relationship instance.
  object:
    range: NamedEntity
    description: Target node of a Neo4j relationship instance.
  undirected:
    range: boolean
    description: Whether the relationship has no intrinsic directionality in the OptimusKG export, when
      available.
  disease_has_molecular_subtype:
    description: Current OptimusKG Neo4j relationship `HAS_MOLECULAR_SUBTYPE` from `DIS`/Disease to `MST`/MolecularSubtype.
      Indicates that a disease node is associated with a transcriptome-derived molecular subtype. Orthogonal
      to the ontological disease hierarchy; represents a classification layer derived from unsupervised
      multi-omic clustering.
    domain: Disease
    range: MolecularSubtype
    slot_uri: okg:has_molecular_subtype
    annotations:
      neo4j_relationship_type:
        tag: neo4j_relationship_type
        value: HAS_MOLECULAR_SUBTYPE
      neo4j_start_label:
        tag: neo4j_start_label
        value: DIS
      neo4j_end_label:
        tag: neo4j_end_label
        value: MST
  molecular_subtype_has_parent_disease:
    description: Current OptimusKG Neo4j relationship `PARENT` from `MST`/MolecularSubtype to `DIS`/Disease.
      Hierarchical linkage from a molecular subtype to its anchor disease node (e.g. ALS-Ox -> ALS general,
      MONDO:0004976). Uses the existing PARENT relationship type for compatibility with DIS hierarchy
      traversal.
    domain: MolecularSubtype
    range: Disease
    slot_uri: rdfs:subClassOf
    annotations:
      neo4j_relationship_type:
        tag: neo4j_relationship_type
        value: PARENT
      neo4j_start_label:
        tag: neo4j_start_label
        value: MST
      neo4j_end_label:
        tag: neo4j_end_label
        value: DIS
  molecular_subtype_measured_in_anatomy:
    description: Current OptimusKG Neo4j relationship `MEASURED_IN` from `MST`/MolecularSubtype to `ANA`/Anatomy.
      Indicates the tissue or anatomical context in which the molecular subtype was characterized (e.g.
      motor cortex, spinal cord).
    domain: MolecularSubtype
    range: Anatomy
    slot_uri: okg:measured_in
    annotations:
      neo4j_relationship_type:
        tag: neo4j_relationship_type
        value: MEASURED_IN
      neo4j_start_label:
        tag: neo4j_start_label
        value: MST
      neo4j_end_label:
        tag: neo4j_end_label
        value: ANA
  anatomy_has_parent_anatomy:
    description: Current OptimusKG Neo4j relationship `PARENT` from `ANA`/Anatomy to `ANA`/Anatomy. Parent-child
      hierarchy relationship from the source concept to a broader or parent concept in the same or related
      ontology.
    domain: Anatomy
    range: Anatomy
    slot_uri: rdfs:subClassOf
    annotations:
      neo4j_relationship_type:
        tag: neo4j_relationship_type
        value: PARENT
      neo4j_start_label:
        tag: neo4j_start_label
        value: ANA
      neo4j_end_label:
        tag: neo4j_end_label
        value: ANA
  anatomy_has_gene_expression_absent:
    description: Current OptimusKG Neo4j relationship `EXPRESSION_ABSENT` from Anatomy to Gene. Means
      expression of the gene is reported absent in the anatomical entity.
    domain: Anatomy
    range: Gene
    slot_uri: okg:expression_absent
    annotations:
      neo4j_relationship_type:
        tag: neo4j_relationship_type
        value: EXPRESSION_ABSENT
      neo4j_start_label:
        tag: neo4j_start_label
        value: ANA
      neo4j_end_label:
        tag: neo4j_end_label
        value: GEN
  anatomy_has_gene_expression_present:
    description: Current OptimusKG Neo4j relationship `EXPRESSION_PRESENT` from Anatomy to Gene. Means
      expression of the gene is reported present in the anatomical entity.
    domain: Anatomy
    range: Gene
    slot_uri: RO:0002206
    annotations:
      neo4j_relationship_type:
        tag: neo4j_relationship_type
        value: EXPRESSION_PRESENT
      neo4j_start_label:
        tag: neo4j_start_label
        value: ANA
      neo4j_end_label:
        tag: neo4j_end_label
        value: GEN
  biological_process_is_subclass_of:
    description: Current OptimusKG Neo4j relationship `IS_A` from `BPO`/BiologicalProcess to `BPO`/BiologicalProcess.
      Ontology subclass relationship indicating the source concept is a kind of the target concept.
    domain: BiologicalProcess
    range: BiologicalProcess
    slot_uri: rdfs:subClassOf
    annotations:
      neo4j_relationship_type:
        tag: neo4j_relationship_type
        value: IS_A
      neo4j_start_label:
        tag: neo4j_start_label
        value: BPO
      neo4j_end_label:
        tag: neo4j_end_label
        value: BPO
  biological_process_has_participating_gene:
    description: 'Current OptimusKG Neo4j relationship `INTERACTS_WITH` from BiologicalProcess to Gene.
      Semantic view: the gene is annotated to or participates in the biological process; use provenance/evidence
      to avoid overinterpreting as a physical interaction.'
    domain: BiologicalProcess
    range: Gene
    slot_uri: biolink:interacts_with
    annotations:
      neo4j_relationship_type:
        tag: neo4j_relationship_type
        value: INTERACTS_WITH
      neo4j_start_label:
        tag: neo4j_start_label
        value: BPO
      neo4j_end_label:
        tag: neo4j_end_label
        value: GEN
  cellular_component_is_subclass_of:
    description: Current OptimusKG Neo4j relationship `IS_A` from `CCO`/CellularComponent to `CCO`/CellularComponent.
      Ontology subclass relationship indicating the source concept is a kind of the target concept.
    domain: CellularComponent
    range: CellularComponent
    slot_uri: rdfs:subClassOf
    annotations:
      neo4j_relationship_type:
        tag: neo4j_relationship_type
        value: IS_A
      neo4j_start_label:
        tag: neo4j_start_label
        value: CCO
      neo4j_end_label:
        tag: neo4j_end_label
        value: CCO
  cellular_component_has_located_gene:
    description: 'Current OptimusKG Neo4j relationship `INTERACTS_WITH` from CellularComponent to Gene.
      Semantic view: the gene/gene product is annotated as located in or associated with the cellular
