    annotations:
      neo4j_label:
        tag: neo4j_label
        value: GEN
      optimus_abbreviation:
        tag: optimus_abbreviation
        value: GEN
      property_schema_source:
        tag: property_schema_source
        value: GeneNode
    slot_usage:
      symbol:
        description: Official HGNC-approved gene symbol (e.g. "TP53", "BRCA1"). Primary human-readable
          identifier for the gene.
        range: string
      name:
