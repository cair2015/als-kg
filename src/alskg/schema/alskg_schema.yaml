        description: Formal GO ontology definition
      synonyms:
        description: Alternative GO term names and synonyms
      xrefs:
        description: Cross-references to external databases
      ontology:
        description: Source ontology metadata (GO title, version, license)
  Disease:
    is_a: ClinicalEntity
    description: 'A disease, disorder, or clinical condition represented in OptimusKG. Current Neo4j label:
      `DIS`.


      Property detail from OptimusKG source schema: A human disease node. Represents 36,345 diseases (19.1%
      of nodes) spanning genetic, infectious, cancer, environmental, complex, rare, and common human diseases.
      Harmonized across MONDO, DOID, EFO, Orphanet, NCIT, and other ontologies with full hierarchical
      structure. Sources: DrugCentral, Mondo, Open Targets. Node file: nodes/disease.parquet'
    class_uri: biolink:Disease
    slots:
    - id
    - name
    - original_optimus_label
    - direct_sources
    - indirect_sources
    - has_synonym
    - has_cross_reference
    - disease_has_molecular_subtype
    - has_als_subtype
    - has_pathogenic_mechanism
    - has_phenotype_observation
    - affects_anatomy
    - involves_cell_type
    - disease_has_als_subtype
    - description
    - code
    - parents
    - children
    - ancestors
    - descendants
    - is_leaf
    - exact_synonyms
    - related_synonyms
    - narrow_synonyms
    - broad_synonyms
    - obsolete_terms
    - obsolete_xrefs
    - xrefs
    - concept_ids
    - concept_names
    - umls_cui
    - snomed_full_names
    - snomed_concept_ids
    - cui_semantic_type
    annotations:
      neo4j_label:
        tag: neo4j_label
        value: DIS
      optimus_abbreviation:
        tag: optimus_abbreviation
        value: DIS
      property_schema_source:
        tag: property_schema_source
        value: DiseaseNode
    slot_usage:
      name:
        description: Primary disease name (preferred label in the source ontology)
        range: string
      description:
        description: Free-text disease description from the ontology definition
      code:
        description: Primary ontology code / identifier for the disease term
      parents:
        description: Direct parent disease term identifiers in the ontology hierarchy. Enables traversal
          of the disease DAG (directed acyclic graph).
      children:
        description: Direct child disease term identifiers
      ancestors:
        description: All transitive ancestor (parent-of-parent-of-...) disease term IDs
      descendants:
        description: All transitive descendant (child-of-child-of-...) disease term IDs
      is_leaf:
        description: True if this disease term has no children (leaf node in ontology tree)
      exact_synonyms:
        description: Exact lexical synonyms (same meaning, different spelling/abbreviation)
      related_synonyms:
        description: Semantically related synonyms (close but not exact meaning)
      narrow_synonyms:
        description: Narrower term synonyms (more specific concepts)
      broad_synonyms:
        description: Broader term synonyms (more general concepts)
      obsolete_terms:
        description: Deprecated or retired disease term labels
      obsolete_xrefs:
        description: Deprecated cross-references to external databases
      xrefs:
        description: Cross-references to external databases (e.g. ICD-10, OMIM, MeSH, MedDRA). Formatted
          as CURIE strings.
      concept_ids:
        description: UMLS concept IDs (CUIs) linked to this disease
      concept_names:
        description: UMLS concept names corresponding to concept_ids
      umls_cui:
        description: Primary UMLS Concept Unique Identifier (CUI) for this disease. Key cross-reference
          for integration with clinical NLP systems.
      snomed_full_names:
        description: SNOMED CT preferred full concept names
      snomed_concept_ids:
        description: SNOMED CT concept identifiers
      cui_semantic_type:
        description: UMLS semantic type for the primary CUI (e.g. "Disease or Syndrome", "Neoplastic Process").
    attributes:
      therapeutic_areas:
        range: string
        multivalued: true
        description: Associated therapeutic area classification codes (Open Targets EFO)
  Drug:
    is_a: PhysicalEntity
    description: 'A drug, compound, or therapeutic agent represented in OptimusKG. Current Neo4j label:
      `DRG`.


      Property detail from OptimusKG source schema: A pharmacological compound node. Represents 16,766
      drugs (8.8% of nodes) including approved drugs, investigational compounds, and biologics. Integrates
      chemical, regulatory, and clinical metadata from DrugBank, DrugCentral, OnSIDES, and Open Targets.
      Primary ontologies: ChEMBL, DrugBank, RxNorm. Node file: nodes/drug.parquet'
    class_uri: biolink:Drug
    slots:
    - id
    - name
    - original_optimus_label
    - direct_sources
    - indirect_sources
    - has_synonym
    - has_cross_reference
    - modulates_pathogenic_mechanism
    - targets_gene
    - targets_protein
    - type
    - description
    - synonyms
    - source_ids
    annotations:
      neo4j_label:
        tag: neo4j_label
        value: DRG
      optimus_abbreviation:
        tag: optimus_abbreviation
        value: DRG
      property_schema_source:
        tag: property_schema_source
        value: DrugNode
    slot_usage:
      name:
        description: Primary drug name (INN or generic name, e.g. "metformin")
        range: string
      type:
        description: Drug type classification (e.g. "Small molecule", "Biologic", "Antibody", "Enzyme",
          "Oligonucleotide").
      description:
        description: Free-text description of the drug's pharmacology, indications, and mechanism of action.
      synonyms:
        description: Alternative drug names (INNs, abbreviations, research codes)
      source_ids:
        description: Source-specific compound identifiers
    attributes:
      trade_names:
        range: string
        multivalued: true
        description: Commercial brand/trade names (e.g. "Glucophage" for metformin)
      accession_numbers:
        range: string
        multivalued: true
        description: Database accession numbers from various sources
      inchi_key:
        range: string
        description: Hashed InChIKey identifier (27-character string). Standard chemical structure fingerprint
          for deduplication and lookup.
      cd_formula:
        range: string
        description: Molecular formula (e.g. "C10H17N3O6S")
      is_approved:
        range: boolean
        description: True if the drug is currently approved for clinical use in any jurisdiction
      has_been_withdrawn:
        range: boolean
        description: True if the drug has been withdrawn from the market
      black_box_warning:
        range: boolean
        description: True if the drug carries an FDA black box (boxed) warning
      year_of_first_approval:
        range: integer
        description: Calendar year of first regulatory approval (any jurisdiction)
      maximum_clinical_trial_phase:
        range: float
        description: Highest clinical trial phase the drug has reached (0–4). 4 = marketed/approved, 0
          = preclinical/experimental.
      status:
        range: string
        description: Regulatory development status string (e.g. "Approved", "Investigational", "Withdrawn",
          "Experimental").
      chemical_abstracts_service_number:
        range: string
        description: CAS Registry Number — the gold-standard chemical compound identifier from the American
          Chemical Society (e.g. "57-27-2" for morphine).
      unique_ingredient_identifier:
        range: string
        description: FDA Unique Ingredient Identifier (UNII) — a non-proprietary, free, unique, unambiguous,
          non-semantic, alphanumeric identifier.
  Exposure:
    is_a: PhysicalEntity
    description: 'An environmental, chemical, lifestyle, or other exposure concept represented in OptimusKG.
      Current Neo4j label: `EXP`.


      Property detail from OptimusKG source schema: A chemical, physical, or environmental exposure node.
      Represents 881 exposures (0.5% of nodes) linked to biological outcomes via CTD (Comparative Toxicogenomics
      Database). Covers chemical exposures, physical agents, dietary factors, and lifestyle exposures.
      Source: Comparative Toxicogenomics Database (CTD). Node file: nodes/exposure.parquet'
