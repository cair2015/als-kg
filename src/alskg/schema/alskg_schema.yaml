  ProvenanceEntity:
    abstract: true
    description: 'Abstract root for schema infrastructure and provenance records. Subclasses document
      the origin, identity, and evidence lineage of graph content without themselves being biomedical
      knowledge entities. Replaces the former SemanticEntity grouping for non-entity classes. Children:
      DataSource, Publication, DatabaseAccession (+ CrossReference), Synonym.'
    class_uri: prov:Entity
  Sources:
    description: 'Provenance tracking struct present on every node and edge in OptimusKG. Distinguishes
      between datasets that directly contributed the entity (primary ingestors) and those referenced indirectly
      through aggregators. Example direct sources: Open Targets, DisGeNET, Bgee. Example indirect sources:
      ClinGen, PsyGeNET, UniProt (via Open Targets).'
    attributes:
      direct:
        range: string
        multivalued: true
        description: List of primary data source names that directly contributed this entity or relationship
          to OptimusKG (e.g. "Open Targets", "DisGeNET", "Bgee").
      indirect:
        range: string
        multivalued: true
        description: List of upstream data sources referenced via provenance of primary sources (e.g.
          "ClinGen", "PsyGeNET", "UniProt").
    annotations:
      source_schema:
        tag: source_schema
        value: optimuskg_schema.yaml
  OntologyMetadata:
    description: Metadata about the source ontology for a node. Captured verbatim from the OWL or JSON
      ontology file header at ingestion time.
    attributes:
      title:
        range: string
        description: Human-readable title of the ontology (e.g. "Human Phenotype Ontology")
      description:
        range: string
        description: Brief textual description of the ontology's scope and purpose
      license:
        range: string
        description: License under which the ontology is distributed (e.g. "CC BY 4.0")
      version:
        range: string
        description: Version string or release date of the ontology (e.g. "v2025-05-06" for HPO, "v656"
          for DOID, "current" for dynamic releases)
    annotations:
      source_schema:
        tag: source_schema
        value: optimuskg_schema.yaml
    slots:
    - id
    - name
  Protein:
    is_a: PhysicalEntity
    description: A protein or protein-level biological entity associated with or encoded by a Gene. This
      semantic-view class normalizes values that may appear in OptimusKG gene properties such as associated_proteins.
    class_uri: biolink:Protein
