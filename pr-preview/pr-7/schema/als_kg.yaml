classes:
  NamedEntity:
    name: NamedEntity
    definition_uri: https://cair2015.github.io/als-kg/elements/NamedEntity
    description: Root class for all named entities in the ALS-KG ontology. Provides
      core ontology metadata (id, label, definition, synonyms, xrefs).
    from_schema: https://cair2015.github.io/als-kg
    mappings:
    - biolink:NamedThing
    abstract: true
    slots:
    - namedEntity__id
    - namedEntity__label
    - namedEntity__definition
    - namedEntity__synonym
    - namedEntity__xref
    - namedEntity__comment
    - namedEntity__is_obsolete
    - namedEntity__source
    - namedEntity__last_updated
    attributes:
      id:
        name: id
        description: Persistent unique identifier (IRI)
        slot_uri: schema:identifier
        required: true
      label:
        name: label
        description: Preferred human-readable label
        slot_uri: rdfs:label
        required: true
      definition:
        name: definition
        description: Formal textual definition
        slot_uri: IAO:0000115
      synonym:
        name: synonym
        description: Alternative names
        slot_uri: oboInOwl:hasRelatedSynonym
      xref:
        name: xref
        description: Cross-references to external ontologies
        slot_uri: oboInOwl:hasDbXref
      comment:
        name: comment
        description: Informal notes or comments
        slot_uri: rdfs:comment
      is_obsolete:
        name: is_obsolete
        description: Deprecation flag
        slot_uri: owl:deprecated
        ifabsent: 'false'
      source:
        name: source
        description: Original source/database
        slot_uri: dcterms:source
      last_updated:
        name: last_updated
        description: Last modification timestamp
        slot_uri: dcterms:modified
    class_uri: biolink:NamedThing
  OntologyClass:
    name: OntologyClass
    definition_uri: https://cair2015.github.io/als-kg/elements/OntologyClass
    description: Abstract base for entity classes (nodes in knowledge graph). Inherits
      from NamedEntity with semantic web compatible metadata.
    from_schema: https://cair2015.github.io/als-kg
    mappings:
    - owl:Class
    is_a: NamedEntity
    abstract: true
    slots:
    - namedEntity__id
    - namedEntity__label
    - namedEntity__definition
    - namedEntity__synonym
    - namedEntity__xref
    - namedEntity__comment
    - namedEntity__is_obsolete
    - namedEntity__source
    - namedEntity__last_updated
    - ontologyClass__source_version
    - ontologyClass__ingest_date
    attributes:
      source_version:
        name: source_version
        description: Source database/ontology version
        slot_uri: dcterms:hasVersion
      ingest_date:
        name: ingest_date
        description: When entity was imported into ALS-KG
    class_uri: owl:Class
  Relationship:
    name: Relationship
    definition_uri: https://cair2015.github.io/als-kg/elements/Relationship
    description: 'Abstract base for reified relationships (edges with explicit properties).
      Follows RDF triple pattern: subject, predicate, object. Can carry additional
      metadata (confidence, evidence, provenance).'
    from_schema: https://cair2015.github.io/als-kg
    mappings:
    - rdf:Statement
    abstract: true
    slots:
    - relationship__subject
    - relationship__predicate
    - relationship__object
    - relationship__source
    - relationship__confidence
    - relationship__evidence_type
    - relationship__evidence_source
    - relationship__ingest_date
    attributes:
      subject:
        name: subject
        description: Subject resource IRI
        slot_uri: rdf:subject
        required: true
      predicate:
        name: predicate
        description: Relationship type IRI
        slot_uri: rdf:predicate
        required: true
      object:
        name: object
        description: Object resource IRI
        slot_uri: rdf:object
        required: true
      source:
        name: source
        description: Data source for this relationship
        slot_uri: dcterms:source
      confidence:
        name: confidence
        description: Confidence score (0-1)
      evidence_type:
        name: evidence_type
        description: Type of evidence supporting relationship
        slot_uri: ECO:0000000
      evidence_source:
        name: evidence_source
        description: Citation or study ID
      ingest_date:
        name: ingest_date
        description: Ingest date
    class_uri: rdf:Statement
  DiseaseOrPhenotype:
    name: DiseaseOrPhenotype
    definition_uri: https://cair2015.github.io/als-kg/elements/DiseaseOrPhenotype
    description: Abstract parent class for all disease/phenotype entities. Following
      MONDO and HPO ontology patterns.
    from_schema: https://cair2015.github.io/als-kg
    mappings:
    - biolink:DiseaseOrPhenotypicFeature
    is_a: OntologyClass
    abstract: true
    slots:
    - namedEntity__id
    - namedEntity__label
    - namedEntity__definition
    - namedEntity__synonym
    - namedEntity__xref
    - namedEntity__comment
    - namedEntity__is_obsolete
    - namedEntity__source
    - namedEntity__last_updated
    - ontologyClass__source_version
    - ontologyClass__ingest_date
    - diseaseOrPhenotype__mondo_id
    - diseaseOrPhenotype__hpo_id
    attributes:
      mondo_id:
        name: mondo_id
        description: MONDO cross-reference
        range: MondoIdentifier
      hpo_id:
        name: hpo_id
        description: HPO cross-reference
        range: HpoIdentifier
    class_uri: biolink:DiseaseOrPhenotypicFeature
  Disease:
    name: Disease
    definition_uri: https://cair2015.github.io/als-kg/elements/Disease
    description: Disease entity. Encompasses ALS (MONDO:0007743), related neurodegenerative
      disorders (FTD, PLS, PMA, SMA), and comorbidities. Follows MONDO disease hierarchy
      via is_a relationships.
    from_schema: https://cair2015.github.io/als-kg
    mappings:
    - biolink:Disease
    is_a: DiseaseOrPhenotype
    slots:
    - namedEntity__id
    - namedEntity__label
    - namedEntity__definition
    - namedEntity__synonym
    - namedEntity__xref
    - namedEntity__comment
    - namedEntity__is_obsolete
    - namedEntity__source
    - namedEntity__last_updated
    - ontologyClass__source_version
    - ontologyClass__ingest_date
    - diseaseOrPhenotype__hpo_id
    - disease__mondo_id
    - disease__name
    - disease__disease_type
    - disease__onset_type
    - disease__umls_cui
    - disease__omim_id
    - disease__orphanet_id
    - disease__icd10_code
    attributes:
      mondo_id:
        name: mondo_id
        identifier: true
        range: MondoIdentifier
        required: true
      name:
        name: name
        description: Disease name (preferred from MONDO)
        slot_uri: schema:name
      disease_type:
        name: disease_type
        range: DiseaseTypeEnum
      onset_type:
        name: onset_type
        range: OnsetTypeEnum
      umls_cui:
        name: umls_cui
        description: UMLS Concept Unique Identifier
      omim_id:
        name: omim_id
        description: OMIM (Online Mendelian Inheritance in Man) ID
      orphanet_id:
        name: orphanet_id
        description: Orphanet rare disease identifier
      icd10_code:
        name: icd10_code
        description: ICD-10-CM code for billing/clinical use
    class_uri: biolink:Disease
  Phenotype:
    name: Phenotype
    definition_uri: https://cair2015.github.io/als-kg/elements/Phenotype
    description: Phenotypic feature (HPO term). Represents observable/measurable characteristics
      associated with diseases. Distinct from drug side effects which are modeled
      via DrugCausesPhenotype relationships.
    from_schema: https://cair2015.github.io/als-kg
    mappings:
    - biolink:PhenotypicFeature
    is_a: DiseaseOrPhenotype
    slots:
    - namedEntity__id
    - namedEntity__label
    - namedEntity__definition
    - namedEntity__synonym
    - namedEntity__xref
    - namedEntity__comment
    - namedEntity__is_obsolete
    - namedEntity__source
    - namedEntity__last_updated
    - ontologyClass__source_version
    - ontologyClass__ingest_date
    - diseaseOrPhenotype__mondo_id
    - phenotype__hpo_id
    - phenotype__frequency
    - phenotype__severity
    attributes:
      hpo_id:
        name: hpo_id
        identifier: true
        range: HpoIdentifier
        required: true
      frequency:
        name: frequency
        description: Frequency of phenotype in affected individuals (e.g. Frequent
          75-99%)
        range: string
      severity:
        name: severity
        description: Severity scale
        range: string
    class_uri: biolink:PhenotypicFeature
  Anatomy:
    name: Anatomy
    definition_uri: https://cair2015.github.io/als-kg/elements/Anatomy
    description: 'Anatomical structure (UBERON ontology). ALS-specific relevance:
      motor cortex, spinal cord, anterior horn cells, neuromuscular junction. Linked
      to gene expression and disease manifestation.'
    from_schema: https://cair2015.github.io/als-kg
    mappings:
    - biolink:AnatomicalEntity
    is_a: OntologyClass
    slots:
    - namedEntity__id
    - namedEntity__label
    - namedEntity__definition
    - namedEntity__synonym
    - namedEntity__xref
    - namedEntity__comment
    - namedEntity__is_obsolete
    - namedEntity__source
    - namedEntity__last_updated
    - ontologyClass__source_version
    - ontologyClass__ingest_date
    - anatomy__uberon_id
    - anatomy__bto_id
    - anatomy__mesh_id
    - anatomy__anatomical_system
    attributes:
      uberon_id:
        name: uberon_id
        identifier: true
        range: UberonIdentifier
        required: true
      bto_id:
        name: bto_id
        description: Brenda Tissue Ontology ID
      mesh_id:
        name: mesh_id
        description: MeSH cross-reference
      anatomical_system:
        name: anatomical_system
        description: Anatomical system classification
    class_uri: biolink:AnatomicalEntity
  MolecularEntity:
    name: MolecularEntity
    definition_uri: https://cair2015.github.io/als-kg/elements/MolecularEntity
    description: Abstract base for molecular-level entities (genes, proteins, variants).
      Directly related to disease mechanisms via molecular interactions.
    from_schema: https://cair2015.github.io/als-kg
    mappings:
    - biolink:MolecularEntity
    is_a: OntologyClass
    abstract: true
    slots:
    - namedEntity__id
    - namedEntity__label
    - namedEntity__definition
    - namedEntity__synonym
    - namedEntity__xref
    - namedEntity__comment
    - namedEntity__is_obsolete
    - namedEntity__source
    - namedEntity__last_updated
    - ontologyClass__source_version
    - ontologyClass__ingest_date
    class_uri: biolink:MolecularEntity
  Gene:
    name: Gene
    definition_uri: https://cair2015.github.io/als-kg/elements/Gene
    description: 'Human gene entity (Entrez/NCBI model). Separate from protein product
      to properly distinguish genotype from phenotype. Key ALS genes: C9orf72, SOD1,
      TARDBP, FUS, TBK1, NEK1, SQSTM1, VCP, OPTN.'
    from_schema: https://cair2015.github.io/als-kg
    mappings:
    - biolink:Gene
    is_a: MolecularEntity
    slots:
    - namedEntity__id
    - namedEntity__label
    - namedEntity__definition
    - namedEntity__synonym
    - namedEntity__xref
    - namedEntity__comment
    - namedEntity__is_obsolete
    - namedEntity__source
    - namedEntity__last_updated
    - ontologyClass__source_version
    - ontologyClass__ingest_date
    - gene__ncbi_gene_id
    - gene__hgnc_symbol
    - gene__ensembl_id
    - gene__chromosome
    - gene__genomic_pos_start
    - gene__genomic_pos_end
    - gene__als_risk_tier
    attributes:
      ncbi_gene_id:
        name: ncbi_gene_id
        identifier: true
        range: NcbiGeneIdentifier
        required: true
      hgnc_symbol:
        name: hgnc_symbol
        description: Official HGNC gene symbol
      ensembl_id:
        name: ensembl_id
        description: Ensembl gene identifier
      chromosome:
        name: chromosome
        description: Cytogenetic location (e.g. 21q22.11 for SOD1)
      genomic_pos_start:
        name: genomic_pos_start
        description: GRCh38 start coordinate (1-based)
        range: integer
      genomic_pos_end:
        name: genomic_pos_end
        description: GRCh38 end coordinate
        range: integer
      als_risk_tier:
        name: als_risk_tier
        description: Evidence tier for ALS association (ALSoD classification) - definitive,
          strong, moderate, or candidate
        range: string
    class_uri: biolink:Gene
  TranscriptionFactor:
    name: TranscriptionFactor
    definition_uri: https://cair2015.github.io/als-kg/elements/TranscriptionFactor
    description: 'Gene encoding a transcription factor (TF). Subclass of Gene, carries
      both :Gene and :TranscriptionFactor labels. Source: DoRothEA + ENCODE TF annotations.'
    from_schema: https://cair2015.github.io/als-kg
    is_a: Gene
    slots:
    - namedEntity__id
    - namedEntity__label
    - namedEntity__definition
    - namedEntity__synonym
    - namedEntity__xref
    - namedEntity__comment
    - namedEntity__is_obsolete
    - namedEntity__source
    - namedEntity__last_updated
    - ontologyClass__source_version
    - ontologyClass__ingest_date
    - gene__ncbi_gene_id
    - gene__hgnc_symbol
    - gene__ensembl_id
    - gene__chromosome
    - gene__genomic_pos_start
    - gene__genomic_pos_end
    - gene__als_risk_tier
    - transcriptionFactor__tf_family
    - transcriptionFactor__dorothea_confidence
    attributes:
      tf_family:
        name: tf_family
        description: Structural family (C2H2-ZF, bHLH, Homeodomain, etc.)
      dorothea_confidence:
        name: dorothea_confidence
        description: DoRothEA confidence level (A=high, D=low)
    class_uri: alskb:TranscriptionFactor
  Protein:
    name: Protein
    definition_uri: https://cair2015.github.io/als-kg/elements/Protein
    description: 'Protein product (UniProt model). Distinct from Gene entity to capture
      protein-specific properties: aggregation propensity, prion-like domains, subcellular
      localization.'
    from_schema: https://cair2015.github.io/als-kg
    mappings:
    - biolink:Protein
    is_a: MolecularEntity
    slots:
    - namedEntity__id
    - namedEntity__label
    - namedEntity__definition
    - namedEntity__synonym
    - namedEntity__xref
    - namedEntity__comment
    - namedEntity__is_obsolete
    - namedEntity__source
    - namedEntity__last_updated
    - ontologyClass__source_version
    - ontologyClass__ingest_date
    - protein__uniprot_id
    - protein__protein_name
    - protein__hgnc_symbol
    - protein__molecular_weight_kda
    - protein__protein_family
    - protein__subcellular_location
    - protein__aggregation_prone
    - protein__has_prion_like_domain
    attributes:
      uniprot_id:
        name: uniprot_id
        slot_uri: 'UniProtKB:'
        identifier: true
        range: UniprotIdentifier
        required: true
      protein_name:
        name: protein_name
        description: Protein name (UniProt recommended name)
        slot_uri: schema:name
      hgnc_symbol:
        name: hgnc_symbol
        description: Gene name (cross-reference to Gene entity)
      molecular_weight_kda:
        name: molecular_weight_kda
        description: Molecular weight in kDa
        range: float
      protein_family:
        name: protein_family
        description: Protein family classification (Pfam)
      subcellular_location:
        name: subcellular_location
        description: Cellular compartment(s) where protein is localized (e.g. mitochondrion,
          nucleus, axon)
        multivalued: true
      aggregation_prone:
        name: aggregation_prone
        description: Known to form aggregates (TDP-43, SOD1, FUS)
        range: boolean
      has_prion_like_domain:
        name: has_prion_like_domain
        description: Contains intrinsically disordered prion-like region
        range: boolean
    class_uri: biolink:Protein
  Variant:
    name: Variant
    definition_uri: https://cair2015.github.io/als-kg/elements/Variant
    description: Genetic sequence variant (ClinVar model). Includes SNVs, indels,
      repeat expansions (C9orf72), and structural variants. Links to genes, proteins,
      and disease associations.
    from_schema: https://cair2015.github.io/als-kg
    mappings:
    - biolink:SequenceVariant
    is_a: MolecularEntity
    slots:
    - namedEntity__id
    - namedEntity__label
    - namedEntity__definition
    - namedEntity__synonym
    - namedEntity__xref
    - namedEntity__comment
    - namedEntity__is_obsolete
    - namedEntity__source
    - namedEntity__last_updated
    - ontologyClass__source_version
    - ontologyClass__ingest_date
    - variant__clinvar_id
    - variant__rsid
    - variant__hgvs_c
    - variant__hgvs_p
    - variant__variant_type
    - variant__clinical_significance
    - variant__als_class
    - variant__maf
    attributes:
      clinvar_id:
        name: clinvar_id
        identifier: true
        range: ClinvarIdentifier
        required: true
      rsid:
        name: rsid
        description: dbSNP reference SNP ID
      hgvs_c:
        name: hgvs_c
        description: HGVS coding sequence notation (e.g. c.10A>G)
      hgvs_p:
        name: hgvs_p
        description: HGVS protein notation (e.g. p.Ala4Val)
      variant_type:
        name: variant_type
        range: VariantTypeEnum
      clinical_significance:
        name: clinical_significance
        description: ClinVar clinical interpretation
      als_class:
        name: als_class
        description: ALS-specific classification (causal, risk, modifier, protective)
      maf:
        name: maf
        description: Minor allele frequency in gnomAD non-neuro cohort
        range: float
        minimum_value: 0.0
        maximum_value: 1.0
    class_uri: biolink:SequenceVariant
  ChemicalEntity:
    name: ChemicalEntity
    definition_uri: https://cair2015.github.io/als-kg/elements/ChemicalEntity
    description: Abstract base for chemical and pharmacological entities (drugs, exposures,
      metabolites).
    from_schema: https://cair2015.github.io/als-kg
    mappings:
    - biolink:ChemicalEntity
    is_a: OntologyClass
    abstract: true
    slots:
    - namedEntity__id
    - namedEntity__label
    - namedEntity__definition
    - namedEntity__synonym
    - namedEntity__xref
    - namedEntity__comment
    - namedEntity__is_obsolete
    - namedEntity__source
    - namedEntity__last_updated
    - ontologyClass__source_version
    - ontologyClass__ingest_date
    class_uri: biolink:ChemicalEntity
  Drug:
    name: Drug
    definition_uri: https://cair2015.github.io/als-kg/elements/Drug
    description: 'Pharmaceutical compound (DrugBank model). ALS-approved drugs: Riluzole,
      Edaravone, Tofersen, AMX0035. Includes mechanism, targets, side effects.'
    from_schema: https://cair2015.github.io/als-kg
    mappings:
    - biolink:Drug
    is_a: ChemicalEntity
    slots:
    - namedEntity__id
    - namedEntity__label
    - namedEntity__definition
    - namedEntity__synonym
    - namedEntity__xref
    - namedEntity__comment
    - namedEntity__is_obsolete
    - namedEntity__source
    - namedEntity__last_updated
    - ontologyClass__source_version
    - ontologyClass__ingest_date
    - drug__drugbank_id
    - drug__drug_name
    - drug__chembl_id
    - drug__inchi_key
    - drug__smiles
    - drug__drug_type
    - drug__als_approved
    - drug__trial_status
    - drug__mechanism
    - drug__indication
    attributes:
      drugbank_id:
        name: drugbank_id
        identifier: true
        range: DrugBankIdentifier
        required: true
      drug_name:
        name: drug_name
        description: Preferred drug name
        slot_uri: schema:name
      chembl_id:
        name: chembl_id
        description: ChEMBL compound ID
      inchi_key:
        name: inchi_key
        description: Standard InChIKey hash
      smiles:
        name: smiles
        description: Canonical SMILES string
      drug_type:
        name: drug_type
        description: Categorization (small molecule, biologic, ASO, cell therapy,
          gene therapy)
      als_approved:
        name: als_approved
        description: FDA approval status for ALS treatment
        range: boolean
      trial_status:
        name: trial_status
        description: Highest clinical trial phase reached
      mechanism:
        name: mechanism
        description: Known mechanism of action
      indication:
        name: indication
        description: Clinical indication
