    from_schema: https://cair2015.github.io/als-kg
    slot_uri: alskb:disease_stage
    alias: disease_stage
    owner: GeneExpressionAssociation
    domain_of:
    - GeneExpressionAssociation
    range: string
  diseaseDiseaseAssociation__disease_1:
    name: diseaseDiseaseAssociation__disease_1
    from_schema: https://cair2015.github.io/als-kg
    slot_uri: alskb:disease_1
    alias: disease_1
    owner: DiseaseDiseaseAssociation
