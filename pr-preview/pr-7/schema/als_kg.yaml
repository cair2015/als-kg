name: als_kg
description: Comprehensive ontology model for the ALS Knowledge Graph (ALS-KG). Uses
  a local default namespace for ALS-specific classes and slots, explicit Biolink/ontology
  URIs only for externally defined concepts and predicates, direct object properties
  for canonical KG edges, and optional evidence-bearing association classes for provenance-rich
  statements.
title: ALS Knowledge Graph Ontology Model
comments:
- Reactome pathways are modeled as Pathway entities using Reactome stable identifiers;
  KEGG pathway prefixes and KEGG-specific mappings are intentionally omitted.
- 'URI policy: ALS-KG-specific classes and slots use the schema default_prefix (alskb)
  and do not need explicit class_uri/slot_uri declarations. Use class_uri/slot_uri
  only when a term is intended to be equivalent to an external model term; use exact_mappings
  or close_mappings when alignment is useful but not identical.'
id: https://cair2015.github.io/als-kg
version: 2.1.2
imports:
- linkml:types
license: MIT
prefixes:
  linkml:
    prefix_prefix: linkml
    prefix_reference: https://w3id.org/linkml/
  alskb:
    prefix_prefix: alskb
    prefix_reference: https://cair2015.github.io/als-kg/elements/
  biolink:
    prefix_prefix: biolink
    prefix_reference: https://w3id.org/biolink/vocab/
  owl:
    prefix_prefix: owl
    prefix_reference: http://www.w3.org/2002/07/owl#
  rdf:
    prefix_prefix: rdf
    prefix_reference: http://www.w3.org/1999/02/22-rdf-syntax-ns#
  rdfs:
    prefix_prefix: rdfs
    prefix_reference: http://www.w3.org/2000/01/rdf-schema#
  obo:
    prefix_prefix: obo
    prefix_reference: http://purl.obolibrary.org/obo/
  MONDO:
    prefix_prefix: MONDO
    prefix_reference: http://purl.obolibrary.org/obo/MONDO_
  HP:
    prefix_prefix: HP
    prefix_reference: http://purl.obolibrary.org/obo/HP_
  UBERON:
    prefix_prefix: UBERON
    prefix_reference: http://purl.obolibrary.org/obo/UBERON_
  NCBIGene:
    prefix_prefix: NCBIGene
    prefix_reference: https://www.ncbi.nlm.nih.gov/gene/
  UniProtKB:
    prefix_prefix: UniProtKB
    prefix_reference: https://www.uniprot.org/uniprot/
  ClinVar:
    prefix_prefix: ClinVar
    prefix_reference: https://www.ncbi.nlm.nih.gov/clinvar/variation/
  DrugBank:
    prefix_prefix: DrugBank
    prefix_reference: https://www.drugbank.ca/drugs/
  GO:
    prefix_prefix: GO
    prefix_reference: http://purl.obolibrary.org/obo/GO_
  Reactome:
    prefix_prefix: Reactome
    prefix_reference: https://identifiers.org/reactome/
  CTD:
    prefix_prefix: CTD
    prefix_reference: http://ctdbase.org/detail.go?type=chem&acc=
  xsd:
    prefix_prefix: xsd
    prefix_reference: http://www.w3.org/2001/XMLSchema#
  schema:
    prefix_prefix: schema
    prefix_reference: http://schema.org/
  dcterms:
    prefix_prefix: dcterms
    prefix_reference: http://purl.org/dc/terms/
  IAO:
    prefix_prefix: IAO
    prefix_reference: http://purl.obolibrary.org/obo/IAO_
  RO:
    prefix_prefix: RO
    prefix_reference: http://purl.obolibrary.org/obo/RO_
  BFO:
    prefix_prefix: BFO
    prefix_reference: http://purl.obolibrary.org/obo/BFO_
  ECO:
    prefix_prefix: ECO
    prefix_reference: http://purl.obolibrary.org/obo/ECO_
  SIO:
    prefix_prefix: SIO
    prefix_reference: http://semanticscience.org/resource/
  oboInOwl:
    prefix_prefix: oboInOwl
    prefix_reference: http://www.geneontology.org/formats/oboInOwl#
  HGNC:
    prefix_prefix: HGNC
    prefix_reference: https://www.genenames.org/data/gene-symbol-report/#!/hgnc_id/
  ENSEMBL:
    prefix_prefix: ENSEMBL
    prefix_reference: https://identifiers.org/ensembl/
  dbSNP:
    prefix_prefix: dbSNP
    prefix_reference: https://www.ncbi.nlm.nih.gov/snp/
  ChEMBL:
    prefix_prefix: ChEMBL
    prefix_reference: https://www.ebi.ac.uk/chembl/compound_report_card/
  MeSH:
    prefix_prefix: MeSH
    prefix_reference: https://id.nlm.nih.gov/mesh/
  OMIM:
    prefix_prefix: OMIM
    prefix_reference: https://omim.org/entry/
  ORPHANET:
    prefix_prefix: ORPHANET
    prefix_reference: http://www.orpha.net/ORDO/Orphanet_
  UMLS:
    prefix_prefix: UMLS
    prefix_reference: https://uts.nlm.nih.gov/uts/umls/concept/
  ICD10CM:
    prefix_prefix: ICD10CM
    prefix_reference: https://icd.codes/icd10cm/
  CAS:
    prefix_prefix: CAS
    prefix_reference: https://commonchemistry.cas.org/detail?cas_rn=
  DOI:
    prefix_prefix: DOI
    prefix_reference: https://doi.org/
  PMID:
    prefix_prefix: PMID
    prefix_reference: https://pubmed.ncbi.nlm.nih.gov/
default_prefix: alskb
default_range: string
types:
  MondoIdentifier:
    name: MondoIdentifier
    definition_uri: https://cair2015.github.io/als-kg/elements/MondoIdentifier
    description: MONDO disease ontology identifier (e.g. MONDO:0007743)
    from_schema: https://cair2015.github.io/als-kg
    typeof: string
    base: str
    uri: xsd:string
    pattern: ^MONDO:\d{7}$
  HpoIdentifier:
    name: HpoIdentifier
    definition_uri: https://cair2015.github.io/als-kg/elements/HpoIdentifier
    description: HPO phenotype term identifier (e.g. HP:0007354)
    from_schema: https://cair2015.github.io/als-kg
    typeof: string
    base: str
    uri: xsd:string
    pattern: ^HP:\d{7}$
  UberonIdentifier:
    name: UberonIdentifier
    definition_uri: https://cair2015.github.io/als-kg/elements/UberonIdentifier
    description: UBERON anatomy ontology identifier
    from_schema: https://cair2015.github.io/als-kg
    typeof: string
    base: str
    uri: xsd:string
    pattern: ^UBERON:\d+$
  NcbiGeneIdentifier:
    name: NcbiGeneIdentifier
    definition_uri: https://cair2015.github.io/als-kg/elements/NcbiGeneIdentifier
    description: NCBI Entrez Gene numeric ID
    from_schema: https://cair2015.github.io/als-kg
    typeof: string
    base: str
    uri: xsd:string
    pattern: ^\d+$
  UniprotIdentifier:
    name: UniprotIdentifier
    definition_uri: https://cair2015.github.io/als-kg/elements/UniprotIdentifier
    description: UniProt accession identifier
    from_schema: https://cair2015.github.io/als-kg
    typeof: string
    base: str
    uri: xsd:string
    pattern: ^[A-Z0-9]{6}$
  ClinvarIdentifier:
    name: ClinvarIdentifier
    definition_uri: https://cair2015.github.io/als-kg/elements/ClinvarIdentifier
    description: ClinVar variation numeric ID
    from_schema: https://cair2015.github.io/als-kg
    typeof: string
    base: str
    uri: xsd:string
    pattern: ^\d+$
  DrugBankIdentifier:
    name: DrugBankIdentifier
    definition_uri: https://cair2015.github.io/als-kg/elements/DrugBankIdentifier
    description: DrugBank primary identifier (e.g. DB00533)
    from_schema: https://cair2015.github.io/als-kg
    typeof: string
    base: str
    uri: xsd:string
    pattern: ^DB\d{5}$
  GoIdentifier:
    name: GoIdentifier
    definition_uri: https://cair2015.github.io/als-kg/elements/GoIdentifier
    description: Gene Ontology term identifier (e.g. GO:0006810)
    from_schema: https://cair2015.github.io/als-kg
    typeof: string
    base: str
    uri: xsd:string
    pattern: ^GO:\d{7}$
  ReactomeIdentifier:
    name: ReactomeIdentifier
    definition_uri: https://cair2015.github.io/als-kg/elements/ReactomeIdentifier
    description: Reactome stable pathway identifier as a CURIE (e.g. Reactome:R-HSA-5673001)
    from_schema: https://cair2015.github.io/als-kg
    typeof: string
    base: str
    uri: xsd:string
    pattern: ^Reactome:R-HSA-\d+(\.\d+)?$
  CtdIdentifier:
    name: CtdIdentifier
    definition_uri: https://cair2015.github.io/als-kg/elements/CtdIdentifier
    description: CTD chemical/stressor identifier
    from_schema: https://cair2015.github.io/als-kg
    typeof: string
    base: str
    uri: xsd:string
  string:
    name: string
    definition_uri: https://w3id.org/linkml/String
    description: A character string
    notes:
    - In RDF serializations, a slot with range of string is treated as a literal or
      type xsd:string.   If you are authoring schemas in LinkML YAML, the type is
      referenced with the lower case "string".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Text
    base: str
    uri: xsd:string
  integer:
    name: integer
    definition_uri: https://w3id.org/linkml/Integer
    description: An integer
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "integer".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Integer
    base: int
    uri: xsd:integer
  boolean:
    name: boolean
    definition_uri: https://w3id.org/linkml/Boolean
    description: A binary (true or false) value
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "boolean".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Boolean
    base: Bool
    uri: xsd:boolean
    repr: bool
  float:
    name: float
    definition_uri: https://w3id.org/linkml/Float
    description: A real number that conforms to the xsd:float specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "float".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Float
    base: float
    uri: xsd:float
  double:
    name: double
    definition_uri: https://w3id.org/linkml/Double
    description: A real number that conforms to the xsd:double specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "double".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    close_mappings:
    - schema:Float
    base: float
    uri: xsd:double
  decimal:
    name: decimal
    definition_uri: https://w3id.org/linkml/Decimal
    description: A real number with arbitrary precision that conforms to the xsd:decimal
      specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "decimal".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    broad_mappings:
    - schema:Number
    base: Decimal
    uri: xsd:decimal
  time:
    name: time
    definition_uri: https://w3id.org/linkml/Time
    description: A time object represents a (local) time of day, independent of any
      particular day
    notes:
    - URI is dateTime because OWL reasoners do not work with straight date or time
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "time".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Time
    base: XSDTime
    uri: xsd:time
    repr: str
  date:
    name: date
    definition_uri: https://w3id.org/linkml/Date
    description: a date (year, month and day) in an idealized calendar
    notes:
    - URI is dateTime because OWL reasoners don't work with straight date or time
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "date".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Date
    base: XSDDate
    uri: xsd:date
    repr: str
  datetime:
    name: datetime
    definition_uri: https://w3id.org/linkml/Datetime
    description: The combination of a date and time
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "datetime".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:DateTime
    base: XSDDateTime
    uri: xsd:dateTime
    repr: str
  date_or_datetime:
    name: date_or_datetime
    definition_uri: https://w3id.org/linkml/DateOrDatetime
    description: Either a date or a datetime
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "date_or_datetime".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: linkml:DateOrDatetime
    repr: str
  uriorcurie:
    name: uriorcurie
    definition_uri: https://w3id.org/linkml/Uriorcurie
    description: a URI or a CURIE
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "uriorcurie".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: URIorCURIE
    uri: xsd:anyURI
    repr: str
  curie:
    name: curie
    definition_uri: https://w3id.org/linkml/Curie
    conforms_to: https://www.w3.org/TR/curie/
    description: a compact URI
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "curie".
    comments:
    - in RDF serializations this MUST be expanded to a URI
    - in non-RDF serializations MAY be serialized as the compact representation
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: Curie
    uri: xsd:string
    repr: str
  uri:
    name: uri
    definition_uri: https://w3id.org/linkml/Uri
    conforms_to: https://www.ietf.org/rfc/rfc3987.txt
    description: a complete URI
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "uri".
    comments:
    - in RDF serializations a slot with range of uri is treated as a literal or type
      xsd:anyURI unless it is an identifier or a reference to an identifier, in which
      case it is translated directly to a node
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    close_mappings:
    - schema:URL
    base: URI
    uri: xsd:anyURI
    repr: str
  ncname:
    name: ncname
    definition_uri: https://w3id.org/linkml/Ncname
    description: Prefix part of CURIE
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "ncname".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: NCName
    uri: xsd:string
    repr: str
  objectidentifier:
    name: objectidentifier
    definition_uri: https://w3id.org/linkml/Objectidentifier
    description: A URI or CURIE that represents an object in the model.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "objectidentifier".
    comments:
    - Used for inheritance and type checking
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: ElementIdentifier
    uri: shex:iri
    repr: str
  nodeidentifier:
    name: nodeidentifier
    definition_uri: https://w3id.org/linkml/Nodeidentifier
    description: A URI, CURIE or BNODE that represents a node in a model.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "nodeidentifier".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: NodeIdentifier
    uri: shex:nonLiteral
    repr: str
  jsonpointer:
    name: jsonpointer
    definition_uri: https://w3id.org/linkml/Jsonpointer
    conforms_to: https://datatracker.ietf.org/doc/html/rfc6901
    description: A string encoding a JSON Pointer. The value of the string MUST conform
      to JSON Point syntax and SHOULD dereference to a valid object within the current
      instance document when encoded in tree form.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "jsonpointer".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
  jsonpath:
    name: jsonpath
    definition_uri: https://w3id.org/linkml/Jsonpath
    conforms_to: https://www.ietf.org/archive/id/draft-goessner-dispatch-jsonpath-00.html
    description: A string encoding a JSON Path. The value of the string MUST conform
      to JSON Point syntax and SHOULD dereference to zero or more valid objects within
      the current instance document when encoded in tree form.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "jsonpath".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
  sparqlpath:
    name: sparqlpath
    definition_uri: https://w3id.org/linkml/Sparqlpath
    conforms_to: https://www.w3.org/TR/sparql11-query/#propertypaths
    description: A string encoding a SPARQL Property Path. The value of the string
      MUST conform to SPARQL syntax and SHOULD dereference to zero or more valid objects
      within the current instance document when encoded as RDF.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "sparqlpath".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
enums:
  DiseaseTypeEnum:
    name: DiseaseTypeEnum
    definition_uri: https://cair2015.github.io/als-kg/elements/DiseaseTypeEnum
    from_schema: https://cair2015.github.io/als-kg
    permissible_values:
      sporadic:
        text: sporadic
        description: Occurs without family history
      familial:
        text: familial
        description: Inherited pattern of occurrence
      syndromic:
        text: syndromic
        description: Part of larger syndrome
  OnsetTypeEnum:
    name: OnsetTypeEnum
    definition_uri: https://cair2015.github.io/als-kg/elements/OnsetTypeEnum
    from_schema: https://cair2015.github.io/als-kg
    permissible_values:
      bulbar:
        text: bulbar
        description: Facial/tongue muscles affected first
      limb:
        text: limb
        description: Arm or leg muscles affected first
      respiratory:
        text: respiratory
        description: Breathing muscles affected first
      generalized:
        text: generalized
        description: Multiple sites affected simultaneously
      unknown:
        text: unknown
        description: Onset location unknown
  GeneTypeEnum:
    name: GeneTypeEnum
    definition_uri: https://cair2015.github.io/als-kg/elements/GeneTypeEnum
    from_schema: https://cair2015.github.io/als-kg
    permissible_values:
      protein_coding:
        text: protein_coding
      lncRNA:
        text: lncRNA
      miRNA:
        text: miRNA
      pseudogene:
        text: pseudogene
      other:
        text: other
  VariantTypeEnum:
    name: VariantTypeEnum
    definition_uri: https://cair2015.github.io/als-kg/elements/VariantTypeEnum
    from_schema: https://cair2015.github.io/als-kg
    permissible_values:
      SNV:
        text: SNV
        description: Single nucleotide variant
      indel:
        text: indel
        description: Insertion or deletion
      repeat_expansion:
        text: repeat_expansion
        description: Trinucleotide repeat expansion
      CNV:
        text: CNV
        description: Copy number variation
      structural:
        text: structural
        description: Structural variant (inversion, translocation)
  RelationshipTypeEnum:
    name: RelationshipTypeEnum
    definition_uri: https://cair2015.github.io/als-kg/elements/RelationshipTypeEnum
    description: Standard relationship types following RDF/OWL semantics
    from_schema: https://cair2015.github.io/als-kg
    permissible_values:
      is_a:
        text: is_a
        description: Subclass relationship (taxonomic)
      part_of:
        text: part_of
        description: Mereological (compositional) relationship
      proper_part_of:
        text: proper_part_of
        description: Strict part-of (excludes identity)
      participates_in:
        text: participates_in
        description: Agent participates in process
      has_participant:
        text: has_participant
        description: Process has participant
      regulates:
        text: regulates
        description: Regulatory relationship (direction unspecified)
      positively_regulates:
        text: positively_regulates
        description: Upregulation/activation
      negatively_regulates:
        text: negatively_regulates
        description: Downregulation/inhibition
      associated_with:
        text: associated_with
        description: Statistical/empirical association
      affects:
        text: affects
        description: Causal or functional modification
  EvidenceTypeEnum:
    name: EvidenceTypeEnum
    definition_uri: https://cair2015.github.io/als-kg/elements/EvidenceTypeEnum
    from_schema: https://cair2015.github.io/als-kg
    permissible_values:
      curated:
        text: curated
        description: Manually curated from literature
      experimental:
        text: experimental
        description: Derived from wet-lab experiments
      computational:
        text: computational
        description: Result of computational analysis
      inferred:
        text: inferred
        description: Inferred from other statements
      predicted:
        text: predicted
        description: Machine learning prediction
      text_mined:
        text: text_mined
        description: Extracted via natural language processing
slots:
  id:
    name: id
    definition_uri: https://cair2015.github.io/als-kg/elements/id
    description: Unique identifier (IRI or URI)
    from_schema: https://cair2015.github.io/als-kg
    mappings:
    - schema:identifier
    slot_uri: schema:identifier
    identifier: true
    range: uriorcurie
    required: true
  label:
    name: label
    definition_uri: https://cair2015.github.io/als-kg/elements/label
    description: Human-readable label for the entity
    from_schema: https://cair2015.github.io/als-kg
    mappings:
    - rdfs:label
    slot_uri: rdfs:label
    range: string
    required: true
  definition:
    name: definition
    definition_uri: https://cair2015.github.io/als-kg/elements/definition
    description: Textual definition following OBO definition format
    from_schema: https://cair2015.github.io/als-kg
    mappings:
    - IAO:0000115
    slot_uri: IAO:0000115
    range: string
  synonym:
    name: synonym
    definition_uri: https://cair2015.github.io/als-kg/elements/synonym
    description: Alternative names or labels
    from_schema: https://cair2015.github.io/als-kg
    mappings:
    - oboInOwl:hasRelatedSynonym
    slot_uri: oboInOwl:hasRelatedSynonym
    range: string
    multivalued: true
  xref:
    name: xref
    definition_uri: https://cair2015.github.io/als-kg/elements/xref
    description: 'Cross-reference to equivalent entity in another ontology. Format:
      ONTOLOGY_PREFIX:identifier (e.g. OMIM:104300, Reactome:R-HSA-5673001, GO:0006810)'
    from_schema: https://cair2015.github.io/als-kg
    mappings:
    - oboInOwl:hasDbXref
    slot_uri: oboInOwl:hasDbXref
    range: string
    multivalued: true
  comment:
    name: comment
    definition_uri: https://cair2015.github.io/als-kg/elements/comment
    description: Informal comment or note on entity
    from_schema: https://cair2015.github.io/als-kg
    mappings:
    - rdfs:comment
    slot_uri: rdfs:comment
    range: string
  is_obsolete:
    name: is_obsolete
    definition_uri: https://cair2015.github.io/als-kg/elements/is_obsolete
    description: Whether this entity is deprecated/obsolete
    from_schema: https://cair2015.github.io/als-kg
    mappings:
    - owl:deprecated
    slot_uri: owl:deprecated
    ifabsent: 'false'
    range: boolean
  subject:
    name: subject
    definition_uri: https://cair2015.github.io/als-kg/elements/subject
    description: Subject of the relationship (resource IRI)
    from_schema: https://cair2015.github.io/als-kg
    mappings:
    - rdf:subject
    slot_uri: rdf:subject
    range: string
    required: true
  predicate:
