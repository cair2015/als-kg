        name: association_id
        description: Stable identifier for the association record
        slot_uri: schema:identifier
        range: uriorcurie
      association_label:
        name: association_label
        description: Human-readable summary of the association
        slot_uri: rdfs:label
      subject:
        name: subject
        description: Subject entity IRI or CURIE used to materialize a direct edge
        slot_uri: rdf:subject
        required: true
      predicate:
        name: predicate
        description: Direct object property represented by this association
        slot_uri: rdf:predicate
        required: true
      object:
        name: object
        description: Object entity IRI or CURIE used to materialize a direct edge
        slot_uri: rdf:object
        required: true
      source:
        name: source
        description: Data source for this association
        slot_uri: dcterms:source
      source_version:
        name: source_version
        description: Data source version or release date
        slot_uri: dcterms:hasVersion
      evidence_type:
        name: evidence_type
        description: Type of supporting evidence
        slot_uri: ECO:0000000
      evidence_source:
        name: evidence_source
        description: Publication, study, database record, or extraction artifact supporting
