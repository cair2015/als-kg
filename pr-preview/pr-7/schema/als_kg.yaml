    description: Abstract base for optional evidence-bearing associations. Use when
      a relationship cannot be represented sufficiently by a direct object property
      because the edge needs provenance, evidence, confidence, or additional qualifiers.
      The subject/predicate/object fields allow the association to be materialized
      as an RDF triple or property-graph edge.
